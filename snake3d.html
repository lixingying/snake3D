      <span><span class="dot" style="background:#6c3483"></span>-命</span>

<script type="module">
import * as THREE from 'three';
import { TrackballControls } from 'three/addons/controls/TrackballControls.js';

/* ===========================
   CONSTANTS
   =========================== */
const GRID_SIZE = 20;
const INITIAL_SNAKE_LENGTH = 100;
const SPAWN_INTERVAL = 35;
const FOOD_LIFETIME = 160;
const MAX_FOODS = 7;
const BASE_R = 1.2;
const BASE_R_TUBE = 0.5;
const MIN_FIELD_SCALE = 0.6;
const MAX_FIELD_SCALE = 1.5;
const FOOD_DEF = {
  grow:       { color: 0xe84545, label: '变长', weight: 34, good: true },
  expand:     { color: 0x5dade2, label: '扩大', weight: 7,  good: true },
  slow:       { color: 0xf4d03f, label: '减速', weight: 7,  good: true },
  extraLife:  { color: 0xff6b9d, label: '+命',  weight: 3,  good: true },
  shrink:     { color: 0x8b0000, label: '缩短', weight: 22, good: false },
  shrinkField:{ color: 0x2c3e50, label: '缩小', weight: 7,  good: false },
  speedUp:    { color: 0xe67e22, label: '加速', weight: 7,  good: false },
  loseLife:   { color: 0x6c3483, label: '-命',  weight: 3,  good: false },
};

const urlParams = new URLSearchParams(location.search);
const requestedMap = urlParams.get('map');
const MAP_TYPE = ['torus', 'sphere', 'genus2', 'projective', 'mobius', 'klein'].includes(requestedMap) ? requestedMap : 'torus';
const LOOP_WIN_MAPS = new Set(['torus', 'genus2']);
const TORUS_CUT_X = GRID_SIZE / 2;
const TORUS_CUT_Y = GRID_SIZE / 2;
const CUT_COLORS = {
  a: '#ff5c8a',
  b: '#48d9ff',
  c: '#7cff6b',
  d: '#ffd166',
};
const GENUS2_RELATOR = ['a', 'c', 'A', 'C', 'd', 'b', 'D', 'B'];

/* ===========================
   TORUS MESH
   =========================== */
let torusMesh = null;
let torusMaterial = null;
let markMeshFront = null;
let markMeshBack = null;
let markMaterialFront = null;
let markMaterialBack = null;
let cutOverlayGroup = null;

function ensureSurfaceGeometry() {
  if (!torusMaterial) {
    torusMaterial = new THREE.MeshStandardMaterial({
      map: gridTex,
      roughness: 0.55,
      metalness: 0.1,
      side: ['sphere', 'genus2', 'projective', 'mobius', 'klein'].includes(MAP_TYPE) ? THREE.DoubleSide : THREE.FrontSide,
    });
  }
  if (!markMaterialFront) {
    if (MAP_TYPE === 'sphere') {
      markMaterialFront = CUBE_FACE_KEYS.map(faceKey => createMarkMaterial(sphereMarkTexFront[faceKey], THREE.DoubleSide));
      markMaterialBack = CUBE_FACE_KEYS.map(faceKey => createMarkMaterial(sphereMarkTexBack[faceKey], THREE.DoubleSide));
    } else if (MAP_TYPE === 'genus2') {
      markMaterialFront = getGenus2Topology().faces.map(face => createMarkMaterial(genus2MarkTex[face.key], THREE.DoubleSide));
      markMaterialBack = null;
    } else if (MAP_TYPE === 'projective') {
      markMaterialFront = createMarkMaterial(markTexFront, THREE.DoubleSide);
      markMaterialBack = null;
    } else {
      markMaterialFront = createMarkMaterial(markTexFront, THREE.FrontSide);
      markMaterialBack = createMarkMaterial(markTexBack, THREE.BackSide);
    }
  }
  if (torusMesh) {
    torusMesh.geometry.dispose();
    scene.remove(torusMesh);
  }
  if (markMeshFront) scene.remove(markMeshFront);
  if (markMeshBack) scene.remove(markMeshBack);
  if (cutOverlayGroup) {
    disposeObject3D(cutOverlayGroup);
    scene.remove(cutOverlayGroup);
    cutOverlayGroup = null;
  }
  const R = getR(), r = getr();
  let geo;
  if (MAP_TYPE === 'sphere') {
    geo = createCubeSphereGeometry();
  } else if (MAP_TYPE === 'genus2') {
    geo = createGenus2Geometry();
  } else if (MAP_TYPE === 'projective') {
    geo = createProjectiveGeometry();
  } else if (MAP_TYPE === 'mobius') {
    geo = createMobiusGeometry();
  } else if (MAP_TYPE === 'klein') {
    geo = createKleinGeometry();
  } else {
    geo = new THREE.TorusGeometry(R, r, 64, 32);
  }
  torusMesh = new THREE.Mesh(geo, torusMaterial);
  torusMesh.position.set(0, 0, 0);
  scene.add(torusMesh);

  if (MAP_TYPE === 'genus2' || MAP_TYPE === 'projective') {
    markMeshFront = new THREE.Mesh(geo, markMaterialFront);
    markMeshFront.renderOrder = 2;
    scene.add(markMeshFront);
  } else {
    markMeshFront = new THREE.Mesh(geo, markMaterialFront);
    markMeshBack = new THREE.Mesh(geo, markMaterialBack);
    markMeshFront.renderOrder = 2;
    markMeshBack.renderOrder = 2;
    scene.add(markMeshFront);
    scene.add(markMeshBack);
  }

  cutOverlayGroup = createCutOverlayGroup();
  if (cutOverlayGroup) scene.add(cutOverlayGroup);
}

function getR() { return BASE_R * fieldScale; }
function getr() { return BASE_R_TUBE * fieldScale; }

const CUBE_FACE_KEYS = ['F', 'R', 'B', 'L', 'U', 'D'];
const CUBE_FACES = {
  F: { n: new THREE.Vector3(0, 0, 1),  r: new THREE.Vector3(1, 0, 0),  d: new THREE.Vector3(0, -1, 0) },
  R: { n: new THREE.Vector3(1, 0, 0),  r: new THREE.Vector3(0, 0, -1), d: new THREE.Vector3(0, -1, 0) },
  B: { n: new THREE.Vector3(0, 0, -1), r: new THREE.Vector3(-1, 0, 0), d: new THREE.Vector3(0, -1, 0) },
  L: { n: new THREE.Vector3(-1, 0, 0), r: new THREE.Vector3(0, 0, 1),  d: new THREE.Vector3(0, -1, 0) },
  U: { n: new THREE.Vector3(0, 1, 0),  r: new THREE.Vector3(1, 0, 0),  d: new THREE.Vector3(0, 0, 1) },
  D: { n: new THREE.Vector3(0, -1, 0), r: new THREE.Vector3(1, 0, 0),  d: new THREE.Vector3(0, 0, -1) },
};
const CUBE_TRANSITIONS = {
  F: {
    L: (x, y) => ({ face: 'L', gx: GRID_SIZE - 1, gy: y, dir: { dx: -1, dy: 0 } }),
    R: (x, y) => ({ face: 'R', gx: 0, gy: y, dir: { dx: 1, dy: 0 } }),
    U: (x, y) => ({ face: 'U', gx: x, gy: GRID_SIZE - 1, dir: { dx: 0, dy: -1 } }),
    D: (x, y) => ({ face: 'D', gx: x, gy: 0, dir: { dx: 0, dy: 1 } }),
  },
  R: {
    L: (x, y) => ({ face: 'F', gx: GRID_SIZE - 1, gy: y, dir: { dx: -1, dy: 0 } }),
    R: (x, y) => ({ face: 'B', gx: 0, gy: y, dir: { dx: 1, dy: 0 } }),
    U: (x, y) => ({ face: 'U', gx: GRID_SIZE - 1, gy: GRID_SIZE - 1 - x, dir: { dx: -1, dy: 0 } }),
    D: (x, y) => ({ face: 'D', gx: GRID_SIZE - 1, gy: x, dir: { dx: -1, dy: 0 } }),
  },
  B: {
    L: (x, y) => ({ face: 'R', gx: GRID_SIZE - 1, gy: y, dir: { dx: -1, dy: 0 } }),
    R: (x, y) => ({ face: 'L', gx: 0, gy: y, dir: { dx: 1, dy: 0 } }),
    U: (x, y) => ({ face: 'U', gx: GRID_SIZE - 1 - x, gy: 0, dir: { dx: 0, dy: 1 } }),
    D: (x, y) => ({ face: 'D', gx: GRID_SIZE - 1 - x, gy: GRID_SIZE - 1, dir: { dx: 0, dy: -1 } }),
  },
  L: {
    L: (x, y) => ({ face: 'B', gx: GRID_SIZE - 1, gy: y, dir: { dx: -1, dy: 0 } }),
    R: (x, y) => ({ face: 'F', gx: 0, gy: y, dir: { dx: 1, dy: 0 } }),
    U: (x, y) => ({ face: 'U', gx: 0, gy: x, dir: { dx: 1, dy: 0 } }),
    D: (x, y) => ({ face: 'D', gx: 0, gy: GRID_SIZE - 1 - x, dir: { dx: 1, dy: 0 } }),
  },
  U: {
    L: (x, y) => ({ face: 'L', gx: y, gy: 0, dir: { dx: 0, dy: 1 } }),
    R: (x, y) => ({ face: 'R', gx: GRID_SIZE - 1 - y, gy: 0, dir: { dx: 0, dy: 1 } }),
    U: (x, y) => ({ face: 'B', gx: GRID_SIZE - 1 - x, gy: 0, dir: { dx: 0, dy: 1 } }),
    D: (x, y) => ({ face: 'F', gx: x, gy: 0, dir: { dx: 0, dy: 1 } }),
  },
  D: {
    L: (x, y) => ({ face: 'L', gx: GRID_SIZE - 1 - y, gy: GRID_SIZE - 1, dir: { dx: 0, dy: -1 } }),
    R: (x, y) => ({ face: 'R', gx: y, gy: GRID_SIZE - 1, dir: { dx: 0, dy: -1 } }),
    U: (x, y) => ({ face: 'F', gx: x, gy: GRID_SIZE - 1, dir: { dx: 0, dy: -1 } }),
    D: (x, y) => ({ face: 'B', gx: GRID_SIZE - 1 - x, gy: GRID_SIZE - 1, dir: { dx: 0, dy: -1 } }),
  },
};

function cubeVector(faceKey, u01, v01) {
  const face = CUBE_FACES[faceKey || 'F'];
  return face.n.clone()
    .add(face.r.clone().multiplyScalar(u01 * 2 - 1))
    .add(face.d.clone().multiplyScalar(v01 * 2 - 1));
}

function cubeCellVector(faceKey, gx, gy) {
  return cubeVector(faceKey, (gx + 0.5) / GRID_SIZE, (gy + 0.5) / GRID_SIZE);
}

function cubeSpherePoint(faceKey, u01, v01) {
  return cubeVector(faceKey, u01, v01).normalize().multiplyScalar(getR());
}

function cubeFaceFromNormal(normal) {
  let bestFace = 'F';
  let bestDot = -Infinity;
  for (const [faceKey, face] of Object.entries(CUBE_FACES)) {
    const score = face.n.dot(normal);
    if (score > bestDot) {
      bestDot = score;
      bestFace = faceKey;
    }
  }
  return bestFace;
}

function createCubeSphereGeometry() {
  const segments = 32;
  const positions = [];
  const uvs = [];
  const indices = [];
  const groups = [];
  const row = segments + 1;

  for (const [faceIndex, faceKey] of CUBE_FACE_KEYS.entries()) {
    const offset = positions.length / 3;
    const face = CUBE_FACES[faceKey];
    const groupStart = indices.length;
    for (let y = 0; y <= segments; y++) {
      const v = y / segments;
      for (let x = 0; x <= segments; x++) {
        const u = x / segments;
        const p = cubeSpherePoint(faceKey, u, v);
        positions.push(p.x, p.y, p.z);
        uvs.push(u, v);
      }
    }
    for (let y = 0; y < segments; y++) {
      for (let x = 0; x < segments; x++) {
        const a = offset + y * row + x;
        const b = offset + y * row + x + 1;
        const c = offset + (y + 1) * row + x;
        const d = offset + (y + 1) * row + x + 1;
        const winding = face.r.clone().cross(face.d).dot(face.n);
        if (winding > 0) indices.push(a, b, c, b, d, c);
        else indices.push(a, c, b, b, c, d);
      }
    }
    groups.push({ start: groupStart, count: indices.length - groupStart, materialIndex: faceIndex });
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  geo.setIndex(indices);
  for (const group of groups) geo.addGroup(group.start, group.count, group.materialIndex);
  geo.computeVertexNormals();
  geo.computeBoundingSphere();
  return geo;
}

const GENUS2_CENTER_OFFSET = 0.58;
const GENUS2_RING_R = 0.58;
const GENUS2_TUBE_R = 0.27;
const GENUS2_SMOOTH = 0.18;
const GENUS2_PATCH_CELLS = 6;
const GENUS2_PATCH_RENDER_SEGMENTS = GENUS2_PATCH_CELLS;
const GENUS2_POLYCUBE_SCALE = { x: 0.58, y: 0.55, z: 0.54 };
const GENUS2_BASE_FACE = 'G2_0_0_0_PZ';

function smoothMin(a, b, k) {
  const h = Math.max(0, Math.min(1, 0.5 + 0.5 * (b - a) / k));
  return b * (1 - h) + a * h - k * h * (1 - h);
}

function genus2TorusDistance(p, cx) {
  const R = GENUS2_RING_R * fieldScale;
  const r = GENUS2_TUBE_R * fieldScale;
  const radial = Math.hypot(p.x - cx, p.y) - R;
  return Math.hypot(radial, p.z) - r;
}

function genus2Field(x, y, z) {
  const offset = GENUS2_CENTER_OFFSET * fieldScale;
  const p = { x, y, z };
  const left = genus2TorusDistance(p, -offset);
  const right = genus2TorusDistance(p, offset);
  return smoothMin(left, right, GENUS2_SMOOTH * fieldScale);
}

function estimateGenus2Normal(x, y, z) {
  const e = 0.008 * fieldScale;
  return new THREE.Vector3(
    genus2Field(x + e, y, z) - genus2Field(x - e, y, z),
    genus2Field(x, y + e, z) - genus2Field(x, y - e, z),
    genus2Field(x, y, z + e) - genus2Field(x, y, z - e),
  ).normalize();
}

const GENUS2_FACE_DIRECTIONS = [
  { key: 'PX', n: [ 1,  0,  0], r: [ 0,  1,  0], d: [ 0,  0, -1] },
  { key: 'NX', n: [-1,  0,  0], r: [ 0, -1,  0], d: [ 0,  0, -1] },
  { key: 'PY', n: [ 0,  1,  0], r: [-1,  0,  0], d: [ 0,  0, -1] },
  { key: 'NY', n: [ 0, -1,  0], r: [ 1,  0,  0], d: [ 0,  0, -1] },
  { key: 'PZ', n: [ 0,  0,  1], r: [ 1,  0,  0], d: [ 0, -1,  0] },
  { key: 'NZ', n: [ 0,  0, -1], r: [ 1,  0,  0], d: [ 0,  1,  0] },
];
const GENUS2_EDGE_KEYS = ['L', 'R', 'U', 'D'];
let genus2TopologyCache = null;

function vec3Key(x, y, z) {
  return `${x},${y},${z}`;
}

function vAdd(a, b) {
  return [a[0] + b[0], a[1] + b[1], a[2] + b[2]];
}

function vSub(a, b) {
  return [a[0] - b[0], a[1] - b[1], a[2] - b[2]];
}

function vScale(a, s) {
  return [a[0] * s, a[1] * s, a[2] * s];
}

function vDot(a, b) {
  return a[0] * b[0] + a[1] * b[1] + a[2] * b[2];
}

function genus2VoxelPoint(face, u, v) {
  return vAdd(
    vAdd(face.c, vScale(face.n, 0.5)),
    vAdd(vScale(face.r, u - 0.5), vScale(face.d, v - 0.5)),
  );
}

function genus2EdgePoint(face, edge, t) {
  if (edge === 'L') return genus2VoxelPoint(face, 0, t);
  if (edge === 'R') return genus2VoxelPoint(face, 1, t);
  if (edge === 'U') return genus2VoxelPoint(face, t, 0);
  return genus2VoxelPoint(face, t, 1);
}

function genus2EdgeKey(a, b) {
  const pa = a.map(v => Math.round(v * 2)).join(',');
  const pb = b.map(v => Math.round(v * 2)).join(',');
  return pa < pb ? `${pa}|${pb}` : `${pb}|${pa}`;
}

function buildGenus2Topology() {
  const voxels = [];
  for (let y = -1; y <= 1; y++) {
    for (let x = -2; x <= 2; x++) {
      if ((x === -1 || x === 1) && y === 0) continue;
      voxels.push({ x, y, z: 0 });
    }
  }

  const solid = new Set(voxels.map(v => vec3Key(v.x, v.y, v.z)));
  const faces = [];
  const faceMap = new Map();

  for (const voxel of voxels) {
    for (const dir of GENUS2_FACE_DIRECTIONS) {
      const nx = voxel.x + dir.n[0];
      const ny = voxel.y + dir.n[1];
      const nz = voxel.z + dir.n[2];
      if (solid.has(vec3Key(nx, ny, nz))) continue;
      const face = {
        key: `G2_${voxel.x}_${voxel.y}_${voxel.z}_${dir.key}`,
        c: [voxel.x, voxel.y, voxel.z],
        n: dir.n,
        r: dir.r,
        d: dir.d,
        transitions: {},
      };
      faces.push(face);
      faceMap.set(face.key, face);
    }
  }

  const edgeMap = new Map();
  for (const face of faces) {
    for (const edge of GENUS2_EDGE_KEYS) {
      const key = genus2EdgeKey(genus2EdgePoint(face, edge, 0), genus2EdgePoint(face, edge, 1));
      if (!edgeMap.has(key)) edgeMap.set(key, []);
      edgeMap.get(key).push({ face, edge });
    }
  }

  for (const records of edgeMap.values()) {
    if (records.length !== 2) continue;
    const [a, b] = records;
    a.face.transitions[a.edge] = { face: b.face.key, edge: b.edge };
    b.face.transitions[b.edge] = { face: a.face.key, edge: a.edge };
  }

  const startFace = faces.find(face =>
    face.c[0] === -2 && face.c[1] === -1 && face.n[2] === 1
  ) || faces[0];
  return { faces, faceMap, startFaceKey: startFace.key };
}

function getGenus2Topology() {
  if (!genus2TopologyCache) genus2TopologyCache = buildGenus2Topology();
  return genus2TopologyCache;
}

function genus2StartFaceKey() {
  return getGenus2Topology().startFaceKey;
}

function randomGenus2FaceKey() {
  const faces = getGenus2Topology().faces;
  return faces[Math.floor(Math.random() * faces.length)].key;
}

function genus2LocalUVFromVoxel(face, p) {
  const center = vAdd(face.c, vScale(face.n, 0.5));
  const delta = vSub(p, center);
  return {
    u: vDot(delta, face.r) + 0.5,
    v: vDot(delta, face.d) + 0.5,
  };
}

function genus2RawPoint(faceKey, u, v) {
  const topology = getGenus2Topology();
  const face = topology.faceMap.get(faceKey) || topology.faceMap.get(topology.startFaceKey);
  const p = genus2VoxelPoint(face, u, v);
  return new THREE.Vector3(
    p[0] * GENUS2_POLYCUBE_SCALE.x * fieldScale,
    p[1] * GENUS2_POLYCUBE_SCALE.y * fieldScale,
    p[2] * GENUS2_POLYCUBE_SCALE.z * fieldScale,
  );
}

function projectToGenus2Surface(point) {
  const p = point.clone();
  for (let i = 0; i < 9; i++) {
    const value = genus2Field(p.x, p.y, p.z);
    if (Math.abs(value) < 0.0008 * fieldScale) break;
    const normal = estimateGenus2Normal(p.x, p.y, p.z);
    p.addScaledVector(normal, -value);
  }
  return p;
}

function genus2SurfacePoint(faceKey, u, v, lift = 0) {
  const p = projectToGenus2Surface(genus2RawPoint(faceKey, u, v));
  if (lift !== 0) p.addScaledVector(estimateGenus2Normal(p.x, p.y, p.z), lift * fieldScale);
  return p;
}

function genus2Point(gx, gy, faceKey = null) {
  const face = faceKey || genus2StartFaceKey();
  return genus2SurfacePoint(
    face,
    (gx + 0.5) / GENUS2_PATCH_CELLS,
    (gy + 0.5) / GENUS2_PATCH_CELLS,
  );
}

function genus2GridVertexKey(faceKey, ix, iy) {
  const topology = getGenus2Topology();
  const face = topology.faceMap.get(faceKey) || topology.faceMap.get(topology.startFaceKey);
  const p = genus2VoxelPoint(face, ix / GENUS2_PATCH_CELLS, iy / GENUS2_PATCH_CELLS);
  return p.map(v => Math.round(v * 2 * GENUS2_PATCH_CELLS)).join(',');
}

function genus2GridVertexPoint(faceKey, ix, iy, lift = 0) {
  return genus2SurfacePoint(
    faceKey,
    ix / GENUS2_PATCH_CELLS,
    iy / GENUS2_PATCH_CELLS,
    lift,
  );
}

function gridEdgeKey(a, b) {
  return a < b ? `${a}|${b}` : `${b}|${a}`;
}

function genus2GridEdgeKey(faceKey, gx, gy, edge) {
  let a, b;
  if (edge === 'L') {
    a = genus2GridVertexKey(faceKey, gx, gy);
    b = genus2GridVertexKey(faceKey, gx, gy + 1);
  } else if (edge === 'R') {
    a = genus2GridVertexKey(faceKey, gx + 1, gy);
    b = genus2GridVertexKey(faceKey, gx + 1, gy + 1);
  } else if (edge === 'U') {
    a = genus2GridVertexKey(faceKey, gx, gy);
    b = genus2GridVertexKey(faceKey, gx + 1, gy);
  } else {
    a = genus2GridVertexKey(faceKey, gx, gy + 1);
    b = genus2GridVertexKey(faceKey, gx + 1, gy + 1);
  }
  return gridEdgeKey(a, b);
}

function addGenus2GraphVertex(vertices, key, point) {
  if (!vertices.has(key)) {
    vertices.set(key, { key, point, edges: [] });
  }
}

function addGenus2GraphEdge(vertices, edges, a, b) {
  const key = gridEdgeKey(a, b);
  if (!edges.has(key)) {
    edges.set(key, { key, a, b });
    vertices.get(a).edges.push(key);
    vertices.get(b).edges.push(key);
  }
}

function buildGenus2GridGraph() {
  const vertices = new Map();
  const edges = new Map();
  const topology = getGenus2Topology();
  for (const face of topology.faces) {
    for (let gy = 0; gy < GENUS2_PATCH_CELLS; gy++) {
      for (let gx = 0; gx < GENUS2_PATCH_CELLS; gx++) {
        const v00 = genus2GridVertexKey(face.key, gx, gy);
        const v10 = genus2GridVertexKey(face.key, gx + 1, gy);
        const v01 = genus2GridVertexKey(face.key, gx, gy + 1);
        const v11 = genus2GridVertexKey(face.key, gx + 1, gy + 1);
        addGenus2GraphVertex(vertices, v00, genus2GridVertexPoint(face.key, gx, gy, 0.04));
        addGenus2GraphVertex(vertices, v10, genus2GridVertexPoint(face.key, gx + 1, gy, 0.04));
        addGenus2GraphVertex(vertices, v01, genus2GridVertexPoint(face.key, gx, gy + 1, 0.04));
        addGenus2GraphVertex(vertices, v11, genus2GridVertexPoint(face.key, gx + 1, gy + 1, 0.04));
        addGenus2GraphEdge(vertices, edges, v00, v01);
        addGenus2GraphEdge(vertices, edges, v10, v11);
        addGenus2GraphEdge(vertices, edges, v00, v10);
        addGenus2GraphEdge(vertices, edges, v01, v11);
      }
    }
  }

  const root = [...vertices.keys()].sort()[0];
  const parent = new Map([[root, null]]);
  const queue = [root];
  while (queue.length > 0) {
    const current = queue.shift();
    const adjacent = vertices.get(current).edges.slice().sort();
    for (const edgeKey of adjacent) {
      const edge = edges.get(edgeKey);
      const next = edge.a === current ? edge.b : edge.a;
      if (parent.has(next)) continue;
      parent.set(next, { vertex: current, edge: edgeKey });
      queue.push(next);
    }
  }

  return { vertices, edges, parent, root };
}

function genus2RootPath(parent, root, vertex) {
  const path = [];
  let current = vertex;
  while (current !== null && current !== undefined) {
    path.push(current);
    if (current === root) break;
    current = parent.get(current)?.vertex;
  }
  return path.reverse();
}

let genus2CutSchemaCache = null;
function genus2CutWaypoint(face, ix, iy) {
  return { face, ix, iy };
}

        genus2CutWaypoint('G2_2_-1_0_PZ', n, n),
        genus2CutWaypoint('G2_2_-1_0_PZ', 0, n),
        genus2CutWaypoint('G2_1_-1_0_PZ', n, n),
        genus2CutWaypoint('G2_1_-1_0_PZ', 0, n),
        genus2CutWaypoint('G2_0_-1_0_PZ', n, n),
        genus2CutWaypoint('G2_0_-1_0_PZ', h, n),
        genus2CutWaypoint('G2_0_-1_0_PZ', h, 0),

}

function genus2WaypointWithKey(vertex) {
  return {
    ...vertex,
    key: genus2GridVertexKey(vertex.face, vertex.ix, vertex.iy),
  };
}

function pushGenus2CutPoint(points, point) {
  const last = points[points.length - 1];
  if (!last || last.key !== point.key || (point.face && last.face !== point.face)) {
    points.push(point);
  }
}

function appendGenus2CutLine(points, face, from, to) {
  let ix = from.ix;
  let iy = from.iy;
  const sx = Math.sign(to.ix - from.ix);
  const sy = Math.sign(to.iy - from.iy);
  while (ix !== to.ix) {
    ix += sx;
    pushGenus2CutPoint(points, genus2WaypointWithKey({ face, ix, iy }));
  }
  while (iy !== to.iy) {
    iy += sy;
    pushGenus2CutPoint(points, genus2WaypointWithKey({ face, ix, iy }));
  }
}

function genus2ShortestVertexPath(graph, startKey, endKey) {
  const parent = new Map([[startKey, null]]);
  const queue = [startKey];
  while (queue.length > 0 && !parent.has(endKey)) {
    const current = queue.shift();
    for (const edgeKey of graph.vertices.get(current)?.edges || []) {
      const edge = graph.edges.get(edgeKey);
      const next = edge.a === current ? edge.b : edge.a;
      if (parent.has(next)) continue;
      parent.set(next, current);
      queue.push(next);
    }
  }
  if (!parent.has(endKey)) return [startKey, endKey];

  const path = [];
  let current = endKey;
  while (current !== null) {
    path.push(current);
    current = parent.get(current);
  }
  return path.reverse();
}

function appendGenus2CutSegment(points, graph, fromVertex, toVertex) {
  const from = genus2WaypointWithKey(fromVertex);
  const to = genus2WaypointWithKey(toVertex);
  pushGenus2CutPoint(points, from);
  if (from.key === to.key) return;

  if (from.face === to.face) {
    appendGenus2CutLine(points, from.face, from, to);
    return;
  }

  const path = genus2ShortestVertexPath(graph, from.key, to.key);
  for (let i = 1; i < path.length; i++) {
    pushGenus2CutPoint(points, { face: null, ix: null, iy: null, key: path[i] });
  }
}

function buildGenus2CutPoints(def, graph) {
  const points = [];
  for (let i = 0; i < def.vertices.length - 1; i++) {
    appendGenus2CutSegment(points, graph, def.vertices[i], def.vertices[i + 1]);
  }
  return points;
}

function buildGenus2CutEdges(def, points) {
  const cuts = [];
  for (let i = 1; i < points.length; i++) {
    const a = points[i - 1];
    const b = points[i];
    if (a.key === b.key) continue;
    cuts.push({
      label: def.label,
      color: CUT_COLORS[def.label],
      edgeKey: gridEdgeKey(a.key, b.key),
      face: a.face === b.face ? a.face : null,
      tx: a.face === b.face ? b.ix - a.ix : 0,
      ty: a.face === b.face ? b.iy - a.iy : 0,
    });
  }
  return cuts;
}

function getGenus2CutSchema() {
  if (!genus2CutSchemaCache) {
    const graph = buildGenus2GridGraph();
    const cuts = [];
    const loops = genus2CutPathDefs().map(def => {
      const points = buildGenus2CutPoints(def, graph);
      cuts.push(...buildGenus2CutEdges(def, points));
      return {
        label: def.label,
        color: CUT_COLORS[def.label],
        points: points
          .filter((point, i) => i === 0 || point.key !== points[i - 1].key)
          .map(point => graph.vertices.get(point.key).point),
      };
    });
    const byEdgeKey = new Map();
    for (const cut of cuts) {
      if (!byEdgeKey.has(cut.edgeKey)) byEdgeKey.set(cut.edgeKey, []);
      byEdgeKey.get(cut.edgeKey).push(cut);
    }
    genus2CutSchemaCache = {
      cuts,
      graph,
      loops,
      byEdgeKey,
    };
  }
  return genus2CutSchemaCache;
}

function createGenus2Geometry() {
  const positions = [];
  const uvs = [];
  const topology = getGenus2Topology();
  const segments = GENUS2_PATCH_RENDER_SEGMENTS;

  function addVertex(p, u, v) {
    positions.push(p.x, p.y, p.z);
    uvs.push(u, v);
  }

  function addTriangle(a, b, c, auv, buv, cuv) {
    const center = new THREE.Vector3().add(a).add(b).add(c).multiplyScalar(1 / 3);
    const outward = estimateGenus2Normal(center.x, center.y, center.z);
    const winding = new THREE.Vector3().subVectors(b, a).cross(new THREE.Vector3().subVectors(c, a));
    if (winding.dot(outward) < 0) {
      addVertex(a, auv.u, auv.v);
      addVertex(c, cuv.u, cuv.v);
      addVertex(b, buv.u, buv.v);
    } else {
      addVertex(a, auv.u, auv.v);
      addVertex(b, buv.u, buv.v);
      addVertex(c, cuv.u, cuv.v);
    }
  }

  for (const face of topology.faces) {
    for (let y = 0; y < segments; y++) {
      const v0 = y / segments;
      const v1 = (y + 1) / segments;
      for (let x = 0; x < segments; x++) {
        const u0 = x / segments;
        const u1 = (x + 1) / segments;
        const p00 = genus2SurfacePoint(face.key, u0, v0);
        const p10 = genus2SurfacePoint(face.key, u1, v0);
        const p01 = genus2SurfacePoint(face.key, u0, v1);
        const p11 = genus2SurfacePoint(face.key, u1, v1);
        addTriangle(p00, p10, p01, { u: u0, v: v0 }, { u: u1, v: v0 }, { u: u0, v: v1 });
        addTriangle(p10, p11, p01, { u: u1, v: v0 }, { u: u1, v: v1 }, { u: u0, v: v1 });
      }
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  let groupStart = 0;
  const verticesPerFace = GENUS2_PATCH_RENDER_SEGMENTS * GENUS2_PATCH_RENDER_SEGMENTS * 6;
  for (let i = 0; i < topology.faces.length; i++) {
    geo.addGroup(groupStart, verticesPerFace, i);
    groupStart += verticesPerFace;
  }
  geo.computeVertexNormals();
  geo.computeBoundingSphere();
  return geo;
}

function createParametricGridGeometry(uSegments, vSegments, pointFn) {
  const positions = [];
  const uvs = [];
  const indices = [];
  const row = vSegments + 1;

  for (let i = 0; i <= uSegments; i++) {
    const u = i / uSegments;
    for (let j = 0; j <= vSegments; j++) {
      const v = j / vSegments;
      const p = pointFn(u, v);
      positions.push(p.x, p.y, p.z);
      uvs.push(u, v);
    }
  }

  for (let i = 0; i < uSegments; i++) {
    for (let j = 0; j < vSegments; j++) {
      const a = i * row + j;
      const b = (i + 1) * row + j;
      const c = i * row + j + 1;
      const d = (i + 1) * row + j + 1;
      indices.push(a, b, c, b, d, c);
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  geo.setIndex(indices);
  geo.computeVertexNormals();
  geo.computeBoundingSphere();
  return geo;
}

function mobiusPointUV(u01, v01) {
  const u = u01 * Math.PI * 2;
  const width = 0.48 * fieldScale;
  const R = 1.22 * fieldScale;
  const t = (v01 - 0.5) * 2 * width;
  const twist = u / 2;
  const radial = R + t * Math.cos(twist);
  return new THREE.Vector3(
    radial * Math.cos(u),
    t * Math.sin(twist),
    radial * Math.sin(u),
  );
}

function createMobiusGeometry() {
  return createParametricGridGeometry(128, 20, mobiusPointUV);
}

function projectiveSquareToDisk(a, b) {
  return {
    x: a * Math.sqrt(Math.max(0, 1 - (b * b) / 2)),
    y: b * Math.sqrt(Math.max(0, 1 - (a * a) / 2)),
  };
}

function projectivePointUV(u01, v01) {
  const a = u01 * 2 - 1;
  const b = v01 * 2 - 1;
  const disk = projectiveSquareToDisk(a, b);
  const radius = Math.min(1, Math.hypot(disk.x, disk.y));
  const theta = Math.atan2(disk.y, disk.x);
  const v = radius * Math.PI / 2;
  const x = Math.cos(theta) * Math.sin(2 * v);
  const y = Math.sin(theta) * Math.sin(2 * v);
  const z = Math.cos(v) ** 2 - Math.cos(theta) ** 2 * Math.sin(v) ** 2;
  const s = 1.35 * fieldScale;
  return new THREE.Vector3(
    x * s,
    z * s * 0.78,
    y * s,
  );
}

function createProjectiveGeometry() {
  return createParametricGridGeometry(128, 128, projectivePointUV);
}

function kleinPointUV(u01, v01) {
  const u = u01 * Math.PI * 2;
  const v = v01 * Math.PI * 2;
  const tube = 2 * (1 - Math.cos(u) / 2);
  let x;
  let z;
  if (u < Math.PI) {
    x = 3 * Math.cos(u) * (1 + Math.sin(u)) + tube * Math.cos(u) * Math.cos(v);
    z = -8 * Math.sin(u) - tube * Math.sin(u) * Math.cos(v);
  } else {
    x = 3 * Math.cos(u) * (1 + Math.sin(u)) + tube * Math.cos(v + Math.PI);
    z = -8 * Math.sin(u);
  }
  const y = -tube * Math.sin(v);
  const s = 0.17 * fieldScale;
  return new THREE.Vector3(
    x * s,
    -z * s * 0.78,
    y * s,
  );
}

function createKleinGeometry() {
  return createParametricGridGeometry(128, 32, kleinPointUV);
}

function createMarkMaterial(map, side) {
  return new THREE.MeshBasicMaterial({
    map,
    transparent: true,
    alphaTest: 0.03,
    side,
    depthWrite: false,
    polygonOffset: true,
    polygonOffsetFactor: -1,
    polygonOffsetUnits: -1,
  });
}

function textureCellPx() {
  if (MAP_TYPE === 'sphere') return SPHERE_FACE_TEX_SIZE / GRID_SIZE;
  if (MAP_TYPE === 'genus2') return GENUS2_FACE_TEX_SIZE / GENUS2_PATCH_CELLS;
  return TEX_SIZE / GRID_SIZE;
}

function markContextFor(item) {
  if (MAP_TYPE === 'sphere') {
    return sphereMarkCtxFront[item.face || 'F'];
  }
  if (MAP_TYPE === 'genus2') {
    return genus2MarkCtx[item.face || genus2StartFaceKey()];
  }
  return item.side === -1 ? markCtxBack : markCtxFront;
}

function cellCenter(gx, gy, face = 'F') {
  const size = MAP_TYPE === 'sphere'
    ? SPHERE_FACE_TEX_SIZE
    : (MAP_TYPE === 'genus2' ? GENUS2_FACE_TEX_SIZE : TEX_SIZE);
  const gridSize = MAP_TYPE === 'genus2' ? GENUS2_PATCH_CELLS : GRID_SIZE;
  const px = size / gridSize;
  return {
    x: (gx + 0.5) * px,
    y: (gy + 0.5) * px,
  };
}

function drawFoodMark(ctx, f) {
  const { x: cx, y: cy } = cellCenter(f.gx, f.gy, f.face);
  const px = textureCellPx();
  const def = FOOD_DEF[f.type];
  const lifeLeft = 1 - f.age / FOOD_LIFETIME;
  const time = performance.now() / 1000;
  const pulse = 0.6 + 0.4 * Math.sin(time * 4 + f.gx * 2.5 + f.gy * 3.1);
  ctx.fillStyle = '#' + def.color.toString(16).padStart(6, '0');
  ctx.globalAlpha = (0.5 + 0.5 * lifeLeft) * pulse;
  ctx.beginPath();
  ctx.arc(cx, cy, px * 0.38, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 0.9;
  ctx.beginPath();
  ctx.arc(cx, cy, px * 0.12, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#fff';
  ctx.font = `${Math.max(8, Math.floor(px * 0.38))}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(def.label, cx, cy);
}

function drawSnakeMark(ctx, s, i) {
  const center = cellCenter(s.gx, s.gy, s.face);
  const px = textureCellPx();
  const sx = center.x - px / 2;
  const sy = center.y - px / 2;
  const pad = 1;
  if (i === 0) {
    ctx.fillStyle = '#ffdd57';
    ctx.fillRect(sx + pad, sy + pad, px - pad * 2, px - pad * 2);
    const dir = direction;
    const cx = center.x;
    const cy = center.y;
    const er = px * 0.10;
    ctx.fillStyle = '#061018';
    let ex1, ey1, ex2, ey2;
    if (dir.dx === 1)      { ex1 = cx + px*0.18; ey1 = cy - px*0.18; ex2 = cx + px*0.18; ey2 = cy + px*0.18; }
    else if (dir.dx === -1) { ex1 = cx - px*0.18; ey1 = cy - px*0.18; ex2 = cx - px*0.18; ey2 = cy + px*0.18; }
    else if (dir.dy === -1) { ex1 = cx - px*0.18; ey1 = cy - px*0.18; ex2 = cx + px*0.18; ey2 = cy - px*0.18; }
    else                   { ex1 = cx - px*0.18; ey1 = cy + px*0.18; ex2 = cx + px*0.18; ey2 = cy + px*0.18; }
    ctx.beginPath(); ctx.arc(ex1, ey1, er, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ex2, ey2, er, 0, Math.PI*2); ctx.fill();
  } else {
    const alpha = 0.55 + 0.45 * (1 - i / Math.max(snake.length, 1));
    ctx.fillStyle = `rgba(255,140,66,${alpha.toFixed(2)})`;
    ctx.fillRect(sx + pad, sy + pad, px - pad * 2, px - pad * 2);
  }
}

function drawSurfaceGrid(ctx, size) {
  if (MAP_TYPE === 'projective') {
    ctx.strokeStyle = 'rgba(168,228,210,0.11)';
    ctx.lineWidth = 1;
    const px = size / GRID_SIZE;
    for (let i = 1; i < GRID_SIZE; i++) {
      const pos = i * px;
      ctx.beginPath(); ctx.moveTo(pos, 0); ctx.lineTo(pos, size); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, pos); ctx.lineTo(size, pos); ctx.stroke();
    }
    return;
  }
  ctx.strokeStyle = 'rgba(168,228,210,0.26)';
  ctx.lineWidth = 1;
  const gridSize = MAP_TYPE === 'genus2' ? GENUS2_PATCH_CELLS : GRID_SIZE;
  const px = size / gridSize;
  for (let i = 0; i <= gridSize; i++) {
    const pos = i * px;
    ctx.beginPath(); ctx.moveTo(pos, 0); ctx.lineTo(pos, size); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, pos); ctx.lineTo(size, pos); ctx.stroke();
  }
}

function drawCutLabel(ctx, label, x, y, color, radius) {
  ctx.save();
  ctx.fillStyle = color;
  ctx.strokeStyle = 'rgba(6,16,24,0.9)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = '#061018';
  ctx.font = `${Math.max(9, Math.floor(radius * 1.25))}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, x, y + 0.5);
  ctx.restore();
}

function drawTorusCutMarks(ctx) {
  if (MAP_TYPE !== 'torus') return;
  const size = TEX_SIZE;
  const x = TORUS_CUT_X * cellPx;
  const y = TORUS_CUT_Y * cellPx;

  ctx.save();
  ctx.globalAlpha = 0.95;
  ctx.lineCap = 'round';
  ctx.lineWidth = 5;

  ctx.strokeStyle = CUT_COLORS.a;
  ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, size); ctx.stroke();
  drawCutLabel(ctx, 'a', x, cellPx * 0.75, CUT_COLORS.a, cellPx * 0.38);

  ctx.strokeStyle = CUT_COLORS.b;
  ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(size, y); ctx.stroke();
  drawCutLabel(ctx, 'b', cellPx * 0.75, y, CUT_COLORS.b, cellPx * 0.38);
  ctx.restore();
}

function drawGenus2CutMark(ctx, cut) {
  const px = GENUS2_FACE_TEX_SIZE / GENUS2_PATCH_CELLS;
  let x1, y1, x2, y2;
  if (cut.edge === 'L') {
    x1 = x2 = cut.gx * px;
    y1 = cut.gy * px;
    y2 = (cut.gy + 1) * px;
  } else if (cut.edge === 'R') {
    x1 = x2 = (cut.gx + 1) * px;
    y1 = cut.gy * px;
    y2 = (cut.gy + 1) * px;
  } else if (cut.edge === 'U') {
    x1 = cut.gx * px;
    x2 = (cut.gx + 1) * px;
    y1 = y2 = cut.gy * px;
  } else {
    x1 = cut.gx * px;
    x2 = (cut.gx + 1) * px;
    y1 = y2 = (cut.gy + 1) * px;
  }

  ctx.save();
  ctx.globalAlpha = 0.98;
  ctx.lineCap = 'round';
  ctx.strokeStyle = cut.color;
  ctx.lineWidth = 18;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  if (cut.showLabel) {
    drawCutLabel(ctx, cut.label, (x1 + x2) / 2, (y1 + y2) / 2, cut.color, px * 0.24);
  }
  ctx.restore();
}

function drawTopologyCutMarks() {
  drawTorusCutMarks(markCtxFront);
}

function redrawTexture() {
  const ctx = texCtx;
  const size = TEX_SIZE;

  // Background
  ctx.fillStyle = '#24384a';
  ctx.fillRect(0, 0, size, size);

  drawSurfaceGrid(ctx, size);

  markCtxFront.clearRect(0, 0, size, size);
  markCtxBack.clearRect(0, 0, size, size);
  for (const faceKey of CUBE_FACE_KEYS) {
    sphereMarkCtxFront[faceKey].clearRect(0, 0, SPHERE_FACE_TEX_SIZE, SPHERE_FACE_TEX_SIZE);
    sphereMarkCtxBack[faceKey].clearRect(0, 0, SPHERE_FACE_TEX_SIZE, SPHERE_FACE_TEX_SIZE);
  }
  for (const face of getGenus2Topology().faces) {
    genus2MarkCtx[face.key].clearRect(0, 0, GENUS2_FACE_TEX_SIZE, GENUS2_FACE_TEX_SIZE);
  }

  drawTopologyCutMarks();

  for (const f of foods) {
    drawFoodMark(markContextFor(f), f);
  }

  for (let i = snake.length - 1; i >= 0; i--) {
    drawSnakeMark(markContextFor(snake[i]), snake[i], i);
  }

  gridTex.needsUpdate = true;
  markTexFront.needsUpdate = true;
  markTexBack.needsUpdate = true;
  for (const faceKey of CUBE_FACE_KEYS) {
    sphereMarkTexFront[faceKey].needsUpdate = true;
    sphereMarkTexBack[faceKey].needsUpdate = true;
  }
  for (const face of getGenus2Topology().faces) {
    genus2MarkTex[face.key].needsUpdate = true;
  }
}

/* ===========================
   COORDINATE SYSTEM
   =========================== */
function to3D(gx, gy, face = 'F') {
  if (MAP_TYPE === 'genus2') {
    const p = genus2Point(gx, gy, face || genus2StartFaceKey());
    return { x: p.x, y: p.y, z: p.z };
  }
  if (MAP_TYPE === 'projective') {
    const p = projectivePointUV((gx + 0.5) / GRID_SIZE, (gy + 0.5) / GRID_SIZE);
    return { x: p.x, y: p.y, z: p.z };
  }
  if (MAP_TYPE === 'sphere') {
    const p = cubeSpherePoint(face, (gx + 0.5) / GRID_SIZE, (gy + 0.5) / GRID_SIZE);
    return { x: p.x, y: p.y, z: p.z };
  }
  if (MAP_TYPE === 'mobius') {
    const p = mobiusPointUV(gx / GRID_SIZE, gy / (GRID_SIZE - 1));
    return { x: p.x, y: p.y, z: p.z };
  }
  if (MAP_TYPE === 'klein') {
    const p = kleinPointUV(gx / GRID_SIZE, gy / GRID_SIZE);
    return { x: p.x, y: p.y, z: p.z };
  }
  const R = getR();
  const r = getr();
  const theta = (gx / GRID_SIZE) * Math.PI * 2;
  const cosTheta = Math.cos(theta);
  const sinTheta = Math.sin(theta);
  const phi = (gy / GRID_SIZE) * Math.PI * 2;
  const cosPhi = Math.cos(phi);
  const sinPhi = Math.sin(phi);
  return {
    x: (R + r * cosPhi) * cosTheta,
    y: r * sinPhi,
    z: (R + r * cosPhi) * sinTheta,
  };
}

function surfaceNormal(gx, gy, face = 'F') {
  if (MAP_TYPE === 'genus2') {
    const p = genus2Point(gx, gy, face || genus2StartFaceKey());
    return estimateGenus2Normal(p.x, p.y, p.z);
  }
  if (MAP_TYPE === 'projective') {
    const u = gx / GRID_SIZE;
    const v = gy / GRID_SIZE;
    const step = 1 / GRID_SIZE;
    const du = projectivePointUV(u + step, v).sub(projectivePointUV(u - step, v));
    const dv = projectivePointUV(u, v + step).sub(projectivePointUV(u, v - step));
    return new THREE.Vector3().crossVectors(du, dv).normalize();
  }
  if (MAP_TYPE === 'mobius' || MAP_TYPE === 'klein') {
    const u = gx / GRID_SIZE;
    const v = MAP_TYPE === 'mobius' ? gy / (GRID_SIZE - 1) : gy / GRID_SIZE;
    const pointFn = MAP_TYPE === 'mobius' ? mobiusPointUV : kleinPointUV;
    const du = pointFn(u + 1 / GRID_SIZE, v).sub(pointFn(u - 1 / GRID_SIZE, v));
    const dvStep = 1 / (GRID_SIZE - 1);
    const dv = pointFn(u, v + dvStep).sub(pointFn(u, v - dvStep));
    return new THREE.Vector3().crossVectors(du, dv).normalize();
  }
  if (MAP_TYPE === 'sphere') {
    return cubeSpherePoint(face, (gx + 0.5) / GRID_SIZE, (gy + 0.5) / GRID_SIZE).normalize();
  }
  const R = getR();
  const r = getr();
  const theta = (gx / GRID_SIZE) * Math.PI * 2;
  const cosTheta = Math.cos(theta);
  const sinTheta = Math.sin(theta);
  const phi = (gy / GRID_SIZE) * Math.PI * 2;
  const cosPhi = Math.cos(phi);
  const sinPhi = Math.sin(phi);
  return new THREE.Vector3(
    cosPhi * cosTheta,
    sinPhi,
    cosPhi * sinTheta,
  );
}

function disposeMaterial(material) {
  if (Array.isArray(material)) {
    material.forEach(disposeMaterial);
    return;
  }
  if (!material) return;
  if (material.map) material.map.dispose();
  material.dispose();
}

function disposeObject3D(object) {
  object.traverse(child => {
    if (child.geometry) child.geometry.dispose();
    if (child.material) disposeMaterial(child.material);
  });
}

function makeCutTube(points, color, radius, closed = false) {
  const curve = new THREE.CatmullRomCurve3(points, closed);
  const geometry = new THREE.TubeGeometry(curve, Math.max(8, points.length * 2), radius * fieldScale, 10, closed);
  const material = new THREE.MeshBasicMaterial({
    color: new THREE.Color(color),
    transparent: true,
    opacity: 0.98,
    depthWrite: false,
    depthTest: false,
  });
  const mesh = new THREE.Mesh(geometry, material);
  mesh.renderOrder = 4;
  return mesh;
}

function makeCutLabelSprite(label, color, scale) {
  const canvas = document.createElement('canvas');
  const size = 96;
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, size, size);
  ctx.fillStyle = color;
  ctx.strokeStyle = 'rgba(6,16,24,0.92)';
  ctx.lineWidth = 8;
  ctx.beginPath();
  ctx.arc(size / 2, size / 2, size * 0.34, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = '#061018';
  ctx.font = 'bold 42px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, size / 2, size / 2 + 2);

  const texture = new THREE.CanvasTexture(canvas);
  texture.colorSpace = THREE.SRGBColorSpace;
  const material = new THREE.SpriteMaterial({
    map: texture,
    transparent: true,
    depthWrite: false,
    depthTest: false,
  });
  const sprite = new THREE.Sprite(material);
  sprite.scale.set(scale * fieldScale, scale * fieldScale, scale * fieldScale);
  sprite.renderOrder = 5;
  return sprite;
}

function createCutOverlayGroup() {
  if (!LOOP_WIN_MAPS.has(MAP_TYPE)) return null;
  const group = new THREE.Group();
  group.name = 'cut-overlay';

  if (MAP_TYPE === 'torus') {
    return null;
  } else if (MAP_TYPE === 'genus2') {
    for (const loop of getGenus2CutSchema().loops) {
      group.add(makeCutTube(loop.points, loop.color, 0.014, false));
      const sprite = makeCutLabelSprite(loop.label, loop.color, 0.13);
      const labelPoint = loop.points[Math.floor(loop.points.length / 2)] || loop.points[0];
      sprite.position.copy(labelPoint);
      group.add(sprite);
    }
  }

  return group.children.length > 0 ? group : null;
}

/* ===========================
   SNAKE
   =========================== */
let snake = [];
let direction, nextDir, chartDisplayDir, chartMirror;
let pi1LastStep = null;

function wrapGrid(v) {
  return ((v % GRID_SIZE) + GRID_SIZE) % GRID_SIZE;
}

function clampCell(v) {
  return Math.max(0, Math.min(GRID_SIZE - 1, v));
}

function clampGenus2Cell(v) {
  return Math.max(0, Math.min(GENUS2_PATCH_CELLS - 1, v));
}

function normalizeCubeSpherePosition(gx, gy, dir, side, faceKey) {
  let currentFace = faceKey || 'F';
  let ndir = dir ? { ...dir } : null;
  let guard = 0;
  while ((gx < 0 || gx >= GRID_SIZE || gy < 0 || gy >= GRID_SIZE) && guard++ < 12) {
    let edge;
    let overshoot;
    if (gx < 0) {
      edge = 'L';
      overshoot = -gx - 1;
    } else if (gx >= GRID_SIZE) {
      edge = 'R';
      overshoot = gx - GRID_SIZE;
    } else if (gy < 0) {
      edge = 'U';
      overshoot = -gy - 1;
    } else {
      edge = 'D';
      overshoot = gy - GRID_SIZE;
    }

    const transition = CUBE_TRANSITIONS[currentFace][edge](clampCell(gx), clampCell(gy));
    ndir = transition.dir;
    gx = transition.gx + ndir.dx * overshoot;
    gy = transition.gy + ndir.dy * overshoot;
    currentFace = transition.face;
  }
  return {
    gx: clampCell(gx),
    gy: clampCell(gy),
    dir: ndir,
    side,
    face: currentFace,
  };
}

function genus2InwardDirection(edge) {
  if (edge === 'L') return { dx: 1, dy: 0 };
  if (edge === 'R') return { dx: -1, dy: 0 };
  if (edge === 'U') return { dx: 0, dy: 1 };
  return { dx: 0, dy: -1 };
}

function genus2EntryCell(edge, edgeCell) {
  if (edge === 'L') return { gx: 0, gy: edgeCell };
  if (edge === 'R') return { gx: GENUS2_PATCH_CELLS - 1, gy: edgeCell };
  if (edge === 'U') return { gx: edgeCell, gy: 0 };
  return { gx: edgeCell, gy: GENUS2_PATCH_CELLS - 1 };
}

function genus2EdgeSample(face, edge, edgeCell) {
  const t = (edgeCell + 0.5) / GENUS2_PATCH_CELLS;
  return genus2EdgePoint(face, edge, t);
}

function normalizeGenus2Position(gx, gy, dir, side, faceKey) {
  const topology = getGenus2Topology();
  let currentFaceKey = faceKey || topology.startFaceKey;
  let ndir = dir ? { ...dir } : null;
  let guard = 0;

  while ((gx < 0 || gx >= GENUS2_PATCH_CELLS || gy < 0 || gy >= GENUS2_PATCH_CELLS) && guard++ < 20) {
    let edge;
    let overshoot;
    let edgeCell;
    if (gx < 0) {
      edge = 'L';
      overshoot = -gx - 1;
      edgeCell = clampGenus2Cell(gy);
    } else if (gx >= GENUS2_PATCH_CELLS) {
      edge = 'R';
      overshoot = gx - GENUS2_PATCH_CELLS;
      edgeCell = clampGenus2Cell(gy);
    } else if (gy < 0) {
      edge = 'U';
      overshoot = -gy - 1;
      edgeCell = clampGenus2Cell(gx);
    } else {
      edge = 'D';
      overshoot = gy - GENUS2_PATCH_CELLS;
      edgeCell = clampGenus2Cell(gx);
    }

    const currentFace = topology.faceMap.get(currentFaceKey);
    const transition = currentFace?.transitions[edge];
    if (!transition) return { gx, gy, dir: ndir, side, face: currentFaceKey, blocked: true };

    const sample = genus2EdgeSample(currentFace, edge, edgeCell);
    const nextFace = topology.faceMap.get(transition.face);
    const uv = genus2LocalUVFromVoxel(nextFace, sample);
    const nextEdgeCell = transition.edge === 'L' || transition.edge === 'R'
      ? clampGenus2Cell(Math.floor(uv.v * GENUS2_PATCH_CELLS))
      : clampGenus2Cell(Math.floor(uv.u * GENUS2_PATCH_CELLS));
    const entry = genus2EntryCell(transition.edge, nextEdgeCell);
    ndir = genus2InwardDirection(transition.edge);
    gx = entry.gx + ndir.dx * overshoot;
    gy = entry.gy + ndir.dy * overshoot;
    currentFaceKey = transition.face;
  }

  return {
    gx: clampGenus2Cell(gx),
    gy: clampGenus2Cell(gy),
    dir: ndir,
    side,
    face: currentFaceKey,
    mirror: 1,
  };
}

function normalizeGridPosition(gx, gy, dir = null, side = 1, face = null) {
  const ndir = dir ? { ...dir } : null;
  let nside = side;
  let mirror = 1;

  if (MAP_TYPE === 'sphere') {
    return normalizeCubeSpherePosition(gx, gy, ndir, nside, face || 'F');
  }

  if (MAP_TYPE === 'genus2') {
    return normalizeGenus2Position(gx, gy, ndir, nside, face || genus2StartFaceKey());
  }

  if (MAP_TYPE === 'projective') {
    while (gx < 0 || gx >= GRID_SIZE) {
      gx += gx < 0 ? GRID_SIZE : -GRID_SIZE;
      gy = GRID_SIZE - 1 - gy;
      mirror *= -1;
      if (ndir) ndir.dy *= -1;
    }
    while (gy < 0 || gy >= GRID_SIZE) {
      gy += gy < 0 ? GRID_SIZE : -GRID_SIZE;
      gx = GRID_SIZE - 1 - gx;
      mirror *= -1;
      if (ndir) ndir.dx *= -1;
    }
    return { gx, gy, dir: ndir, side: 1, mirror };
  }

  if (MAP_TYPE === 'mobius') {
    while (gx < 0 || gx >= GRID_SIZE) {
      gx += gx < 0 ? GRID_SIZE : -GRID_SIZE;
      gy = GRID_SIZE - 1 - gy;
      nside *= -1;
      mirror *= -1;
      if (ndir) ndir.dy *= -1;
    }
    while (gy < 0 || gy >= GRID_SIZE) {
      gy = gy < 0 ? -gy - 1 : (GRID_SIZE - 1) - (gy - GRID_SIZE);
      nside *= -1;
      mirror *= -1;
      if (ndir) ndir.dy *= -1;
    }
    return { gx, gy, dir: ndir, side: nside, mirror };
  }

  if (MAP_TYPE === 'klein') {
    while (gx < 0 || gx >= GRID_SIZE) {
      gx += gx < 0 ? GRID_SIZE : -GRID_SIZE;
      gy = wrapGrid(GRID_SIZE / 2 - 1 - gy);
      nside *= -1;
      mirror *= -1;
      if (ndir) ndir.dy *= -1;
    }
    return { gx, gy: wrapGrid(gy), dir: ndir, side: nside, mirror };
  }

  return { gx: wrapGrid(gx), gy: wrapGrid(gy), dir: ndir, side: nside, mirror };
}

function inverseLetter(letter) {
  return letter === letter.toLowerCase() ? letter.toUpperCase() : letter.toLowerCase();
}

function invertWord(word) {
  return word.slice().reverse().map(inverseLetter);
}

function freeReduceWord(word) {
  const reduced = [];
  for (const letter of word) {
    if (reduced.length > 0 && inverseLetter(letter) === reduced[reduced.length - 1]) {
      reduced.pop();
    } else {
      reduced.push(letter);
    }
  }
  return reduced;
}

function relatorVariants(relator) {
  const variants = [];
  const sources = [relator, invertWord(relator)];
  for (const source of sources) {
    for (let i = 0; i < source.length; i++) {
      variants.push(source.slice(i).concat(source.slice(0, i)));
    }
  }
  return variants;
}

const GENUS2_RELATOR_VARIANTS = relatorVariants(GENUS2_RELATOR);

function arraysEqual(a, b) {
  if (a.length !== b.length) return false;
  for (let i = 0; i < a.length; i++) {
    if (a[i] !== b[i]) return false;
  }
  return true;
}

function reduceGenus2Word(word) {
  let current = freeReduceWord(word);
  let changed = true;
  let guard = 0;
  while (changed && guard++ < 200) {
    changed = false;
    current = freeReduceWord(current);

    for (let start = 0; start < current.length && !changed; start++) {
      const maxLen = Math.min(GENUS2_RELATOR.length, current.length - start);
      for (let len = maxLen; len > GENUS2_RELATOR.length / 2; len--) {
        const segment = current.slice(start, start + len);
        const variant = GENUS2_RELATOR_VARIANTS.find(candidate => arraysEqual(segment, candidate.slice(0, len)));
        if (!variant) continue;
        const replacement = invertWord(variant.slice(len));
        current = freeReduceWord([
          ...current.slice(0, start),
          ...replacement,
          ...current.slice(start + len),
        ]);
        changed = true;
        break;
      }
    }
  }
  return current;
}

function emptyTopologyState() {
  if (MAP_TYPE === 'torus') return { wx: 0, wy: 0 };
  if (MAP_TYPE === 'genus2') return { word: [] };
  return null;
}

function cloneTopologyState(state) {
  if (!state) return emptyTopologyState();
  if (MAP_TYPE === 'torus') return { wx: state.wx || 0, wy: state.wy || 0 };
  if (MAP_TYPE === 'genus2') return { word: [...(state.word || [])] };
  return null;
}

function torusStepDelta(from, moveDir) {
  let wx = 0;
  let wy = 0;
  if (moveDir.dx === 1 && (from.gx + 1) % GRID_SIZE === TORUS_CUT_X) wx = 1;
  if (moveDir.dx === -1 && from.gx === TORUS_CUT_X) wx = -1;
  if (moveDir.dy === 1 && (from.gy + 1) % GRID_SIZE === TORUS_CUT_Y) wy = 1;
  if (moveDir.dy === -1 && from.gy === TORUS_CUT_Y) wy = -1;
  return { wx, wy };
}

function moveDirToEdge(moveDir) {
  if (moveDir.dx === 1) return 'R';
  if (moveDir.dx === -1) return 'L';
  if (moveDir.dy === 1) return 'D';
  return 'U';
}

function genus2MoveEdgeKey(from, moveDir) {
  return genus2GridEdgeKey(
    from.face || genus2StartFaceKey(),
    from.gx,
    from.gy,
    moveDirToEdge(moveDir),
  );
}

function genus2StepCrossingCandidates(from, moveDir) {
  const edgeKey = genus2MoveEdgeKey(from, moveDir);
  const cuts = getGenus2CutSchema().byEdgeKey.get(edgeKey);
  const face = from.face || genus2StartFaceKey();
  return (cuts || []).map(cut => {
    const det = cut.tx * moveDir.dy - cut.ty * moveDir.dx;
    return {
      cut,
      det,
      letter: det >= 0 ? cut.label : cut.label.toUpperCase(),
      sameFace: cut.face === face,
    };
  });
}

function genus2SelectedStepCrossing(from, moveDir) {
  const candidates = genus2StepCrossingCandidates(from, moveDir);
  if (candidates.length === 0) return null;
  return candidates.find(candidate => candidate.sameFace) || candidates[0];
}

function genus2StepWord(from, moveDir) {
  const crossing = genus2SelectedStepCrossing(from, moveDir);
  return crossing ? [crossing.letter] : [];
}

function advanceTopologyState(state, from, moveDir) {
  if (!LOOP_WIN_MAPS.has(MAP_TYPE)) return null;
  const current = cloneTopologyState(state);
  if (MAP_TYPE === 'torus') {
    const delta = torusStepDelta(from, moveDir);
    return {
      wx: current.wx + delta.wx,
      wy: current.wy + delta.wy,
    };
  }
  if (MAP_TYPE === 'genus2') {
    return {
      word: reduceGenus2Word([...current.word, ...genus2StepWord(from, moveDir)]),
    };
  }
  return null;
}

function inferStepDirection(from, to) {
  const directions = [
    { dx: 1, dy: 0 },
    { dx: -1, dy: 0 },
    { dx: 0, dy: 1 },
    { dx: 0, dy: -1 },
  ];
  for (const dir of directions) {
    const next = normalizeGridPosition(from.gx + dir.dx, from.gy + dir.dy, dir, from.side, from.face);
    if (
      !next.blocked &&
      next.gx === to.gx &&
      next.gy === to.gy &&
      sameSurfaceSide(next.side, to.side) &&
      sameSurfaceFace(next.face, to.face)
    ) {
      return dir;
    }
  }
  return null;
}

function initializeSnakeTopology() {
  if (!LOOP_WIN_MAPS.has(MAP_TYPE) || snake.length === 0) return;
  const states = new Array(snake.length);
  let state = emptyTopologyState();
  states[snake.length - 1] = cloneTopologyState(state);

  for (let i = snake.length - 1; i > 0; i--) {
    const dir = inferStepDirection(snake[i], snake[i - 1]);
    if (dir) state = advanceTopologyState(state, snake[i], dir);
    states[i - 1] = cloneTopologyState(state);
  }

  snake = snake.map((segment, i) => ({
    ...segment,
    topo: cloneTopologyState(states[i]),
  }));
}

function loopWordLabel(word) {
  return word.length > 0 ? word.join('') : '1';
}

function wordFormula(word) {
  return word && word.length > 0 ? word.join('') : '1';
}

function setPi1Text(id, text, warn = false) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = text;
  el.className = 'pi1-val' + (warn ? ' pi1-warn' : '');
}

function describeGenus2Move(from, moveDir) {
  const candidates = genus2StepCrossingCandidates(from, moveDir);
  const selected = genus2SelectedStepCrossing(from, moveDir);
  const face = from.face || genus2StartFaceKey();
  if (!selected) {
    return {
      step: '未穿过 cut',
      move: `(${moveDir.dx}, ${moveDir.dy})`,
      cut: '-',
      det: '-',
    };
  }
  const candidateText = candidates.length > 1
    ? `候选 ${candidates.map(c => c.letter).join(',')}；采用 ${selected.letter}`
    : `cut ${selected.cut.label} -> ${selected.letter}`;
  return {
    step: `${candidateText} @ ${face}`,
    move: `(${moveDir.dx}, ${moveDir.dy})`,
    cut: `(${selected.cut.tx}, ${selected.cut.ty})`,
    det: `${selected.cut.tx}*${moveDir.dy} - ${selected.cut.ty}*${moveDir.dx} = ${selected.det}`,
  };
}

function updatePi1Panel() {
  const panel = document.getElementById('pi1-panel');
  if (!panel) return;
  if (MAP_TYPE !== 'genus2') {
    panel.style.display = 'none';
    return;
  }
  panel.style.display = 'block';
  setPi1Text('pi1Rel', `${GENUS2_RELATOR.join('')} = 1`);

  const head = snake[0];
  if (!head) return;
  const tail = snake[snake.length - 1];

  const last = pi1LastStep || {
    step: '尚未移动',
    move: '-',
    cut: '-',
    det: '-',
  };
  setPi1Text('pi1Step', last.step, last.step.includes('候选'));
  setPi1Text('pi1Move', last.move);
  setPi1Text('pi1Cut', last.cut);
  setPi1Text('pi1Det', last.det);
  setPi1Text('pi1Head', wordFormula(head.topo?.word));
  setPi1Text('pi1Tail', wordFormula(tail.topo?.word));

  const bodyWord = reduceGenus2Word([
    ...invertWord(tail.topo?.word || []),
    ...(head.topo?.word || []),
  ]);
  setPi1Text('pi1Body', `T^-1 H = ${wordFormula(bodyWord)}`);

  const dir = nextDir || direction;
  if (!dir) {
    setPi1Text('pi1Close', '-');
    return;
  }
  const next = normalizeGridPosition(head.gx + dir.dx, head.gy + dir.dy, dir, head.side, head.face);
  const hitSelfIdx = next.blocked
    ? -1
    : snake.findIndex(s => sameSnakeCell(s, next.gx, next.gy, next.side ?? 1, next.face ?? null));
  if (hitSelfIdx === -1) {
    setPi1Text('pi1Close', '下一步未闭合');
    return;
  }

  const newTopo = advanceTopologyState(head.topo, head, dir);
  const hitTopo = cloneTopologyState(snake[hitSelfIdx].topo);
  const rawLoopWord = [
    ...invertWord(hitTopo.word || []),
    ...((newTopo && newTopo.word) || []),
  ];
  const loopWord = reduceGenus2Word(rawLoopWord);
  setPi1Text(
    'pi1Close',
    `S${hitSelfIdx}^-1 H' = ${wordFormula(rawLoopWord)} -> ${wordFormula(loopWord)} (${loopWord.length > 0 ? '非平凡' : '平凡'})`,
    loopWord.length === 0,
  );
}

function genus2ClosureInfo(newTopo, hitSelfIdx) {
  const hitTopo = cloneTopologyState(snake[hitSelfIdx].topo);
  const word = reduceGenus2Word([
    ...invertWord(hitTopo.word || []),
    ...((newTopo && newTopo.word) || []),
  ]);
  return {
    nontrivial: word.length > 0,
    label: loopWordLabel(word),
  };
}

function selfClosureInfo(newTopo, hitSelfIdx) {
  if (!LOOP_WIN_MAPS.has(MAP_TYPE) || snake.length === 0) return null;
  const hitTopo = cloneTopologyState(snake[hitSelfIdx].topo);
  if (MAP_TYPE === 'torus') {
    const wx = (newTopo?.wx || 0) - hitTopo.wx;
    const wy = (newTopo?.wy || 0) - hitTopo.wy;
    const parts = [];
    if (wx !== 0) parts.push(`a:${wx}`);
    if (wy !== 0) parts.push(`b:${wy}`);
    return {
      nontrivial: wx !== 0 || wy !== 0,
      label: parts.join(' ') || '1',
    };
  }
  if (MAP_TYPE === 'genus2') {
    return genus2ClosureInfo(newTopo, hitSelfIdx);
  }
  return null;
}

function buildInitialSnake(head, length) {
  const body = [{ ...head }];
  const targetLength = Math.max(1, Math.floor(length));
  let current = { ...head };
  const backDir = { dx: -1, dy: 0 };

  for (let i = 1; i < targetLength; i++) {
    const next = normalizeGridPosition(
      current.gx + backDir.dx,
      current.gy + backDir.dy,
      backDir,
      current.side,
      current.face,
    );
    if (next.blocked) break;
    current = {
      gx: next.gx,
      gy: next.gy,
      side: next.side ?? 1,
      face: next.face ?? null,
    };
    body.push({ ...current });
  }

  return body;
}

function resetSnake() {
  pi1LastStep = null;
  if (MAP_TYPE === 'genus2') {
    const face = genus2StartFaceKey();
    const gy = Math.floor(GENUS2_PATCH_CELLS / 2);
    snake = buildInitialSnake(
      { gx: Math.floor(GENUS2_PATCH_CELLS / 2), gy, side: 1, face },
      INITIAL_SNAKE_LENGTH,
    );
    direction = { dx: 1, dy: 0 };
    nextDir = { dx: 1, dy: 0 };
    chartDisplayDir = { dx: 1, dy: 0 };
    chartMirror = 1;
    initializeSnakeTopology();
    return;
  }
  const face = MAP_TYPE === 'sphere' ? 'F' : null;
  snake = buildInitialSnake(
    { gx: Math.floor(GRID_SIZE / 2), gy: Math.floor(GRID_SIZE / 2), side: 1, face },
    INITIAL_SNAKE_LENGTH,
  );
  direction = { dx: 1, dy: 0 };
  nextDir = { dx: 1, dy: 0 };
  chartDisplayDir = { dx: 1, dy: 0 };
  chartMirror = 1;
  initializeSnakeTopology();
}

/* ===========================
   FOOD
   =========================== */
let foods = [];

/* ===========================
   GAME STATE
   =========================== */
let fieldScale = 1.0;
let score, lives, speed, best, running, paused;
let spawnTimer;
let msgs = [];
let tickStartTime = 0;
let tickInterval = 100;
let loop = null;

function speedLabel() {
  if (speed <= 55) return '极快';
  if (speed <= 75) return '快';
  if (speed <= 115) return '正常';
  if (speed <= 170) return '慢';
  return '很慢';
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
  const hearts = [];
  for (let i = 0; i < lives; i++) hearts.push('❤');
  document.getElementById('lives').textContent = hearts.join(' ') || '💀';
  document.getElementById('speedLabel').textContent = speedLabel();
  document.getElementById('pauseOverlay').style.display = paused ? 'flex' : 'none';
  document.getElementById('pauseBtn').textContent = paused ? '继续' : '暂停';
}

function sameSnakeCell(a, gx, gy, side, face) {
  return a.gx === gx && a.gy === gy && sameSurfaceSide(a.side, side) && sameSurfaceFace(a.face, face);
}

function togglePause() {
  if (!running) return;
  paused = !paused;
  updateUI();
}

function setMsg(text, cls) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg-area' + (cls ? ' ' + cls : '');
}

function addMsg(text, cls) {
  msgs.push({ text, cls, time: performance.now() });
  if (msgs.length > 5) msgs.shift();
  // Show latest non-expired message
  const now = performance.now();
  const recent = msgs.filter(m => now - m.time < 2000);
  if (recent.length > 0) {
    const m = recent[recent.length - 1];
    setMsg(m.text, m.cls);
  }
}

/* ===========================
   GAME LOGIC
   =========================== */
function pickFoodType() {
  const total = Object.values(FOOD_DEF).reduce((s, t) => s + t.weight, 0);
  let r = Math.random() * total;
  for (const [key, val] of Object.entries(FOOD_DEF)) {
    r -= val.weight;
    if (r <= 0) return key;
  }
  return 'grow';
}

function sameSurfaceSide(a, b) {
  return (a ?? 1) === (b ?? 1);
}

function sameSurfaceFace(a, b) {
  return (a ?? null) === (b ?? null);
}

function isOccupied(gx, gy, side = 1, face = null) {
  if (snake.some(s => sameSnakeCell(s, gx, gy, side, face))) return true;
  if (foods.some(f => f.gx === gx && f.gy === gy && sameSurfaceSide(f.side, side) && sameSurfaceFace(f.face, face))) return true;
  return false;
}

function trySpawnFood() {
  if (foods.length >= MAX_FOODS) return;
  const type = pickFoodType();
  for (let attempt = 0; attempt < 80; attempt++) {
    const gridSize = MAP_TYPE === 'genus2' ? GENUS2_PATCH_CELLS : GRID_SIZE;
    const gx = Math.floor(Math.random() * gridSize);
    const gy = Math.floor(Math.random() * gridSize);
    const side = ['mobius', 'klein'].includes(MAP_TYPE) && Math.random() < 0.5 ? -1 : 1;
    const face = MAP_TYPE === 'sphere'
      ? CUBE_FACE_KEYS[Math.floor(Math.random() * CUBE_FACE_KEYS.length)]
      : (MAP_TYPE === 'genus2' ? randomGenus2FaceKey() : null);
    if (!isOccupied(gx, gy, side, face)) {
      foods.push({ gx, gy, side, face, type, age: 0 });
      return;
    }
  }
}

function applyEffect(type) {
  switch (type) {
    case 'grow':
      score++;
      if (score > best) {
        best = score;
        localStorage.setItem(`snake3dBest_${MAP_TYPE}`, best);
      }
      addMsg('变长 +1', 'good');
      break;
    case 'expand':
      if (fieldScale < MAX_FIELD_SCALE) {
        fieldScale = Math.min(MAX_FIELD_SCALE, fieldScale + 0.08);
        ensureSurfaceGeometry();
        addMsg('场地扩大！', 'good');
      } else { addMsg('场地已达最大', 'warn'); }
      break;
    case 'slow':
      speed = Math.min(speed + 30, 250);
      restartLoop();
      addMsg('减速！', 'good');
      break;
    case 'extraLife':
      lives++;
      addMsg('+1 生命', 'good');
      break;
    case 'shrink':
      if (snake.length > 2) { snake.pop(); snake.pop(); }
      else if (snake.length > 1) { snake.pop(); }
      addMsg('身体缩短！', 'warn');
      break;
    case 'shrinkField':
      if (fieldScale > MIN_FIELD_SCALE) {
        fieldScale = Math.max(MIN_FIELD_SCALE, fieldScale - 0.08);
        ensureSurfaceGeometry();
        addMsg('场地缩小！', 'warn');
      } else { addMsg('场地已到最小', 'warn'); }
      break;
    case 'speedUp':
      speed = Math.max(speed - 30, 40);
      restartLoop();
      addMsg('加速！', 'warn');
      break;
    case 'loseLife':
      loseLife();
      break;
  }
}

function loseLife() {
  lives--;
  if (lives <= 0) {
    running = false;
    setMsg('游戏结束！', 'dead');
    addMsg('游戏结束！', 'dead');
  } else {
    addMsg('-1 生命！剩余 ' + lives + ' 条', 'warn');
  }
}

function die(reason = '撞到自己！') {
  lives--;
  if (lives <= 0) {
    running = false;
    setMsg('游戏结束！', 'dead');
    addMsg('游戏结束！', 'dead');
  } else {
    resetSnakeOnDeath();
    addMsg(reason + '剩余 ' + lives + ' 条命', 'warn');
  }
}

function winByLoop(info) {
  running = false;
  const text = `胜利！首尾闭合为非平凡回路 ${info.label}`;
  setMsg(text, 'good');
  addMsg(text, 'good');
}

function resetSnakeOnDeath() {
  if (MAP_TYPE === 'genus2') {
    resetSnake();
    return;
  }
  const face = MAP_TYPE === 'sphere' ? 'F' : null;
  snake = buildInitialSnake(
    { gx: Math.floor(GRID_SIZE / 2), gy: Math.floor(GRID_SIZE / 2), side: 1, face },
    INITIAL_SNAKE_LENGTH,
  );
  direction = { dx: 1, dy: 0 };
  nextDir = { dx: 1, dy: 0 };
  chartDisplayDir = { dx: 1, dy: 0 };
  chartMirror = 1;
  initializeSnakeTopology();
}

function gameTick() {
  if (!running || paused) return;

  tickStartTime = performance.now();
  tickInterval = speed;

  // Age foods
  foods = foods.filter(f => { f.age++; return f.age < FOOD_LIFETIME; });

  // Spawn timer
  spawnTimer--;
  if (spawnTimer <= 0) {
    spawnTimer = SPAWN_INTERVAL;
    trySpawnFood();
  }

  direction = { ...nextDir };

  const head = snake[0];
  const moveDir = { ...direction };
  const next = normalizeGridPosition(head.gx + direction.dx, head.gy + direction.dy, direction, head.side, head.face);
  if (next.blocked) {
    die('撞到边界！');
    return;
  }
  const newGx = next.gx;
  const newGy = next.gy;
  const newSide = next.side ?? 1;
  const newFace = next.face ?? null;
  direction = next.dir;
  nextDir = { ...direction };
  chartMirror *= next.mirror ?? 1;
  const newHead = {
    gx: newGx,
    gy: newGy,
    side: newSide,
    face: newFace,
    topo: advanceTopologyState(head.topo, head, moveDir),
  };
  if (MAP_TYPE === 'genus2') {
    pi1LastStep = describeGenus2Move(head, moveDir);
  }

  const hitSelfIdx = snake.findIndex(s => sameSnakeCell(s, newGx, newGy, newSide, newFace));
  if (hitSelfIdx !== -1) {
    const closure = selfClosureInfo(newHead.topo, hitSelfIdx);
    snake = [newHead, ...snake.slice(0, hitSelfIdx)];
    if (closure?.nontrivial) {
      winByLoop(closure);
      updateUI();
      return;
    }

    if (closure) {
      addMsg('平凡闭合，尾部被切掉', 'warn');
    } else {
      addMsg('撞断身体！保留前 ' + snake.length + ' 节', 'warn');
    }
    updateUI();
    return;
  }

  snake.unshift(newHead);

  // Food collision
  const eatenIdx = foods.findIndex(f => f.gx === newGx && f.gy === newGy && sameSurfaceSide(f.side, newSide) && sameSurfaceFace(f.face, newFace));
  if (eatenIdx !== -1) {
    const eaten = foods[eatenIdx];
    foods.splice(eatenIdx, 1);
    applyEffect(eaten.type);
  } else {
    snake.pop();
  }

  updateUI();
}

function restartLoop() {
  clearInterval(loop);
  loop = setInterval(gameTick, speed);
}

/* ===========================
   CAMERA
   =========================== */
function resetCamera() {
  camera.position.set(3.5, 2.8, 5.5);
  controls.target.set(0, 0, 0);
  controls.update();
}

function directionAngle(dir) {
  if (dir.dx === 1) return 0;
  if (dir.dy === 1) return 1;
  if (dir.dx === -1) return 2;
  return 3;
}

function rotateGridVector(vec, turns) {
  const n = ((turns % 4) + 4) % 4;
  if (n === 1) return { dx: -vec.dy, dy: vec.dx };
  if (n === 2) return { dx: -vec.dx, dy: -vec.dy };
  if (n === 3) return { dx: vec.dy, dy: -vec.dx };
  return { dx: vec.dx, dy: vec.dy };
}

function reflectAcrossDirectionAxis(vec, axisDir) {
  if (axisDir.dx !== 0) return { dx: vec.dx, dy: -vec.dy };
  return { dx: -vec.dx, dy: vec.dy };
}

function surfaceToChartVector(vec) {
  const baseDir = nextDir || direction;
  const oriented = chartMirror === -1 ? reflectAcrossDirectionAxis(vec, baseDir) : vec;
  const turns = directionAngle(chartDisplayDir) - directionAngle(baseDir);
  return rotateGridVector(oriented, turns);
}

function chartToSurfaceDirection(dir) {
  const baseDir = nextDir || direction;
  const turns = directionAngle(baseDir) - directionAngle(chartDisplayDir);
  const rotated = rotateGridVector(dir, turns);
  return chartMirror === -1 ? reflectAcrossDirectionAxis(rotated, baseDir) : rotated;
}

function queueChartDirection(displayDir) {
  const surfaceDir = chartToSurfaceDirection(displayDir);
  const activeDir = nextDir || direction;
  if (surfaceDir.dx === -activeDir.dx && surfaceDir.dy === -activeDir.dy) return;
  nextDir = surfaceDir;
  chartDisplayDir = { ...displayDir };
}

/* ===========================
   INPUT
   =========================== */
document.addEventListener('keydown', e => {
  const key = e.key.toLowerCase();

  if (key === ' ' || key === 'spacebar' || key === 'p') {
    e.preventDefault();
    togglePause();
    return;
  }

  if (key === 'r') {
    resetCamera();
    return;
  }

  if (!running || paused) return;

  switch (key) {
    case 'arrowup':    case 'w': queueChartDirection({ dx:  0, dy: -1 }); break;
    case 'arrowdown':  case 's': queueChartDirection({ dx:  0, dy:  1 }); break;
    case 'arrowleft':  case 'a': queueChartDirection({ dx: -1, dy:  0 }); break;
    case 'arrowright': case 'd': queueChartDirection({ dx:  1, dy:  0 }); break;
  }
});

document.getElementById('restart').addEventListener('click', () => {
  clearInterval(loop);
  init();
  loop = setInterval(gameTick, speed);
});

document.getElementById('pauseBtn').addEventListener('click', togglePause);
document.getElementById('resetCam').addEventListener('click', resetCamera);

/* ===========================
   INIT
   =========================== */
function init() {
  fieldScale = 1.0;
  ensureSurfaceGeometry();
  score = 0;
  lives = 3;
  speed = 100;
  running = true;
  paused = false;
  foods = [];
  spawnTimer = SPAWN_INTERVAL;
  msgs = [];
  best = parseInt(localStorage.getItem(`snake3dBest_${MAP_TYPE}`) || '0');

  resetSnake();

  // Seed initial foods
  trySpawnFood();
  trySpawnFood();

  setMsg('');
  updateUI();
  resetCamera();
  tickStartTime = performance.now();
}

/* ===========================
   LOCAL MAP (2D CHART)
   =========================== */
const mapCanvas = document.getElementById('mapCanvas');
const MAP_CTX = mapCanvas.getContext('2d');
const MAP_CELLS = 9;
const MAP_PX = mapCanvas.width / MAP_CELLS;
const MAP_HALF = Math.floor(MAP_CELLS / 2);

function drawMiniMap() {
  if (snake.length === 0) return;
  const ctx = MAP_CTX;
  const head = snake[0];
  const dir = chartDisplayDir;

  // Background
  ctx.fillStyle = '#223447';
  ctx.fillRect(0, 0, mapCanvas.width, mapCanvas.height);

  // Grid
  ctx.strokeStyle = 'rgba(168,228,210,0.32)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= MAP_CELLS; i++) {
    const p = i * MAP_PX;
    ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, mapCanvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(mapCanvas.width, p); ctx.stroke();
  }

  // Map world coordinates to chart pixel center.
  function worldToChart(gx, gy, side = 1, face = null) {
    let best = null;
    for (let ry = -MAP_HALF; ry <= MAP_HALF; ry++) {
      for (let rx = -MAP_HALF; rx <= MAP_HALF; rx++) {
        const p = normalizeGridPosition(head.gx + rx, head.gy + ry, null, head.side, head.face);
        if (
          p.blocked ||
          p.gx !== gx ||
          p.gy !== gy ||
          !sameSurfaceSide(p.side, side) ||
          !sameSurfaceFace(p.face, face)
        ) continue;
        const dist = Math.abs(rx) + Math.abs(ry);
        if (!best || dist < best.dist) best = { rx, ry, dist };
      }
    }
    if (!best) return null;
    const screenOffset = surfaceToChartVector({ dx: best.rx, dy: best.ry });
    return {
      cx: (screenOffset.dx + MAP_HALF) * MAP_PX + MAP_PX / 2,
      cy: (screenOffset.dy + MAP_HALF) * MAP_PX + MAP_PX / 2,
    };
  }

  // Food
  for (const f of foods) {
    const m = worldToChart(f.gx, f.gy, f.side, f.face);
    if (!m) continue;
    const def = FOOD_DEF[f.type];
    const r = MAP_PX * 0.35;
    ctx.fillStyle = '#' + def.color.toString(16).padStart(6, '0');
    ctx.beginPath(); ctx.arc(m.cx, m.cy, r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = `${Math.max(7, Math.floor(MAP_PX*0.30))}px monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(def.label, m.cx, m.cy);
  }

  // Snake (tail first, head on top)
  for (let i = snake.length - 1; i >= 0; i--) {
    const s = snake[i];
    const m = worldToChart(s.gx, s.gy, s.side, s.face);
    if (!m) continue;
    const pad = 1;
    const x = m.cx - MAP_PX / 2;
    const y = m.cy - MAP_PX / 2;
    if (i === 0) {
      ctx.fillStyle = '#ffdd57';
      ctx.fillRect(x + pad, y + pad, MAP_PX - pad * 2, MAP_PX - pad * 2);
      // Eyes
      const er = MAP_PX * 0.10;
      ctx.fillStyle = '#061018';
      let ex1, ey1, ex2, ey2;
      if (dir.dx === 1)       { ex1 = m.cx + MAP_PX*0.18; ey1 = m.cy - MAP_PX*0.18; ex2 = m.cx + MAP_PX*0.18; ey2 = m.cy + MAP_PX*0.18; }
      else if (dir.dx === -1) { ex1 = m.cx - MAP_PX*0.18; ey1 = m.cy - MAP_PX*0.18; ex2 = m.cx - MAP_PX*0.18; ey2 = m.cy + MAP_PX*0.18; }
      else if (dir.dy === -1) { ex1 = m.cx - MAP_PX*0.18; ey1 = m.cy - MAP_PX*0.18; ex2 = m.cx + MAP_PX*0.18; ey2 = m.cy - MAP_PX*0.18; }
      else                    { ex1 = m.cx - MAP_PX*0.18; ey1 = m.cy + MAP_PX*0.18; ex2 = m.cx + MAP_PX*0.18; ey2 = m.cy + MAP_PX*0.18; }
      ctx.beginPath(); ctx.arc(ex1, ey1, er, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex2, ey2, er, 0, Math.PI * 2); ctx.fill();
    } else {
      const alpha = 0.55 + 0.45 * (1 - i / Math.max(snake.length, 1));
      ctx.fillStyle = `rgba(255,140,66,${alpha.toFixed(2)})`;
      ctx.fillRect(x + pad, y + pad, MAP_PX - pad * 2, MAP_PX - pad * 2);
    }
  }

  // Center cell highlight
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 2;
  const chx = MAP_HALF * MAP_PX, chy = MAP_HALF * MAP_PX;
  ctx.strokeRect(chx + 0.5, chy + 0.5, MAP_PX - 1, MAP_PX - 1);

  // Direction arrow on head
  const acx = MAP_HALF * MAP_PX + MAP_PX / 2;
  const acy = MAP_HALF * MAP_PX + MAP_PX / 2;
  ctx.fillStyle = '#061018';
  ctx.beginPath();
  const alen = MAP_PX * 0.3;
  const ax = acx + dir.dx * alen;
  const ay = acy + dir.dy * alen;
  ctx.moveTo(ax, ay);
  ctx.lineTo(ax - dir.dy * alen * 0.35, ay + dir.dx * alen * 0.35);
  ctx.lineTo(ax + dir.dy * alen * 0.35, ay - dir.dx * alen * 0.35);
  ctx.closePath();
  ctx.fill();
}

/* ===========================
   RENDER LOOP
   =========================== */
function render() {
  requestAnimationFrame(render);

  redrawTexture();
  drawMiniMap();
  updatePi1Panel();
  controls.update();
  renderer.render(scene, camera);
}

init();
loop = setInterval(gameTick, speed);
render();
</script>
