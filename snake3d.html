  }
}

/* ===========================
   COORDINATE SYSTEM
   =========================== */
function to3D(gx, gy, face = 'F') {
  if (MAP_TYPE === 'genus2') {
    const p = genus2Point(gx, gy, face || genus2StartFaceKey());
    return { x: p.x, y: p.y, z: p.z };
  }
  if (MAP_TYPE === 'projective') {
    const p = projectivePointUV((gx + 0.5) / GRID_SIZE, (gy + 0.5) / GRID_SIZE);
    return { x: p.x, y: p.y, z: p.z };
  }
  if (MAP_TYPE === 'sphere') {
    const p = cubeSpherePoint(face, (gx + 0.5) / GRID_SIZE, (gy + 0.5) / GRID_SIZE);
    return { x: p.x, y: p.y, z: p.z };
  }
  if (MAP_TYPE === 'mobius') {
    const p = mobiusPointUV(gx / GRID_SIZE, gy / (GRID_SIZE - 1));
    return { x: p.x, y: p.y, z: p.z };
  }
  if (MAP_TYPE === 'klein') {
    const p = kleinPointUV(gx / GRID_SIZE, gy / GRID_SIZE);
    return { x: p.x, y: p.y, z: p.z };
  }
  const R = getR();
  const r = getr();
  const theta = (gx / GRID_SIZE) * Math.PI * 2;
  const cosTheta = Math.cos(theta);
  const sinTheta = Math.sin(theta);
  const phi = (gy / GRID_SIZE) * Math.PI * 2;
  const cosPhi = Math.cos(phi);
  const sinPhi = Math.sin(phi);
  return {
    x: (R + r * cosPhi) * cosTheta,
    y: r * sinPhi,
    z: (R + r * cosPhi) * sinTheta,
  };
}

function surfaceNormal(gx, gy, face = 'F') {
  if (MAP_TYPE === 'genus2') {
    const p = genus2Point(gx, gy, face || genus2StartFaceKey());
    return estimateGenus2Normal(p.x, p.y, p.z);
  }
  if (MAP_TYPE === 'projective') {
    const u = gx / GRID_SIZE;
    const v = gy / GRID_SIZE;
    const step = 1 / GRID_SIZE;
    const du = projectivePointUV(u + step, v).sub(projectivePointUV(u - step, v));
    const dv = projectivePointUV(u, v + step).sub(projectivePointUV(u, v - step));
    return new THREE.Vector3().crossVectors(du, dv).normalize();
  }
  if (MAP_TYPE === 'mobius' || MAP_TYPE === 'klein') {
    const u = gx / GRID_SIZE;
    const v = MAP_TYPE === 'mobius' ? gy / (GRID_SIZE - 1) : gy / GRID_SIZE;
    const pointFn = MAP_TYPE === 'mobius' ? mobiusPointUV : kleinPointUV;
    const du = pointFn(u + 1 / GRID_SIZE, v).sub(pointFn(u - 1 / GRID_SIZE, v));
    const dvStep = 1 / (GRID_SIZE - 1);
    const dv = pointFn(u, v + dvStep).sub(pointFn(u, v - dvStep));
    return new THREE.Vector3().crossVectors(du, dv).normalize();
  }
  if (MAP_TYPE === 'sphere') {
    return cubeSpherePoint(face, (gx + 0.5) / GRID_SIZE, (gy + 0.5) / GRID_SIZE).normalize();
  }
  const R = getR();
  const r = getr();
  const theta = (gx / GRID_SIZE) * Math.PI * 2;
  const cosTheta = Math.cos(theta);
  const sinTheta = Math.sin(theta);
  const phi = (gy / GRID_SIZE) * Math.PI * 2;
  const cosPhi = Math.cos(phi);
  const sinPhi = Math.sin(phi);
  return new THREE.Vector3(
    cosPhi * cosTheta,
    sinPhi,
    cosPhi * sinTheta,
  );
}

function disposeMaterial(material) {
  if (Array.isArray(material)) {
    material.forEach(disposeMaterial);
    return;
  }
  if (!material) return;
  if (material.map) material.map.dispose();
  material.dispose();
}

function disposeObject3D(object) {
  object.traverse(child => {
    if (child.geometry) child.geometry.dispose();
    if (child.material) disposeMaterial(child.material);
  });
}

function makeCutTube(points, color, radius, closed = false) {
  const curve = new THREE.CatmullRomCurve3(points, closed);
  const geometry = new THREE.TubeGeometry(curve, Math.max(8, points.length * 2), radius * fieldScale, 10, closed);
  const material = new THREE.MeshBasicMaterial({
    color: new THREE.Color(color),
    transparent: true,
    opacity: 0.98,
    depthWrite: false,
    depthTest: false,
  });
  const mesh = new THREE.Mesh(geometry, material);
  mesh.renderOrder = 4;
  return mesh;
}

function makeCutPolylineTube(points, color, radius, depthTest = false) {
  if (points.length < 2) return new THREE.Group();
  const path = new THREE.CurvePath();
  for (let i = 1; i < points.length; i++) {
    path.add(new THREE.LineCurve3(points[i - 1], points[i]));
  }
  const geometry = new THREE.TubeGeometry(path, Math.max(8, points.length * 2), radius * fieldScale, 10, false);
  const material = new THREE.MeshBasicMaterial({
    color: new THREE.Color(color),
    transparent: true,
    opacity: 0.98,
    depthWrite: false,
    depthTest,
  });
  const mesh = new THREE.Mesh(geometry, material);
  mesh.renderOrder = 4;
  return mesh;
}

function makeCutLabelSprite(label, color, scale) {
  const canvas = document.createElement('canvas');
  const size = 96;
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, size, size);
  ctx.fillStyle = color;
  ctx.strokeStyle = 'rgba(6,16,24,0.92)';
  ctx.lineWidth = 8;
  ctx.beginPath();
  ctx.arc(size / 2, size / 2, size * 0.34, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = '#061018';
  ctx.font = 'bold 42px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, size / 2, size / 2 + 2);

  const texture = new THREE.CanvasTexture(canvas);
  texture.colorSpace = THREE.SRGBColorSpace;
  const material = new THREE.SpriteMaterial({
    map: texture,
    transparent: true,
    depthWrite: false,
    depthTest: false,
  });
  const sprite = new THREE.Sprite(material);
  sprite.scale.set(scale * fieldScale, scale * fieldScale, scale * fieldScale);
  sprite.renderOrder = 5;
  return sprite;
}

function sampleParametricLoop(pointFn, count, uvAt) {
  const points = [];
  for (let i = 0; i < count; i++) {
    const uv = uvAt(i / count);
    points.push(pointFn(uv.u, uv.v));
  }
  return points;
}

function sampleParametricPath(pointFn, segments, uvAt) {
  const points = [];
  for (let i = 0; i <= segments; i++) {
    const uv = uvAt(i / segments);
    points.push(pointFn(uv.u, uv.v));
  }
  return points;
}

function projectiveBoundaryOverlayPoints() {
  return sampleParametricLoop(projectivePointUV, 96, t => {
    const q = t * 4;
    if (q < 1) return { u: q, v: 0 };
    if (q < 2) return { u: 1, v: q - 1 };
    if (q < 3) return { u: 3 - q, v: 1 };
    return { u: 0, v: 4 - q };
  });
}

function kleinCutOverlayPaths() {
  const uA = KLEIN_CUT_A_X / GRID_SIZE;
  const vB = KLEIN_CUT_B_Y / GRID_SIZE;
  return [
    {
      label: 'a',
      color: CUT_COLORS.a,
      points: sampleParametricPath(kleinPointUV, 128, t => ({ u: uA, v: t })),
    },
    {
      label: 'b',
      color: CUT_COLORS.b,
      points: sampleParametricPath(kleinPointUV, 160, t => ({ u: t, v: vB })),
    },
  ];
}

function createCutOverlayGroup() {
  if (!LOOP_WIN_MAPS.has(MAP_TYPE)) return null;
  const group = new THREE.Group();
  group.name = 'cut-overlay';

  if (MAP_TYPE === 'torus') {
    return null;
  } else if (MAP_TYPE === 'genus2') {
    for (const loop of getGenus2CutSchema().loops) {
      group.add(makeCutTube(loop.points, loop.color, 0.014, false));
      const sprite = makeCutLabelSprite(loop.label, loop.color, 0.13);
      const labelPoint = loop.points[Math.floor(loop.points.length / 2)] || loop.points[0];
      sprite.position.copy(labelPoint);
      group.add(sprite);
    }
  } else if (MAP_TYPE === 'projective') {
    const points = projectiveBoundaryOverlayPoints();
    group.add(makeCutTube(points, CUT_COLORS.a, 0.012, true));
    const sprite = makeCutLabelSprite('a', CUT_COLORS.a, 0.13);
    sprite.position.copy(points[Math.floor(points.length * 0.12)] || points[0]);
    group.add(sprite);
  } else if (MAP_TYPE === 'klein') {
    for (const path of kleinCutOverlayPaths()) {
      group.add(makeCutPolylineTube(path.points, path.color, 0.012, false));
      const sprite = makeCutLabelSprite(path.label, path.color, 0.13);
      const labelPoint = path.points[Math.floor(path.points.length / 3)] || path.points[0];
      sprite.position.copy(labelPoint);
      group.add(sprite);
    }
  }

  return group.children.length > 0 ? group : null;
}

/* ===========================
   SNAKE
   =========================== */
let snake = [];
let direction, nextDir, chartDisplayDir, chartMirror;
let pi1LastStep = null;

function wrapGrid(v) {
  return ((v % GRID_SIZE) + GRID_SIZE) % GRID_SIZE;
}

function clampCell(v) {
  return Math.max(0, Math.min(GRID_SIZE - 1, v));
}

function clampGenus2Cell(v) {
  return Math.max(0, Math.min(GENUS2_PATCH_CELLS - 1, v));
}

function normalizeCubeSpherePosition(gx, gy, dir, side, faceKey) {
  let currentFace = faceKey || 'F';
  let ndir = dir ? { ...dir } : null;
  let guard = 0;
  while ((gx < 0 || gx >= GRID_SIZE || gy < 0 || gy >= GRID_SIZE) && guard++ < 12) {
    let edge;
    let overshoot;
    if (gx < 0) {
      edge = 'L';
      overshoot = -gx - 1;
    } else if (gx >= GRID_SIZE) {
      edge = 'R';
      overshoot = gx - GRID_SIZE;
    } else if (gy < 0) {
      edge = 'U';
      overshoot = -gy - 1;
    } else {
      edge = 'D';
      overshoot = gy - GRID_SIZE;
    }

    const transition = CUBE_TRANSITIONS[currentFace][edge](clampCell(gx), clampCell(gy));
    ndir = transition.dir;
    gx = transition.gx + ndir.dx * overshoot;
    gy = transition.gy + ndir.dy * overshoot;
    currentFace = transition.face;
  }
  return {
    gx: clampCell(gx),
    gy: clampCell(gy),
    dir: ndir,
    side,
    face: currentFace,
  };
}

function genus2InwardDirection(edge) {
  if (edge === 'L') return { dx: 1, dy: 0 };
  if (edge === 'R') return { dx: -1, dy: 0 };
  if (edge === 'U') return { dx: 0, dy: 1 };
  return { dx: 0, dy: -1 };
}

function genus2EntryCell(edge, edgeCell) {
  if (edge === 'L') return { gx: 0, gy: edgeCell };
  if (edge === 'R') return { gx: GENUS2_PATCH_CELLS - 1, gy: edgeCell };
  if (edge === 'U') return { gx: edgeCell, gy: 0 };
  return { gx: edgeCell, gy: GENUS2_PATCH_CELLS - 1 };
}

function genus2EdgeSample(face, edge, edgeCell) {
  const t = (edgeCell + 0.5) / GENUS2_PATCH_CELLS;
  return genus2EdgePoint(face, edge, t);
}

function normalizeGenus2Position(gx, gy, dir, side, faceKey) {
  const topology = getGenus2Topology();
  let currentFaceKey = faceKey || topology.startFaceKey;
  let ndir = dir ? { ...dir } : null;
  let guard = 0;

  while ((gx < 0 || gx >= GENUS2_PATCH_CELLS || gy < 0 || gy >= GENUS2_PATCH_CELLS) && guard++ < 20) {
    let edge;
    let overshoot;
    let edgeCell;
    if (gx < 0) {
      edge = 'L';
      overshoot = -gx - 1;
      edgeCell = clampGenus2Cell(gy);
    } else if (gx >= GENUS2_PATCH_CELLS) {
      edge = 'R';
      overshoot = gx - GENUS2_PATCH_CELLS;
      edgeCell = clampGenus2Cell(gy);
    } else if (gy < 0) {
      edge = 'U';
      overshoot = -gy - 1;
      edgeCell = clampGenus2Cell(gx);
    } else {
      edge = 'D';
      overshoot = gy - GENUS2_PATCH_CELLS;
      edgeCell = clampGenus2Cell(gx);
    }

    const currentFace = topology.faceMap.get(currentFaceKey);
    const transition = currentFace?.transitions[edge];
    if (!transition) return { gx, gy, dir: ndir, side, face: currentFaceKey, blocked: true };

    const sample = genus2EdgeSample(currentFace, edge, edgeCell);
    const nextFace = topology.faceMap.get(transition.face);
    const uv = genus2LocalUVFromVoxel(nextFace, sample);
    const nextEdgeCell = transition.edge === 'L' || transition.edge === 'R'
      ? clampGenus2Cell(Math.floor(uv.v * GENUS2_PATCH_CELLS))
      : clampGenus2Cell(Math.floor(uv.u * GENUS2_PATCH_CELLS));
    const entry = genus2EntryCell(transition.edge, nextEdgeCell);
    ndir = genus2InwardDirection(transition.edge);
    gx = entry.gx + ndir.dx * overshoot;
    gy = entry.gy + ndir.dy * overshoot;
    currentFaceKey = transition.face;
  }

  return {
    gx: clampGenus2Cell(gx),
    gy: clampGenus2Cell(gy),
    dir: ndir,
    side,
    face: currentFaceKey,
    mirror: 1,
  };
}

function normalizeGridPosition(gx, gy, dir = null, side = 1, face = null) {
  const ndir = dir ? { ...dir } : null;
  let nside = side;
  let mirror = 1;

  if (MAP_TYPE === 'sphere') {
    return normalizeCubeSpherePosition(gx, gy, ndir, nside, face || 'F');
  }

  if (MAP_TYPE === 'genus2') {
    return normalizeGenus2Position(gx, gy, ndir, nside, face || genus2StartFaceKey());
  }

  if (MAP_TYPE === 'projective') {
    while (gx < 0 || gx >= GRID_SIZE) {
      gx += gx < 0 ? GRID_SIZE : -GRID_SIZE;
      gy = GRID_SIZE - 1 - gy;
      mirror *= -1;
      if (ndir) ndir.dy *= -1;
    }
    while (gy < 0 || gy >= GRID_SIZE) {
      gy += gy < 0 ? GRID_SIZE : -GRID_SIZE;
      gx = GRID_SIZE - 1 - gx;
      mirror *= -1;
      if (ndir) ndir.dx *= -1;
    }
    return { gx, gy, dir: ndir, side: 1, mirror };
  }

  if (MAP_TYPE === 'mobius') {
    while (gx < 0 || gx >= GRID_SIZE) {
      gx += gx < 0 ? GRID_SIZE : -GRID_SIZE;
      gy = GRID_SIZE - 1 - gy;
      nside *= -1;
      mirror *= -1;
      if (ndir) ndir.dy *= -1;
    }
    while (gy < 0 || gy >= GRID_SIZE) {
      gy = gy < 0 ? -gy - 1 : (GRID_SIZE - 1) - (gy - GRID_SIZE);
      nside *= -1;
      mirror *= -1;
      if (ndir) ndir.dy *= -1;
    }
    return { gx, gy, dir: ndir, side: nside, mirror };
  }

  if (MAP_TYPE === 'klein') {
    while (gx < 0 || gx >= GRID_SIZE) {
      gx += gx < 0 ? GRID_SIZE : -GRID_SIZE;
      gy = wrapGrid(GRID_SIZE / 2 - 1 - gy);
      nside *= -1;
      mirror *= -1;
      if (ndir) ndir.dy *= -1;
    }
    return { gx, gy: wrapGrid(gy), dir: ndir, side: nside, mirror };
  }

  return { gx: wrapGrid(gx), gy: wrapGrid(gy), dir: ndir, side: nside, mirror };
}

function inverseLetter(letter) {
  return letter === letter.toLowerCase() ? letter.toUpperCase() : letter.toLowerCase();
}

function invertWord(word) {
  return word.slice().reverse().map(inverseLetter);
}

function freeReduceWord(word) {
  const reduced = [];
  for (const letter of word) {
    if (reduced.length > 0 && inverseLetter(letter) === reduced[reduced.length - 1]) {
      reduced.pop();
    } else {
      reduced.push(letter);
    }
  }
  return reduced;
}

function symmetrizedRelators(relator) {
  const variants = [];
  const sources = [relator, invertWord(relator)];
  for (const source of sources) {
    for (let i = 0; i < source.length; i++) {
      variants.push(source.slice(i).concat(source.slice(0, i)));
    }
  }
  return variants;
}

function wordMatchesAt(word, start, pattern) {
  if (start + pattern.length > word.length) return false;
  for (let i = 0; i < pattern.length; i++) {
    if (word[start + i] !== pattern[i]) return false;
  }
  return true;
}

function dehnRulesFromRelator(relator) {
  const rules = [];
  const halfLength = relator.length / 2;
  for (const variant of symmetrizedRelators(relator)) {
    for (let len = relator.length; len > halfLength; len--) {
      rules.push({
        pattern: variant.slice(0, len),
        replacement: invertWord(variant.slice(len)),
      });
    }
  }
  return rules.sort((left, right) => right.pattern.length - left.pattern.length);
}

const GENUS2_DEHN_RULES = dehnRulesFromRelator(GENUS2_RELATOR);

function reduceGenus2Word(word) {
  let current = freeReduceWord(word);

  while (current.length > 0) {
    let match = null;
    for (let start = 0; start < current.length && !match; start++) {
      for (const rule of GENUS2_DEHN_RULES) {
        if (!wordMatchesAt(current, start, rule.pattern)) continue;
        match = { start, rule };
        break;
      }
    }

    if (!match) return current;

    current = freeReduceWord([
      ...current.slice(0, match.start),
      ...match.rule.replacement,
      ...current.slice(match.start + match.rule.pattern.length),
    ]);
  }

  return current;
}

function reduceProjectiveWord(word) {
  const count = word.filter(letter => letter.toLowerCase() === 'a').length;
  return count % 2 === 1 ? ['a'] : [];
}

function repeatSignedLetter(label, exponent) {
  const n = Math.abs(exponent);
  const letter = exponent >= 0 ? label : label.toUpperCase();
  return Array.from({ length: n }, () => letter);
}

function kleinNormalFormFromWord(word) {
  let a = 0;
  let b = 0;
  for (const letter of word) {
    if (letter === 'a') {
      a += 1;
      b = -b;
    } else if (letter === 'A') {
      a -= 1;
      b = -b;
    } else if (letter === 'b') {
      b += 1;
    } else if (letter === 'B') {
      b -= 1;
    }
  }
  return { a, b };
}

function kleinWordFromNormal(normal) {
  return [
    ...repeatSignedLetter('a', normal.a),
    ...repeatSignedLetter('b', normal.b),
  ];
}

function reduceKleinWord(word) {
  return kleinWordFromNormal(kleinNormalFormFromWord(word));
}

function reduceTopologyWord(word) {
  if (MAP_TYPE === 'genus2') return reduceGenus2Word(word);
  if (MAP_TYPE === 'projective') return reduceProjectiveWord(word);
  if (MAP_TYPE === 'klein') return reduceKleinWord(word);
  return freeReduceWord(word);
}

function invertTopologyWord(word) {
  if (MAP_TYPE === 'projective') {
    return word.slice().reverse().map(() => 'a');
  }
  return invertWord(word);
}

function kleinIdentityFrame() {
  return { ySign: 1 };
}

function cloneKleinFrame(frame) {
  return { ySign: frame?.ySign ?? 1 };
}

function emptyTopologyState() {
  if (MAP_TYPE === 'torus') return { wx: 0, wy: 0 };
  if (MAP_TYPE === 'mobius') return { w: 0, boundary: 0 };
  if (MAP_TYPE === 'genus2' || MAP_TYPE === 'projective') return { word: [] };
  if (MAP_TYPE === 'klein') return { word: [], frame: kleinIdentityFrame() };
  return null;
}

function cloneTopologyState(state) {
  if (!state) return emptyTopologyState();
  if (MAP_TYPE === 'torus') return { wx: state.wx || 0, wy: state.wy || 0 };
  if (MAP_TYPE === 'mobius') return { w: state.w || 0, boundary: state.boundary || 0 };
  if (MAP_TYPE === 'genus2' || MAP_TYPE === 'projective') return { word: [...(state.word || [])] };
  if (MAP_TYPE === 'klein') return { word: [...(state.word || [])], frame: cloneKleinFrame(state.frame) };
  return null;
}

function torusStepDelta(from, moveDir) {
  let wx = 0;
  let wy = 0;
  if (moveDir.dx === 1 && (from.gx + 1) % GRID_SIZE === TORUS_CUT_X) wx = 1;
  if (moveDir.dx === -1 && from.gx === TORUS_CUT_X) wx = -1;
  if (moveDir.dy === 1 && (from.gy + 1) % GRID_SIZE === TORUS_CUT_Y) wy = 1;
  if (moveDir.dy === -1 && from.gy === TORUS_CUT_Y) wy = -1;
  return { wx, wy };
}

function moveDirToEdge(moveDir) {
  if (moveDir.dx === 1) return 'R';
  if (moveDir.dx === -1) return 'L';
  if (moveDir.dy === 1) return 'D';
  return 'U';
}

function genus2MoveEdgeKey(from, moveDir) {
  return genus2GridEdgeKey(
    from.face || genus2StartFaceKey(),
    from.gx,
    from.gy,
    moveDirToEdge(moveDir),
  );
}

function genus2CellVoxelPoint(faceKey, gx, gy) {
  const topology = getGenus2Topology();
  const face = topology.faceMap.get(faceKey || topology.startFaceKey);
  return genus2VoxelPoint(
    face,
    (gx + 0.5) / GENUS2_PATCH_CELLS,
    (gy + 0.5) / GENUS2_PATCH_CELLS,
  );
}

function genus2MoveInCutCoordinates(from, moveDir, cutFaceKey) {
  const topology = getGenus2Topology();
  const fromFace = from.face || topology.startFaceKey;
  const cutFace = topology.faceMap.get(cutFaceKey || fromFace);
  if (!cutFace) return { dx: moveDir.dx, dy: moveDir.dy };
  const next = normalizeGenus2Position(
    from.gx + moveDir.dx,
    from.gy + moveDir.dy,
    moveDir,
    from.side ?? 1,
    fromFace,
  );
  if (next.blocked) return null;
  const fromUv = genus2LocalUVFromVoxel(cutFace, genus2CellVoxelPoint(fromFace, from.gx, from.gy));
  const toUv = genus2LocalUVFromVoxel(cutFace, genus2CellVoxelPoint(next.face, next.gx, next.gy));
  return {
    dx: (toUv.u - fromUv.u) * GENUS2_PATCH_CELLS,
    dy: (toUv.v - fromUv.v) * GENUS2_PATCH_CELLS,
  };
}

function genus2StepCrossingCandidates(from, moveDir) {
  const edgeKey = genus2MoveEdgeKey(from, moveDir);
  const cuts = getGenus2CutSchema().byEdgeKey.get(edgeKey);
  const face = from.face || genus2StartFaceKey();
  return (cuts || []).map(cut => {
    const cutMove = genus2MoveInCutCoordinates(from, moveDir, cut.face);
    if (!cutMove) return null;
    const det = cut.tx * cutMove.dy - cut.ty * cutMove.dx;
    return {
      cut,
      det,
      letter: det > 0 ? cut.label : cut.label.toUpperCase(),
      sameFace: cut.face === face,
    };
  }).filter(candidate => candidate && Math.abs(candidate.det) > 1e-6);
}

function genus2CutsHaveSameTangent(a, b) {
  return a.cut.tx === b.cut.tx && a.cut.ty === b.cut.ty;
}

function genus2OrderOverlappingCrossings(crossings) {
  const labels = crossings.map(crossing => crossing.cut.label).sort().join('');
  const orderByMiddleCut = (outerLabel, middleLabel) => {
    const middle = crossings.find(crossing => crossing.cut.label === middleLabel);
    const outers = crossings.filter(crossing => crossing.cut.label === outerLabel);
    if (!middle || outers.length !== 2) return crossings;
    const before = outers.find(crossing => genus2CutsHaveSameTangent(crossing, middle)) || outers[0];
    const after = outers.find(crossing => crossing !== before) || outers[1];
    return [before, middle, after];
  };
  if (labels === 'aac') return orderByMiddleCut('a', 'c');
  if (labels === 'bbd') return orderByMiddleCut('b', 'd');
  return crossings;
}

function genus2SelectedStepCrossing(from, moveDir) {
  const candidates = genus2StepCrossingCandidates(from, moveDir);
  if (candidates.length === 0) return null;
  return genus2ActiveStepCrossings(from, moveDir)[0] || null;
}

function genus2ActiveStepCrossings(from, moveDir) {
  const candidates = genus2StepCrossingCandidates(from, moveDir);
  if (candidates.length === 0) return [];
  const sameFace = candidates.filter(candidate => candidate.sameFace);
  const active = sameFace.length > 0 ? sameFace : [candidates[0]];
  const ordered = genus2OrderOverlappingCrossings(active);
  return ordered.length > 1 && ordered[0].det < 0 ? ordered.slice().reverse() : ordered;
}

function genus2StepWord(from, moveDir) {
  return genus2ActiveStepCrossings(from, moveDir).map(crossing => crossing.letter);
}

function boundaryCrossingEdge(from, moveDir) {
  if (moveDir.dx === 1 && from.gx === GRID_SIZE - 1) return 'R';
  if (moveDir.dx === -1 && from.gx === 0) return 'L';
  if (moveDir.dy === 1 && from.gy === GRID_SIZE - 1) return 'D';
  if (moveDir.dy === -1 && from.gy === 0) return 'U';
  return null;
}

function projectiveStepWord(from, moveDir) {
  return boundaryCrossingEdge(from, moveDir) ? ['a'] : [];
}

function mobiusStepDelta(from, moveDir) {
  let w = 0;
  let boundary = 0;
  if (moveDir.dx === 1 && from.gx === GRID_SIZE - 1) w = 1;
  if (moveDir.dx === -1 && from.gx === 0) w = -1;
  if (moveDir.dy === 1 && from.gy === GRID_SIZE - 1) boundary = 1;
  if (moveDir.dy === -1 && from.gy === 0) boundary = 1;
  return { w, boundary };
}

const KLEIN_CUTS = {
  // Fixed cut directions in the square chart.  The sign of b-crossings is read
  // after converting the move to the current topology frame.
  a: { label: 'a', tx: 0, ty: -1, cut: `u=${KLEIN_CUT_A_X}/N` },
  b: { label: 'b', tx: 1, ty: 0, cut: `v=${KLEIN_CUT_B_Y}/N` },
};

function crossesPeriodicGridLine(pos, delta, line) {
  if (delta === 1) return wrapGrid(pos + 1) === line;
  if (delta === -1) return wrapGrid(pos) === line;
  return false;
}

function kleinTopoMove(state, moveDir) {
  const ySign = state?.frame?.ySign ?? 1;
  return {
    dx: moveDir.dx,
    dy: ySign * moveDir.dy,
  };
}

function kleinLetterFromCrossing(cut, topoMove) {
  const det = cut.tx * topoMove.dy - cut.ty * topoMove.dx;
  return {
    det,
    letter: det > 0 ? cut.label : cut.label.toUpperCase(),
  };
}

function kleinStepCrossing(from, moveDir, state = from?.topo) {
  const current = cloneTopologyState(state);
  const topoMove = kleinTopoMove(current, moveDir);

  if (moveDir.dx !== 0 && crossesPeriodicGridLine(from.gx, moveDir.dx, KLEIN_CUT_A_X)) {
    const cut = KLEIN_CUTS.a;
    return { ...cut, ...kleinLetterFromCrossing(cut, topoMove), topoMove };
  }

  if (moveDir.dy !== 0 && crossesPeriodicGridLine(from.gy, moveDir.dy, KLEIN_CUT_B_Y)) {
    const cut = KLEIN_CUTS.b;
    return { ...cut, ...kleinLetterFromCrossing(cut, topoMove), topoMove };
  }

  return null;
}

function kleinStepWord(from, moveDir, state = from?.topo) {
  const crossing = kleinStepCrossing(from, moveDir, state);
  return crossing ? [crossing.letter] : [];
}

function advanceKleinTopologyState(state, from, moveDir) {
  const current = cloneTopologyState(state);
  const crossing = kleinStepCrossing(from, moveDir, current);
  const nextYSign = crossing?.label === 'a'
    ? -current.frame.ySign
    : current.frame.ySign;
  return {
    // Keep the raw cut-crossing word.  Reduction is only for testing/displaying
    // closed-loop classes; appending one step must not rewrite old crossings.
    word: [...current.word, ...(crossing ? [crossing.letter] : [])],
    frame: { ySign: nextYSign },
  };
}

function advanceTopologyState(state, from, moveDir) {
  if (!LOOP_WIN_MAPS.has(MAP_TYPE)) return null;
  const current = cloneTopologyState(state);
  if (MAP_TYPE === 'torus') {
    const delta = torusStepDelta(from, moveDir);
    return {
      wx: current.wx + delta.wx,
      wy: current.wy + delta.wy,
    };
  }
  if (MAP_TYPE === 'genus2') {
    return {
      word: reduceGenus2Word([...current.word, ...genus2StepWord(from, moveDir)]),
    };
  }
  if (MAP_TYPE === 'projective') {
    return {
      word: reduceProjectiveWord([...current.word, ...projectiveStepWord(from, moveDir)]),
    };
  }
  if (MAP_TYPE === 'mobius') {
    const delta = mobiusStepDelta(from, moveDir);
    return {
      w: current.w + delta.w,
      boundary: current.boundary + delta.boundary,
    };
  }
  if (MAP_TYPE === 'klein') {
    return advanceKleinTopologyState(current, from, moveDir);
  }
  return null;
}

function inferStepDirection(from, to) {
  const directions = [
    { dx: 1, dy: 0 },
    { dx: -1, dy: 0 },
    { dx: 0, dy: 1 },
    { dx: 0, dy: -1 },
  ];
  for (const dir of directions) {
    const next = normalizeGridPosition(from.gx + dir.dx, from.gy + dir.dy, dir, from.side, from.face);
    if (
      !next.blocked &&
      next.gx === to.gx &&
      next.gy === to.gy &&
      sameSurfaceSide(next.side, to.side) &&
      sameSurfaceFace(next.face, to.face)
    ) {
      return dir;
    }
  }
  return null;
}

function initializeSnakeTopology() {
  if (!LOOP_WIN_MAPS.has(MAP_TYPE) || snake.length === 0) return;
  const states = new Array(snake.length);
  let state = emptyTopologyState();
  states[snake.length - 1] = cloneTopologyState(state);

  for (let i = snake.length - 1; i > 0; i--) {
    const dir = inferStepDirection(snake[i], snake[i - 1]);
    if (dir) state = advanceTopologyState(state, snake[i], dir);
    states[i - 1] = cloneTopologyState(state);
  }

  snake = snake.map((segment, i) => ({
    ...segment,
    topo: cloneTopologyState(states[i]),
  }));
}

function wordFormula(word) {
  return word && word.length > 0 ? word.join('') : '1';
}

function powerTerm(label, exponent) {
  if (exponent === 0) return '';
  const base = exponent > 0 ? label : label.toUpperCase();
  const n = Math.abs(exponent);
  return n === 1 ? base : `${base}^${n}`;
}

function torusStateFormula(state) {
  const wx = state?.wx || 0;
  const wy = state?.wy || 0;
  return [powerTerm('a', wx), powerTerm('b', wy)].filter(Boolean).join(' ') || '1';
}

function mobiusStateFormula(state) {
  const w = state?.w || 0;
  const boundary = state?.boundary || 0;
  const loop = powerTerm('a', w) || '1';
  return boundary > 0 ? `${loop}; ${tr('crossedBoundary', { n: boundary })}` : loop;
}

function kleinNormalFormula(word) {
  const normal = kleinNormalFormFromWord(word || []);
  return [powerTerm('a', normal.a), powerTerm('b', normal.b)].filter(Boolean).join(' ') || '1';
}

function topologyWordFormula(word) {
  if (MAP_TYPE === 'klein') return kleinNormalFormula(word);
  return wordFormula(word);
}

function topologyStateFormula(state) {
  if (MAP_TYPE === 'torus') return torusStateFormula(state);
  if (MAP_TYPE === 'mobius') return mobiusStateFormula(state);
  if (MAP_TYPE === 'klein') return wordFormula(state?.word || []);
  if (MAP_TYPE === 'genus2' || MAP_TYPE === 'projective') return topologyWordFormula(state?.word || []);
  return '1';
}

function topologyRelationFormula() {
  if (MAP_TYPE === 'torus') return 'abAB = 1';
  if (MAP_TYPE === 'genus2') return `${GENUS2_RELATOR.join('')} = 1`;
  if (MAP_TYPE === 'projective') return `${PROJECTIVE_RELATOR.join('')} = 1`;
  if (MAP_TYPE === 'mobius') return `π1 = <a> ≅ Z; ${tr('noBoundaryCross')}`;
  if (MAP_TYPE === 'klein') return `${KLEIN_RELATOR.join('')} = 1`;
  return '-';
}

function loopWordLabel(word) {
  return topologyWordFormula(word);
}

function setPi1Text(id, text, warn = false) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = text;
  el.className = 'pi1-val' + (warn ? ' pi1-warn' : '');
}

function describeTorusMove(from, moveDir) {
  const current = cloneTopologyState(from.topo);
  const delta = torusStepDelta(from, moveDir);
  const letters = [];
  if (delta.wx > 0) letters.push('a');
  if (delta.wx < 0) letters.push('A');
  if (delta.wy > 0) letters.push('b');
  if (delta.wy < 0) letters.push('B');
  if (letters.length === 0) {
    return {
      step: tr('noCut'),
      move: `(${moveDir.dx}, ${moveDir.dy})`,
      cut: '-',
      det: '-',
    };
  }
  const next = {
    wx: current.wx + delta.wx,
    wy: current.wy + delta.wy,
  };
  return {
    step: `cut ${letters.join('')} @ x=${TORUS_CUT_X}, y=${TORUS_CUT_Y}`,
    move: `(${moveDir.dx}, ${moveDir.dy})`,
    cut: letters.map(letter => letter.toLowerCase()).join(','),
    det: `${torusStateFormula(current)} · ${letters.join('')} = ${torusStateFormula(next)}`,
  };
}

function describeGenus2Move(from, moveDir) {
  const candidates = genus2StepCrossingCandidates(from, moveDir);
  const active = genus2ActiveStepCrossings(from, moveDir);
  const face = from.face || genus2StartFaceKey();
  if (active.length === 0) {
    return {
      step: tr('noCut'),
      move: `(${moveDir.dx}, ${moveDir.dy})`,
      cut: '-',
      det: '-',
    };
  }
  const letters = active.map(crossing => crossing.letter);
  const labels = [...new Set(active.map(crossing => crossing.cut.label))].join(',');
  const candidateText = candidates.length > active.length || active.length > 1
    ? tr('candidates', { list: candidates.map(c => c.letter).join(','), letter: letters.join('') })
    : `cut ${labels} -> ${letters.join('')}`;
  return {
    step: `${candidateText} @ ${face}`,
    move: `(${moveDir.dx}, ${moveDir.dy})`,
    cut: active.map(crossing => `${crossing.cut.label}:(${crossing.cut.tx}, ${crossing.cut.ty})`).join('; '),
    det: active.map(crossing => `${crossing.cut.tx}*${moveDir.dy} - ${crossing.cut.ty}*${moveDir.dx} = ${crossing.det}`).join('; '),
    warn: candidates.length > active.length || active.length > 1,
  };
}

function describeProjectiveMove(from, moveDir) {
  const edge = boundaryCrossingEdge(from, moveDir);
  if (!edge) {
    return {
      step: tr('noBoundaryCut'),
      move: `(${moveDir.dx}, ${moveDir.dy})`,
      cut: '-',
      det: '-',
    };
  }
  const before = wordFormula(from.topo?.word || []);
  const after = wordFormula(reduceProjectiveWord([...(from.topo?.word || []), 'a']));
  return {
    step: tr('boundaryToA', { edge }),
    move: `(${moveDir.dx}, ${moveDir.dy})`,
    cut: tr('boundaryEdge', { edge }),
    det: `${before}·a -> ${after}, aa=1`,
  };
}

function describeMobiusMove(from, moveDir) {
  const delta = mobiusStepDelta(from, moveDir);
  const before = mobiusStateFormula(from.topo);
  const afterState = {
    w: (from.topo?.w || 0) + delta.w,
    boundary: (from.topo?.boundary || 0) + delta.boundary,
  };
  if (delta.boundary > 0) {
    return {
      step: tr('crossedStripBoundary'),
      move: `(${moveDir.dx}, ${moveDir.dy})`,
      cut: tr('bandBoundary'),
      det: `${before} -> ${mobiusStateFormula(afterState)}; ${tr('noWinClosure')}`,
    };
  }
  if (delta.w === 0) {
    return {
      step: tr('noCut'),
      move: `(${moveDir.dx}, ${moveDir.dy})`,
      cut: '-',
      det: '-',
    };
  }
  const letter = delta.w > 0 ? 'a' : 'A';
  return {
    step: `cut a -> ${letter}`,
    move: `(${moveDir.dx}, ${moveDir.dy})`,
    cut: tr('glueEdgeU'),
    det: `${before}·${letter} = ${mobiusStateFormula(afterState)}`,
  };
}

function describeKleinMove(from, moveDir) {
  const current = cloneTopologyState(from.topo);
  const crossing = kleinStepCrossing(from, moveDir, current);
  const topoMove = kleinTopoMove(current, moveDir);
  if (!crossing) {
    return {
      step: tr('noCut'),
      move: `display (${moveDir.dx}, ${moveDir.dy}), topo (${topoMove.dx}, ${topoMove.dy})`,
      cut: '-',
      det: '-',
    };
  }
  const beforeRaw = wordFormula(current.word || []);
  const afterRawWord = [...(current.word || []), crossing.letter];
  const cutName = crossing.label === 'a' ? 'a: u=1/2' : 'b: v=1/4';
  return {
    step: `cut ${crossing.label} -> ${crossing.letter}`,
    move: `display (${moveDir.dx}, ${moveDir.dy}), topo (${crossing.topoMove.dx}, ${crossing.topoMove.dy})`,
    cut: `${cutName}; tangent=(${crossing.tx}, ${crossing.ty})`,
    det: `${crossing.tx}*${crossing.topoMove.dy} - ${crossing.ty}*${crossing.topoMove.dx} = ${crossing.det}; ${beforeRaw}·${crossing.letter} = ${wordFormula(afterRawWord)}; NF = ${kleinNormalFormula(afterRawWord)}`,
  };
}

function describeTopologyMove(from, moveDir) {
  if (MAP_TYPE === 'torus') return describeTorusMove(from, moveDir);
  if (MAP_TYPE === 'genus2') return describeGenus2Move(from, moveDir);
  if (MAP_TYPE === 'projective') return describeProjectiveMove(from, moveDir);
  if (MAP_TYPE === 'mobius') return describeMobiusMove(from, moveDir);
  if (MAP_TYPE === 'klein') return describeKleinMove(from, moveDir);
  return null;
}

function topologyDifferenceInfo(fromTopo, toTopo) {
  if (MAP_TYPE === 'sphere') {
    return {
      nontrivial: true,
      label: tr('closedLoopAny'),
      reducedLabel: tr('closedLoopAny'),
      winText: tr('winClosed'),
    };
  }

  if (MAP_TYPE === 'torus') {
    const wx = (toTopo?.wx || 0) - (fromTopo?.wx || 0);
    const wy = (toTopo?.wy || 0) - (fromTopo?.wy || 0);
    return {
      nontrivial: wx !== 0 || wy !== 0,
      label: torusStateFormula({ wx, wy }),
      reducedLabel: torusStateFormula({ wx, wy }),
    };
  }

  if (MAP_TYPE === 'mobius') {
    const w = (toTopo?.w || 0) - (fromTopo?.w || 0);
    const boundary = (toTopo?.boundary || 0) - (fromTopo?.boundary || 0);
    const crossesBoundary = boundary > 0;
    return {
      nontrivial: w !== 0 && !crossesBoundary,
      label: mobiusStateFormula({ w, boundary }),
      reducedLabel: mobiusStateFormula({ w, boundary }),
      failLabel: crossesBoundary ? tr('failBoundary') : tr('failTrivial'),
    };
  }

  const rawWord = [
    ...invertTopologyWord(fromTopo?.word || []),
    ...(toTopo?.word || []),
  ];
  const word = reduceTopologyWord(rawWord);
  return {
    nontrivial: word.length > 0,
    label: loopWordLabel(word),
    rawWord,
    word,
    reducedLabel: topologyWordFormula(word),
  };
}

function updatePi1Panel() {
  const panel = document.getElementById('pi1-panel');
  if (!panel) return;
  if (!topologyHintsVisible || !PI1_PANEL_MAPS.has(MAP_TYPE)) {
    panel.style.display = 'none';
    return;
  }
  panel.style.display = 'block';
  setPi1Text('pi1Rel', topologyRelationFormula());

  const head = snake[0];
  if (!head) return;
  const tail = snake[snake.length - 1];

  const last = pi1LastStep || {
    step: tr('notMoved'),
    move: '-',
    cut: '-',
    det: '-',
  };
  setPi1Text('pi1Step', last.step, !!last.warn);
  setPi1Text('pi1Move', last.move);
  setPi1Text('pi1Cut', last.cut);
  setPi1Text('pi1Det', last.det);
  setPi1Text('pi1Head', topologyStateFormula(head.topo));
  setPi1Text('pi1Tail', topologyStateFormula(tail.topo));

  const bodyInfo = topologyDifferenceInfo(tail.topo, head.topo);
  setPi1Text('pi1Body', `T^-1 H = ${bodyInfo.reducedLabel}`);

  const dir = nextDir || direction;
  if (!dir) {
    setPi1Text('pi1Close', '-');
    return;
  }
  const next = normalizeGridPosition(head.gx + dir.dx, head.gy + dir.dy, dir, head.side, head.face);
  const hitSelfIdx = next.blocked
    ? -1
    : snake.findIndex(s => sameSnakeCell(s, next.gx, next.gy, next.side ?? 1, next.face ?? null));
  if (hitSelfIdx === -1) {
    setPi1Text('pi1Close', tr('nextNotClosed'));
    return;
  }

  const newTopo = advanceTopologyState(head.topo, head, dir);
  const hitTopo = cloneTopologyState(snake[hitSelfIdx].topo);
  const loopInfo = topologyDifferenceInfo(hitTopo, newTopo);
  const loopFormula = loopInfo.rawWord
    ? `${wordFormula(loopInfo.rawWord)} -> ${loopInfo.reducedLabel}`
    : loopInfo.reducedLabel;
  setPi1Text(
    'pi1Close',
    `S${hitSelfIdx}^-1 H' = ${loopFormula} (${loopInfo.nontrivial ? tr('nontrivial') : tr('trivial')})`,
    !loopInfo.nontrivial,
  );
}

function selfClosureInfo(newTopo, hitSelfIdx) {
  if (!LOOP_WIN_MAPS.has(MAP_TYPE) || snake.length === 0) return null;
  const hitTopo = cloneTopologyState(snake[hitSelfIdx].topo);
  return topologyDifferenceInfo(hitTopo, newTopo);
}

function buildInitialSnake(head, length) {
  const body = [{ ...head }];
  const targetLength = Math.max(1, Math.floor(length));
  let current = { ...head };
  const backDir = { dx: -1, dy: 0 };

  for (let i = 1; i < targetLength; i++) {
    const next = normalizeGridPosition(
      current.gx + backDir.dx,
      current.gy + backDir.dy,
      backDir,
      current.side,
      current.face,
    );
    if (next.blocked) break;
    current = {
      gx: next.gx,
      gy: next.gy,
      side: next.side ?? 1,
      face: next.face ?? null,
    };
    body.push({ ...current });
  }

  return body;
}

function resetSnake() {
  pi1LastStep = null;
  if (MAP_TYPE === 'genus2') {
    const face = genus2StartFaceKey();
    const gy = Math.floor(GENUS2_PATCH_CELLS / 2);
    snake = buildInitialSnake(
      { gx: Math.floor(GENUS2_PATCH_CELLS / 2), gy, side: 1, face },
      INITIAL_SNAKE_LENGTH,
    );
    direction = { dx: 1, dy: 0 };
    nextDir = { dx: 1, dy: 0 };
    chartDisplayDir = { dx: 1, dy: 0 };
    chartMirror = 1;
    initializeSnakeTopology();
    return;
  }
  const face = MAP_TYPE === 'sphere' ? 'F' : null;
  snake = buildInitialSnake(
    { gx: Math.floor(GRID_SIZE / 2), gy: Math.floor(GRID_SIZE / 2), side: 1, face },
    INITIAL_SNAKE_LENGTH,
  );
  direction = { dx: 1, dy: 0 };
  nextDir = { dx: 1, dy: 0 };
  chartDisplayDir = { dx: 1, dy: 0 };
  chartMirror = 1;
  initializeSnakeTopology();
}

/* ===========================
   FOOD
   =========================== */
let foods = [];

/* ===========================
   GAME STATE
   =========================== */
let fieldScale = 1.0;
let score, speed, best, running, paused;
let spawnTimer;
let msgTimer = null;
let tickStartTime = 0;
let tickInterval = 100;
let loop = null;
let topologyHintsVisible = false;

function victoryGoalText() {
  if (MAP_TYPE === 'sphere') return tr('goalSphere');
  if (MAP_TYPE === 'torus') return tr('goalTorus');
  if (MAP_TYPE === 'genus2') return tr('goalGenus2');
  if (MAP_TYPE === 'projective') return tr('goalProjective');
  if (MAP_TYPE === 'mobius') return tr('goalMobius');
  if (MAP_TYPE === 'klein') return tr('goalKlein');
  return tr('goalDefault');
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
  document.getElementById('goalText').textContent = victoryGoalText();
  document.getElementById('pauseOverlay').style.display = paused ? 'flex' : 'none';
  document.getElementById('pauseBtn').textContent = paused ? tr('resume') : tr('pause');
  document.getElementById('topologyHintsBtn').textContent = topologyHintsVisible ? tr('hideHints') : tr('showHints');
}

function sameSnakeCell(a, gx, gy, side, face) {
  return a.gx === gx && a.gy === gy && sameSurfaceSide(a.side, side) && sameSurfaceFace(a.face, face);
}

function togglePause() {
  if (!running) return;
  paused = !paused;
  updateUI();
}

function toggleTopologyHints() {
  topologyHintsVisible = !topologyHintsVisible;
  if (cutOverlayGroup) cutOverlayGroup.visible = topologyHintsVisible;
  updatePi1Panel();
  updateUI();
}

function setMsg(text, cls) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg-area' + (cls ? ' ' + cls : '');
}

function clearMsgTimer() {
  if (msgTimer) clearTimeout(msgTimer);
  msgTimer = null;
}

function addMsg(text, cls, duration = 1600) {
  clearMsgTimer();
  setMsg(text, cls);
  if (duration > 0) {
    msgTimer = setTimeout(() => {
      setMsg('');
      msgTimer = null;
    }, duration);
  }
}

/* ===========================
   GAME LOGIC
   =========================== */
function pickFoodType() {
  const total = Object.values(FOOD_DEF).reduce((s, t) => s + t.weight, 0);
  let r = Math.random() * total;
  for (const [key, val] of Object.entries(FOOD_DEF)) {
    r -= val.weight;
    if (r <= 0) return key;
  }
  return 'grow';
}

function sameSurfaceSide(a, b) {
  return (a ?? 1) === (b ?? 1);
}

function sameSurfaceFace(a, b) {
  return (a ?? null) === (b ?? null);
}

function isOccupied(gx, gy, side = 1, face = null) {
  if (snake.some(s => sameSnakeCell(s, gx, gy, side, face))) return true;
  if (foods.some(f => f.gx === gx && f.gy === gy && sameSurfaceSide(f.side, side) && sameSurfaceFace(f.face, face))) return true;
  return false;
}

function trySpawnFood() {
  if (foods.length >= MAX_FOODS) return;
  const type = pickFoodType();
  for (let attempt = 0; attempt < 80; attempt++) {
    const gridSize = MAP_TYPE === 'genus2' ? GENUS2_PATCH_CELLS : GRID_SIZE;
    const gx = Math.floor(Math.random() * gridSize);
    const gy = Math.floor(Math.random() * gridSize);
    const side = ['mobius', 'klein'].includes(MAP_TYPE) && Math.random() < 0.5 ? -1 : 1;
    const face = MAP_TYPE === 'sphere'
      ? CUBE_FACE_KEYS[Math.floor(Math.random() * CUBE_FACE_KEYS.length)]
      : (MAP_TYPE === 'genus2' ? randomGenus2FaceKey() : null);
    if (!isOccupied(gx, gy, side, face)) {
      foods.push({ gx, gy, side, face, type, age: 0 });
      return;
    }
  }
}

function applyEffect(type) {
  switch (type) {
    case 'grow':
      score++;
      if (score > best) {
        best = score;
        localStorage.setItem(`snake3dBest_${MAP_TYPE}`, best);
      }
      addMsg(tr('grew'), 'good');
      break;
    case 'slow':
      speed = Math.min(speed + 30, 250);
      restartLoop();
      addMsg(tr('slowed'), 'good');
      break;
    case 'shrink':
      if (snake.length > 2) { snake.pop(); snake.pop(); }
      else if (snake.length > 1) { snake.pop(); }
      addMsg(tr('shortened'), 'warn');
      break;
    case 'speedUp':
      speed = Math.max(speed - 30, 40);
      restartLoop();
      addMsg(tr('spedUp'), 'warn');
      break;
  }
}

function die(reason = tr('gameOver')) {
  running = false;
  clearMsgTimer();
  setMsg(reason || tr('gameOver'), 'dead');
}

function winByLoop(info) {
  running = false;
  const text = info.winText || tr('winNontrivial', { label: info.label });
  clearMsgTimer();
  setMsg(text, 'good');
}

function gameTick() {
  if (!running || paused) return;

  tickStartTime = performance.now();
  tickInterval = speed;

  // Age foods
  foods = foods.filter(f => { f.age++; return f.age < FOOD_LIFETIME; });
  for (let i = foods.length; i < MIN_FOODS; i++) trySpawnFood();

  // Spawn timer
  spawnTimer--;
  if (spawnTimer <= 0) {
    spawnTimer = SPAWN_INTERVAL;
    trySpawnFood();
  }

  direction = { ...nextDir };

  const head = snake[0];
  const moveDir = { ...direction };
  const next = normalizeGridPosition(head.gx + direction.dx, head.gy + direction.dy, direction, head.side, head.face);
  if (next.blocked) {
    die(tr('hitBoundary'));
    return;
  }
  const newGx = next.gx;
  const newGy = next.gy;
  const newSide = next.side ?? 1;
  const newFace = next.face ?? null;
  direction = next.dir;
  nextDir = { ...direction };
  chartMirror *= next.mirror ?? 1;
  const newHead = {
    gx: newGx,
    gy: newGy,
    side: newSide,
    face: newFace,
    topo: advanceTopologyState(head.topo, head, moveDir),
  };
  if (LOOP_WIN_MAPS.has(MAP_TYPE)) {
    pi1LastStep = describeTopologyMove(head, moveDir);
  }

  const hitSelfIdx = snake.findIndex(s => sameSnakeCell(s, newGx, newGy, newSide, newFace));
  if (hitSelfIdx !== -1) {
    const closure = selfClosureInfo(newHead.topo, hitSelfIdx);
    snake = [newHead, ...snake.slice(0, hitSelfIdx)];
    if (closure?.nontrivial) {
      winByLoop(closure);
      updateUI();
      return;
    }

    if (closure) {
      addMsg(closure.failLabel || tr('failTrivial'), 'warn');
    } else {
      addMsg(tr('bodyCut', { n: snake.length }), 'warn');
    }
    updateUI();
    return;
  }

  snake.unshift(newHead);

  // Food collision
  const eatenIdx = foods.findIndex(f => f.gx === newGx && f.gy === newGy && sameSurfaceSide(f.side, newSide) && sameSurfaceFace(f.face, newFace));
  if (eatenIdx !== -1) {
    const eaten = foods[eatenIdx];
    foods.splice(eatenIdx, 1);
    applyEffect(eaten.type);
    trySpawnFood();
  } else {
    snake.pop();
  }

  updateUI();
}

function restartLoop() {
  clearInterval(loop);
  loop = setInterval(gameTick, speed);
}

/* ===========================
   CAMERA
   =========================== */
function resetCamera() {
  const position = (MAP_TYPE === 'genus2' ? GENUS2_CAMERA_POSITION : DEFAULT_CAMERA_POSITION).clone();
  if (MOBILE_VIEW_QUERY.matches) position.multiplyScalar(MOBILE_CAMERA_DISTANCE_SCALE);
  camera.position.copy(position);
  camera.lookAt(0, 0, 0);
  surfaceGroup.rotation.set(0, 0, 0);
}

function directionAngle(dir) {
  if (dir.dx === 1) return 0;
  if (dir.dy === 1) return 1;
  if (dir.dx === -1) return 2;
  return 3;
}

function rotateGridVector(vec, turns) {
  const n = ((turns % 4) + 4) % 4;
  if (n === 1) return { dx: -vec.dy, dy: vec.dx };
  if (n === 2) return { dx: -vec.dx, dy: -vec.dy };
  if (n === 3) return { dx: vec.dy, dy: -vec.dx };
  return { dx: vec.dx, dy: vec.dy };
}

function reflectAcrossDirectionAxis(vec, axisDir) {
  if (axisDir.dx !== 0) return { dx: vec.dx, dy: -vec.dy };
  return { dx: -vec.dx, dy: vec.dy };
}

function surfaceToChartVector(vec) {
  const baseDir = nextDir || direction;
  const oriented = chartMirror === -1 ? reflectAcrossDirectionAxis(vec, baseDir) : vec;
  const turns = directionAngle(chartDisplayDir) - directionAngle(baseDir);
  return rotateGridVector(oriented, turns);
}

function chartToSurfaceDirection(dir) {
  const baseDir = nextDir || direction;
  const turns = directionAngle(baseDir) - directionAngle(chartDisplayDir);
  const rotated = rotateGridVector(dir, turns);
  return chartMirror === -1 ? reflectAcrossDirectionAxis(rotated, baseDir) : rotated;
}

function queueChartDirection(displayDir) {
  const surfaceDir = chartToSurfaceDirection(displayDir);
  const activeDir = nextDir || direction;
  if (surfaceDir.dx === -activeDir.dx && surfaceDir.dy === -activeDir.dy) return;
  nextDir = surfaceDir;
  chartDisplayDir = { ...displayDir };
}

/* ===========================
   INPUT
   =========================== */
document.addEventListener('keydown', e => {
  const key = e.key.toLowerCase();

  if (key === ' ' || key === 'spacebar' || key === 'p') {
    e.preventDefault();
    togglePause();
    return;
  }

  if (key === 'r') {
    resetCamera();
    return;
  }

  if (!running || paused) return;

  switch (key) {
    case 'arrowup':    case 'w': queueChartDirection({ dx:  0, dy: -1 }); break;
    case 'arrowdown':  case 's': queueChartDirection({ dx:  0, dy:  1 }); break;
    case 'arrowleft':  case 'a': queueChartDirection({ dx: -1, dy:  0 }); break;
    case 'arrowright': case 'd': queueChartDirection({ dx:  1, dy:  0 }); break;
  }
});

document.getElementById('restart').addEventListener('click', () => {
  clearInterval(loop);
  init();
  loop = setInterval(gameTick, speed);
});

document.getElementById('pauseBtn').addEventListener('click', togglePause);
document.getElementById('topologyHintsBtn').addEventListener('click', toggleTopologyHints);
document.getElementById('resetCam').addEventListener('click', resetCamera);

/* ===========================
   INIT
   =========================== */
function init() {
  applyStaticText();
  fieldScale = 1.0;
  ensureSurfaceGeometry();
  score = 0;
  speed = INITIAL_SPEED_MS;
  running = true;
  paused = false;
  foods = [];
  spawnTimer = SPAWN_INTERVAL;
  clearMsgTimer();
  best = parseInt(localStorage.getItem(`snake3dBest_${MAP_TYPE}`) || '0');

  resetSnake();

  for (let i = 0; i < INITIAL_FOODS; i++) trySpawnFood();

  setMsg('');
  updateUI();
  resetCamera();
  tickStartTime = performance.now();
}

/* ===========================
   LOCAL MAP (2D CHART)
   =========================== */
const mapCanvas = document.getElementById('mapCanvas');
const touchControlZone = document.getElementById('touch-control-zone');
const MAP_CTX = mapCanvas.getContext('2d');
const MAP_CELLS = 9;
const MAP_PX = mapCanvas.width / MAP_CELLS;
const MAP_HALF = Math.floor(MAP_CELLS / 2);
const MAP_SWIPE_THRESHOLD = 24;
let mapTouchStart = null;

function claimMapPointerEvent(e) {
  e.preventDefault();
  e.stopPropagation();
}

function handleMapSwipe(dx, dy) {
  if (!running || paused) return false;
  if (Math.max(Math.abs(dx), Math.abs(dy)) < MAP_SWIPE_THRESHOLD) return false;
  if (Math.abs(dx) >= Math.abs(dy)) {
    queueChartDirection({ dx: dx < 0 ? -1 : 1, dy: 0 });
  } else {
    queueChartDirection({ dx: 0, dy: dy < 0 ? -1 : 1 });
  }
  return true;
}

function startChartControlPointer(e) {
  claimMapPointerEvent(e);
  mapTouchStart = { x: e.clientX, y: e.clientY, pointerId: e.pointerId };
  e.currentTarget.setPointerCapture(e.pointerId);
}

function moveChartControlPointer(e) {
  if (!mapTouchStart || mapTouchStart.pointerId !== e.pointerId) return;
  claimMapPointerEvent(e);
  const dx = e.clientX - mapTouchStart.x;
  const dy = e.clientY - mapTouchStart.y;
  if (handleMapSwipe(dx, dy)) {
    mapTouchStart = { x: e.clientX, y: e.clientY, pointerId: e.pointerId };
  }
}

function endChartControlPointer(e) {
  if (!mapTouchStart || mapTouchStart.pointerId !== e.pointerId) return;
  claimMapPointerEvent(e);
  handleMapSwipe(e.clientX - mapTouchStart.x, e.clientY - mapTouchStart.y);
  mapTouchStart = null;
  if (e.currentTarget.hasPointerCapture(e.pointerId)) {
    e.currentTarget.releasePointerCapture(e.pointerId);
  }
}

function bindChartControlSurface(el) {
  el.addEventListener('pointerdown', startChartControlPointer, { passive: false });
  el.addEventListener('pointermove', moveChartControlPointer, { passive: false });
  el.addEventListener('pointerup', endChartControlPointer, { passive: false });
  el.addEventListener('pointercancel', endChartControlPointer, { passive: false });
}

bindChartControlSurface(mapCanvas);
bindChartControlSurface(touchControlZone);

function drawMiniMap() {
  if (snake.length === 0) return;
  const ctx = MAP_CTX;
  const head = snake[0];
  const dir = chartDisplayDir;

  // Background
  ctx.fillStyle = '#223447';
  ctx.fillRect(0, 0, mapCanvas.width, mapCanvas.height);

  // Grid
  ctx.strokeStyle = 'rgba(168,228,210,0.32)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= MAP_CELLS; i++) {
    const p = i * MAP_PX;
    ctx.beginPath(); ctx.moveTo(p, 0); ctx.lineTo(p, mapCanvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, p); ctx.lineTo(mapCanvas.width, p); ctx.stroke();
  }

  // Map world coordinates to chart pixel center.
  function worldToChart(gx, gy, side = 1, face = null) {
    let best = null;
    for (let ry = -MAP_HALF; ry <= MAP_HALF; ry++) {
      for (let rx = -MAP_HALF; rx <= MAP_HALF; rx++) {
        const p = normalizeGridPosition(head.gx + rx, head.gy + ry, null, head.side, head.face);
        if (
          p.blocked ||
          p.gx !== gx ||
          p.gy !== gy ||
          !sameSurfaceSide(p.side, side) ||
          !sameSurfaceFace(p.face, face)
        ) continue;
        const dist = Math.abs(rx) + Math.abs(ry);
        if (!best || dist < best.dist) best = { rx, ry, dist };
      }
    }
    if (!best) return null;
    const screenOffset = surfaceToChartVector({ dx: best.rx, dy: best.ry });
    return {
      cx: (screenOffset.dx + MAP_HALF) * MAP_PX + MAP_PX / 2,
      cy: (screenOffset.dy + MAP_HALF) * MAP_PX + MAP_PX / 2,
    };
  }

  // Food
  for (const f of foods) {
    const m = worldToChart(f.gx, f.gy, f.side, f.face);
    if (!m) continue;
    const def = FOOD_DEF[f.type];
    const pad = MAP_PX * 0.16;
    ctx.fillStyle = '#' + def.color.toString(16).padStart(6, '0');
    ctx.fillRect(m.cx - MAP_PX / 2 + pad, m.cy - MAP_PX / 2 + pad, MAP_PX - pad * 2, MAP_PX - pad * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.35)';
    ctx.lineWidth = 1;
    ctx.strokeRect(m.cx - MAP_PX / 2 + pad, m.cy - MAP_PX / 2 + pad, MAP_PX - pad * 2, MAP_PX - pad * 2);
  }

  // Snake (tail first, head on top)
  for (let i = snake.length - 1; i >= 0; i--) {
    const s = snake[i];
    const m = worldToChart(s.gx, s.gy, s.side, s.face);
    if (!m) continue;
    const pad = 1;
    const x = m.cx - MAP_PX / 2;
    const y = m.cy - MAP_PX / 2;
    if (i === 0) {
      ctx.fillStyle = '#ffdd57';
      ctx.fillRect(x + pad, y + pad, MAP_PX - pad * 2, MAP_PX - pad * 2);
      // Eyes
      const er = MAP_PX * 0.10;
      ctx.fillStyle = '#061018';
      let ex1, ey1, ex2, ey2;
      if (dir.dx === 1)       { ex1 = m.cx + MAP_PX*0.18; ey1 = m.cy - MAP_PX*0.18; ex2 = m.cx + MAP_PX*0.18; ey2 = m.cy + MAP_PX*0.18; }
      else if (dir.dx === -1) { ex1 = m.cx - MAP_PX*0.18; ey1 = m.cy - MAP_PX*0.18; ex2 = m.cx - MAP_PX*0.18; ey2 = m.cy + MAP_PX*0.18; }
      else if (dir.dy === -1) { ex1 = m.cx - MAP_PX*0.18; ey1 = m.cy - MAP_PX*0.18; ex2 = m.cx + MAP_PX*0.18; ey2 = m.cy - MAP_PX*0.18; }
      else                    { ex1 = m.cx - MAP_PX*0.18; ey1 = m.cy + MAP_PX*0.18; ex2 = m.cx + MAP_PX*0.18; ey2 = m.cy + MAP_PX*0.18; }
      ctx.beginPath(); ctx.arc(ex1, ey1, er, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex2, ey2, er, 0, Math.PI * 2); ctx.fill();
    } else {
      const alpha = 0.55 + 0.45 * (1 - i / Math.max(snake.length, 1));
      ctx.fillStyle = `rgba(255,140,66,${alpha.toFixed(2)})`;
      ctx.fillRect(x + pad, y + pad, MAP_PX - pad * 2, MAP_PX - pad * 2);
    }
  }

  // Center cell highlight
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 2;
  const chx = MAP_HALF * MAP_PX, chy = MAP_HALF * MAP_PX;
  ctx.strokeRect(chx + 0.5, chy + 0.5, MAP_PX - 1, MAP_PX - 1);

  // Direction arrow on head
  const acx = MAP_HALF * MAP_PX + MAP_PX / 2;
  const acy = MAP_HALF * MAP_PX + MAP_PX / 2;
  ctx.fillStyle = '#061018';
  ctx.beginPath();
  const alen = MAP_PX * 0.3;
  const ax = acx + dir.dx * alen;
  const ay = acy + dir.dy * alen;
  ctx.moveTo(ax, ay);
  ctx.lineTo(ax - dir.dy * alen * 0.35, ay + dir.dx * alen * 0.35);
  ctx.lineTo(ax + dir.dy * alen * 0.35, ay - dir.dx * alen * 0.35);
  ctx.closePath();
  ctx.fill();
}

/* ===========================
   RENDER LOOP
   =========================== */
function render() {
  requestAnimationFrame(render);

  redrawTexture();
  drawMiniMap();
  updatePi1Panel();
  renderer.render(scene, camera);
}

init();
loop = setInterval(gameTick, speed);
render();
</script>
</body>
