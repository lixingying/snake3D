    background: rgba(9, 12, 20, 0.9);

    font-size: 0.9rem;

    background: #4ecca3;
    color: #1a1a2e;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    letter-spacing: 1px;

  button.btn2 { background: #5dade2; }
  button.btn2:hover { background: #4a9ccf; }

  if (!torusMaterial) {
    torusMaterial = new THREE.MeshStandardMaterial({
      map: gridTex,

      metalness: 0.1,
      side: ['sphere', 'genus2', 'projective', 'mobius', 'klein'].includes(MAP_TYPE) ? THREE.DoubleSide : THREE.FrontSide,
    });
  }
  if (!markMaterialFront) {
    if (MAP_TYPE === 'sphere') {
      markMaterialFront = CUBE_FACE_KEYS.map(faceKey => createMarkMaterial(sphereMarkTexFront[faceKey], THREE.DoubleSide));
      markMaterialBack = CUBE_FACE_KEYS.map(faceKey => createMarkMaterial(sphereMarkTexBack[faceKey], THREE.DoubleSide));

      markMaterialFront = getGenus2Topology().faces.map(face => createMarkMaterial(genus2MarkTex[face.key], THREE.DoubleSide));

    } else if (MAP_TYPE === 'projective') {

      markMaterialBack = null;
    } else {
      markMaterialFront = createMarkMaterial(markTexFront, THREE.FrontSide);

  if (torusMesh) {
    torusMesh.geometry.dispose();

  if (markMeshBack) surfaceGroup.remove(markMeshBack);

    disposeObject3D(cutOverlayGroup);
    surfaceGroup.remove(cutOverlayGroup);
    cutOverlayGroup = null;
  }
  const R = getR(), r = getr();
  let geo;
  if (MAP_TYPE === 'sphere') {
    geo = createCubeSphereGeometry();
  } else if (MAP_TYPE === 'genus2') {
    geo = createGenus2Geometry();
  } else if (MAP_TYPE === 'projective') {
    geo = createProjectiveGeometry();
  } else if (MAP_TYPE === 'mobius') {
    geo = createMobiusGeometry();
  } else if (MAP_TYPE === 'klein') {
    geo = createKleinGeometry();
  } else {
    geo = new THREE.TorusGeometry(R, r, 64, 32);
  }
  torusMesh = new THREE.Mesh(geo, torusMaterial);
  torusMesh.position.set(0, 0, 0);
  surfaceGroup.add(torusMesh);

  if (MAP_TYPE === 'genus2' || MAP_TYPE === 'projective') {
    markMeshFront = new THREE.Mesh(geo, markMaterialFront);
    markMeshFront.renderOrder = 2;
    surfaceGroup.add(markMeshFront);
  } else {
    markMeshFront = new THREE.Mesh(geo, markMaterialFront);
    markMeshBack = new THREE.Mesh(geo, markMaterialBack);
    markMeshFront.renderOrder = 2;
    markMeshBack.renderOrder = 2;
    surfaceGroup.add(markMeshFront);
    surfaceGroup.add(markMeshBack);
  }

  cutOverlayGroup = createCutOverlayGroup();
  if (cutOverlayGroup) {
    cutOverlayGroup.visible = topologyHintsVisible;
    surfaceGroup.add(cutOverlayGroup);
  }
}

function getR() { return BASE_R * fieldScale; }
function getr() { return BASE_R_TUBE * fieldScale; }

const CUBE_FACE_KEYS = ['F', 'R', 'B', 'L', 'U', 'D'];
const CUBE_FACES = {
  F: { n: new THREE.Vector3(0, 0, 1),  r: new THREE.Vector3(1, 0, 0),  d: new THREE.Vector3(0, -1, 0) },
  R: { n: new THREE.Vector3(1, 0, 0),  r: new THREE.Vector3(0, 0, -1), d: new THREE.Vector3(0, -1, 0) },
  B: { n: new THREE.Vector3(0, 0, -1), r: new THREE.Vector3(-1, 0, 0), d: new THREE.Vector3(0, -1, 0) },
  L: { n: new THREE.Vector3(-1, 0, 0), r: new THREE.Vector3(0, 0, 1),  d: new THREE.Vector3(0, -1, 0) },
  U: { n: new THREE.Vector3(0, 1, 0),  r: new THREE.Vector3(1, 0, 0),  d: new THREE.Vector3(0, 0, 1) },
  D: { n: new THREE.Vector3(0, -1, 0), r: new THREE.Vector3(1, 0, 0),  d: new THREE.Vector3(0, 0, -1) },
};
const CUBE_TRANSITIONS = {
  F: {
    L: (x, y) => ({ face: 'L', gx: GRID_SIZE - 1, gy: y, dir: { dx: -1, dy: 0 } }),
    R: (x, y) => ({ face: 'R', gx: 0, gy: y, dir: { dx: 1, dy: 0 } }),
    U: (x, y) => ({ face: 'U', gx: x, gy: GRID_SIZE - 1, dir: { dx: 0, dy: -1 } }),
    D: (x, y) => ({ face: 'D', gx: x, gy: 0, dir: { dx: 0, dy: 1 } }),
  },
  R: {
    L: (x, y) => ({ face: 'F', gx: GRID_SIZE - 1, gy: y, dir: { dx: -1, dy: 0 } }),
    R: (x, y) => ({ face: 'B', gx: 0, gy: y, dir: { dx: 1, dy: 0 } }),
    U: (x, y) => ({ face: 'U', gx: GRID_SIZE - 1, gy: GRID_SIZE - 1 - x, dir: { dx: -1, dy: 0 } }),
    D: (x, y) => ({ face: 'D', gx: GRID_SIZE - 1, gy: x, dir: { dx: -1, dy: 0 } }),
  },
  B: {
    L: (x, y) => ({ face: 'R', gx: GRID_SIZE - 1, gy: y, dir: { dx: -1, dy: 0 } }),
    R: (x, y) => ({ face: 'L', gx: 0, gy: y, dir: { dx: 1, dy: 0 } }),
    U: (x, y) => ({ face: 'U', gx: GRID_SIZE - 1 - x, gy: 0, dir: { dx: 0, dy: 1 } }),
    D: (x, y) => ({ face: 'D', gx: GRID_SIZE - 1 - x, gy: GRID_SIZE - 1, dir: { dx: 0, dy: -1 } }),
  },
  L: {
    L: (x, y) => ({ face: 'B', gx: GRID_SIZE - 1, gy: y, dir: { dx: -1, dy: 0 } }),
    R: (x, y) => ({ face: 'F', gx: 0, gy: y, dir: { dx: 1, dy: 0 } }),
    U: (x, y) => ({ face: 'U', gx: 0, gy: x, dir: { dx: 1, dy: 0 } }),
    D: (x, y) => ({ face: 'D', gx: 0, gy: GRID_SIZE - 1 - x, dir: { dx: 1, dy: 0 } }),
  },
  U: {
    L: (x, y) => ({ face: 'L', gx: y, gy: 0, dir: { dx: 0, dy: 1 } }),
    R: (x, y) => ({ face: 'R', gx: GRID_SIZE - 1 - y, gy: 0, dir: { dx: 0, dy: 1 } }),
    U: (x, y) => ({ face: 'B', gx: GRID_SIZE - 1 - x, gy: 0, dir: { dx: 0, dy: 1 } }),
    D: (x, y) => ({ face: 'F', gx: x, gy: 0, dir: { dx: 0, dy: 1 } }),
  },
  D: {
    L: (x, y) => ({ face: 'L', gx: GRID_SIZE - 1 - y, gy: GRID_SIZE - 1, dir: { dx: 0, dy: -1 } }),
    R: (x, y) => ({ face: 'R', gx: y, gy: GRID_SIZE - 1, dir: { dx: 0, dy: -1 } }),
    U: (x, y) => ({ face: 'F', gx: x, gy: GRID_SIZE - 1, dir: { dx: 0, dy: -1 } }),
    D: (x, y) => ({ face: 'B', gx: GRID_SIZE - 1 - x, gy: GRID_SIZE - 1, dir: { dx: 0, dy: -1 } }),
  },
};

function cubeVector(faceKey, u01, v01) {
  const face = CUBE_FACES[faceKey || 'F'];
  return face.n.clone()
    .add(face.r.clone().multiplyScalar(u01 * 2 - 1))
    .add(face.d.clone().multiplyScalar(v01 * 2 - 1));
}

function cubeCellVector(faceKey, gx, gy) {
  return cubeVector(faceKey, (gx + 0.5) / GRID_SIZE, (gy + 0.5) / GRID_SIZE);
}

function cubeSpherePoint(faceKey, u01, v01) {
  return cubeVector(faceKey, u01, v01).normalize().multiplyScalar(getR());
}

function cubeFaceFromNormal(normal) {
  let bestFace = 'F';
  let bestDot = -Infinity;
  for (const [faceKey, face] of Object.entries(CUBE_FACES)) {
    const score = face.n.dot(normal);
    if (score > bestDot) {
      bestDot = score;
      bestFace = faceKey;
    }
  }
  return bestFace;
}

function createCubeSphereGeometry() {
  const segments = 32;
  const positions = [];
  const uvs = [];
  const indices = [];
  const groups = [];
  const row = segments + 1;

  for (const [faceIndex, faceKey] of CUBE_FACE_KEYS.entries()) {
    const offset = positions.length / 3;
    const face = CUBE_FACES[faceKey];
    const groupStart = indices.length;
    for (let y = 0; y <= segments; y++) {
      const v = y / segments;
      for (let x = 0; x <= segments; x++) {
        const u = x / segments;
        const p = cubeSpherePoint(faceKey, u, v);
        positions.push(p.x, p.y, p.z);
        uvs.push(u, v);
      }
    }
    for (let y = 0; y < segments; y++) {
      for (let x = 0; x < segments; x++) {
        const a = offset + y * row + x;
        const b = offset + y * row + x + 1;
        const c = offset + (y + 1) * row + x;
        const d = offset + (y + 1) * row + x + 1;
        const winding = face.r.clone().cross(face.d).dot(face.n);
        if (winding > 0) indices.push(a, b, c, b, d, c);
        else indices.push(a, c, b, b, c, d);
      }
    }
    groups.push({ start: groupStart, count: indices.length - groupStart, materialIndex: faceIndex });
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  geo.setIndex(indices);
  for (const group of groups) geo.addGroup(group.start, group.count, group.materialIndex);
  geo.computeVertexNormals();
  geo.computeBoundingSphere();
  return geo;
}

const GENUS2_CENTER_OFFSET = 0.58;
const GENUS2_RING_R = 0.58;
const GENUS2_TUBE_R = 0.27;
const GENUS2_SMOOTH = 0.18;
const GENUS2_PATCH_CELLS = 6;
const GENUS2_PATCH_RENDER_SEGMENTS = GENUS2_PATCH_CELLS;
const GENUS2_POLYCUBE_SCALE = { x: 0.58, y: 0.55, z: 0.54 };
const GENUS2_BASE_FACE = 'G2_0_0_0_PZ';

function smoothMin(a, b, k) {
  const h = Math.max(0, Math.min(1, 0.5 + 0.5 * (b - a) / k));
  return b * (1 - h) + a * h - k * h * (1 - h);
}

function genus2TorusDistance(p, cx) {
  const R = GENUS2_RING_R * fieldScale;
  const r = GENUS2_TUBE_R * fieldScale;
  const radial = Math.hypot(p.x - cx, p.y) - R;
  return Math.hypot(radial, p.z) - r;
}

function genus2Field(x, y, z) {
  const offset = GENUS2_CENTER_OFFSET * fieldScale;
  const p = { x, y, z };
  const left = genus2TorusDistance(p, -offset);
  const right = genus2TorusDistance(p, offset);
  return smoothMin(left, right, GENUS2_SMOOTH * fieldScale);
}

function estimateGenus2Normal(x, y, z) {
  const e = 0.008 * fieldScale;
  return new THREE.Vector3(
    genus2Field(x + e, y, z) - genus2Field(x - e, y, z),
    genus2Field(x, y + e, z) - genus2Field(x, y - e, z),
    genus2Field(x, y, z + e) - genus2Field(x, y, z - e),
  ).normalize();
}

const GENUS2_FACE_DIRECTIONS = [
  { key: 'PX', n: [ 1,  0,  0], r: [ 0,  1,  0], d: [ 0,  0, -1] },
  { key: 'NX', n: [-1,  0,  0], r: [ 0, -1,  0], d: [ 0,  0, -1] },
  { key: 'PY', n: [ 0,  1,  0], r: [-1,  0,  0], d: [ 0,  0, -1] },
  { key: 'NY', n: [ 0, -1,  0], r: [ 1,  0,  0], d: [ 0,  0, -1] },
  { key: 'PZ', n: [ 0,  0,  1], r: [ 1,  0,  0], d: [ 0, -1,  0] },
  { key: 'NZ', n: [ 0,  0, -1], r: [ 1,  0,  0], d: [ 0,  1,  0] },
];
const GENUS2_EDGE_KEYS = ['L', 'R', 'U', 'D'];
let genus2TopologyCache = null;

function vec3Key(x, y, z) {
  return `${x},${y},${z}`;
}

function vAdd(a, b) {
  return [a[0] + b[0], a[1] + b[1], a[2] + b[2]];
}

function vSub(a, b) {
  return [a[0] - b[0], a[1] - b[1], a[2] - b[2]];
}

function vScale(a, s) {
  return [a[0] * s, a[1] * s, a[2] * s];
}

function vDot(a, b) {
  return a[0] * b[0] + a[1] * b[1] + a[2] * b[2];
}

function genus2VoxelPoint(face, u, v) {
  return vAdd(
    vAdd(face.c, vScale(face.n, 0.5)),
    vAdd(vScale(face.r, u - 0.5), vScale(face.d, v - 0.5)),
  );
}

function genus2EdgePoint(face, edge, t) {
  if (edge === 'L') return genus2VoxelPoint(face, 0, t);
  if (edge === 'R') return genus2VoxelPoint(face, 1, t);
  if (edge === 'U') return genus2VoxelPoint(face, t, 0);
  return genus2VoxelPoint(face, t, 1);
}

function genus2EdgeKey(a, b) {
  const pa = a.map(v => Math.round(v * 2)).join(',');
  const pb = b.map(v => Math.round(v * 2)).join(',');
  return pa < pb ? `${pa}|${pb}` : `${pb}|${pa}`;
}

function buildGenus2Topology() {
  const voxels = [];
  for (let y = -1; y <= 1; y++) {
    for (let x = -2; x <= 2; x++) {
      if ((x === -1 || x === 1) && y === 0) continue;
      voxels.push({ x, y, z: 0 });
    }
  }

  const solid = new Set(voxels.map(v => vec3Key(v.x, v.y, v.z)));
  const faces = [];
  const faceMap = new Map();

  for (const voxel of voxels) {
    for (const dir of GENUS2_FACE_DIRECTIONS) {
      const nx = voxel.x + dir.n[0];
      const ny = voxel.y + dir.n[1];
      const nz = voxel.z + dir.n[2];
      if (solid.has(vec3Key(nx, ny, nz))) continue;
      const face = {
        key: `G2_${voxel.x}_${voxel.y}_${voxel.z}_${dir.key}`,
        c: [voxel.x, voxel.y, voxel.z],
        n: dir.n,
        r: dir.r,
        d: dir.d,
        transitions: {},
      };
      faces.push(face);
      faceMap.set(face.key, face);
    }
  }

  const edgeMap = new Map();
  for (const face of faces) {
    for (const edge of GENUS2_EDGE_KEYS) {
      const key = genus2EdgeKey(genus2EdgePoint(face, edge, 0), genus2EdgePoint(face, edge, 1));
      if (!edgeMap.has(key)) edgeMap.set(key, []);
      edgeMap.get(key).push({ face, edge });
    }
  }

  for (const records of edgeMap.values()) {
    if (records.length !== 2) continue;
    const [a, b] = records;
    a.face.transitions[a.edge] = { face: b.face.key, edge: b.edge };
    b.face.transitions[b.edge] = { face: a.face.key, edge: a.edge };
  }

  const startFace = faces.find(face =>
    face.c[0] === -2 && face.c[1] === -1 && face.n[2] === 1
  ) || faces[0];
  return { faces, faceMap, startFaceKey: startFace.key };
}

function getGenus2Topology() {
  if (!genus2TopologyCache) genus2TopologyCache = buildGenus2Topology();
  return genus2TopologyCache;
}

function genus2StartFaceKey() {
  return getGenus2Topology().startFaceKey;
}

function randomGenus2FaceKey() {
  const faces = getGenus2Topology().faces;
  return faces[Math.floor(Math.random() * faces.length)].key;
}

function genus2LocalUVFromVoxel(face, p) {
  const center = vAdd(face.c, vScale(face.n, 0.5));
  const delta = vSub(p, center);
  return {
    u: vDot(delta, face.r) + 0.5,
    v: vDot(delta, face.d) + 0.5,
  };
}

function genus2RawPoint(faceKey, u, v) {
  const topology = getGenus2Topology();
  const face = topology.faceMap.get(faceKey) || topology.faceMap.get(topology.startFaceKey);
  const p = genus2VoxelPoint(face, u, v);
  return new THREE.Vector3(
    p[0] * GENUS2_POLYCUBE_SCALE.x * fieldScale,
    p[1] * GENUS2_POLYCUBE_SCALE.y * fieldScale,
    p[2] * GENUS2_POLYCUBE_SCALE.z * fieldScale,
  );
}

function projectToGenus2Surface(point) {
  const p = point.clone();
  for (let i = 0; i < 9; i++) {
    const value = genus2Field(p.x, p.y, p.z);
    if (Math.abs(value) < 0.0008 * fieldScale) break;
    const normal = estimateGenus2Normal(p.x, p.y, p.z);
    p.addScaledVector(normal, -value);
  }
  return p;
}

function genus2SurfacePoint(faceKey, u, v, lift = 0) {
  const p = projectToGenus2Surface(genus2RawPoint(faceKey, u, v));
  if (lift !== 0) p.addScaledVector(estimateGenus2Normal(p.x, p.y, p.z), lift * fieldScale);
  return p;
}

function genus2Point(gx, gy, faceKey = null) {
  const face = faceKey || genus2StartFaceKey();
  return genus2SurfacePoint(
    face,
    (gx + 0.5) / GENUS2_PATCH_CELLS,
    (gy + 0.5) / GENUS2_PATCH_CELLS,
  );
}

function genus2GridVertexKey(faceKey, ix, iy) {
  const topology = getGenus2Topology();
  const face = topology.faceMap.get(faceKey) || topology.faceMap.get(topology.startFaceKey);
  const p = genus2VoxelPoint(face, ix / GENUS2_PATCH_CELLS, iy / GENUS2_PATCH_CELLS);
  return p.map(v => Math.round(v * 2 * GENUS2_PATCH_CELLS)).join(',');
}

function genus2GridVertexPoint(faceKey, ix, iy, lift = 0) {
  return genus2SurfacePoint(
    faceKey,
    ix / GENUS2_PATCH_CELLS,
    iy / GENUS2_PATCH_CELLS,
    lift,
  );
}

function gridEdgeKey(a, b) {
  return a < b ? `${a}|${b}` : `${b}|${a}`;
}

function genus2GridEdgeKey(faceKey, gx, gy, edge) {
  let a, b;
  if (edge === 'L') {
    a = genus2GridVertexKey(faceKey, gx, gy);
    b = genus2GridVertexKey(faceKey, gx, gy + 1);
  } else if (edge === 'R') {
    a = genus2GridVertexKey(faceKey, gx + 1, gy);
    b = genus2GridVertexKey(faceKey, gx + 1, gy + 1);
  } else if (edge === 'U') {
    a = genus2GridVertexKey(faceKey, gx, gy);
    b = genus2GridVertexKey(faceKey, gx + 1, gy);
  } else {
    a = genus2GridVertexKey(faceKey, gx, gy + 1);
    b = genus2GridVertexKey(faceKey, gx + 1, gy + 1);
  }
  return gridEdgeKey(a, b);
}

function addGenus2GraphVertex(vertices, key, point) {
  if (!vertices.has(key)) {
    vertices.set(key, { key, point, edges: [] });
  }
}

function addGenus2GraphEdge(vertices, edges, a, b) {
  const key = gridEdgeKey(a, b);
  if (!edges.has(key)) {
    edges.set(key, { key, a, b });
    vertices.get(a).edges.push(key);
    vertices.get(b).edges.push(key);
  }
}

function buildGenus2GridGraph() {
  const vertices = new Map();
  const edges = new Map();
  const topology = getGenus2Topology();
  for (const face of topology.faces) {
    for (let gy = 0; gy < GENUS2_PATCH_CELLS; gy++) {
      for (let gx = 0; gx < GENUS2_PATCH_CELLS; gx++) {
        const v00 = genus2GridVertexKey(face.key, gx, gy);
        const v10 = genus2GridVertexKey(face.key, gx + 1, gy);
        const v01 = genus2GridVertexKey(face.key, gx, gy + 1);
        const v11 = genus2GridVertexKey(face.key, gx + 1, gy + 1);
        addGenus2GraphVertex(vertices, v00, genus2GridVertexPoint(face.key, gx, gy, 0.04));
        addGenus2GraphVertex(vertices, v10, genus2GridVertexPoint(face.key, gx + 1, gy, 0.04));
        addGenus2GraphVertex(vertices, v01, genus2GridVertexPoint(face.key, gx, gy + 1, 0.04));
        addGenus2GraphVertex(vertices, v11, genus2GridVertexPoint(face.key, gx + 1, gy + 1, 0.04));
        addGenus2GraphEdge(vertices, edges, v00, v01);
        addGenus2GraphEdge(vertices, edges, v10, v11);
        addGenus2GraphEdge(vertices, edges, v00, v10);
        addGenus2GraphEdge(vertices, edges, v01, v11);
      }
    }
  }

  const root = [...vertices.keys()].sort()[0];
  const parent = new Map([[root, null]]);
  const queue = [root];
  while (queue.length > 0) {
    const current = queue.shift();
    const adjacent = vertices.get(current).edges.slice().sort();
    for (const edgeKey of adjacent) {
      const edge = edges.get(edgeKey);
      const next = edge.a === current ? edge.b : edge.a;
      if (parent.has(next)) continue;
      parent.set(next, { vertex: current, edge: edgeKey });
      queue.push(next);
    }
  }

  return { vertices, edges, parent, root };
}

function genus2RootPath(parent, root, vertex) {
  const path = [];
  let current = vertex;
  while (current !== null && current !== undefined) {
    path.push(current);
    if (current === root) break;
    current = parent.get(current)?.vertex;
  }
  return path.reverse();
}

let genus2CutSchemaCache = null;
function genus2CutWaypoint(face, ix, iy) {
  return { face, ix, iy };
}

function genus2CutPathDefs() {
  const n = GENUS2_PATCH_CELLS;
  const h = Math.floor(n / 2);
  const base = GENUS2_BASE_FACE;
  return [
    {
      label: 'a',
      vertices: [
        genus2CutWaypoint(base, h, h),
        genus2CutWaypoint(base, 0, h),
        genus2CutWaypoint(base, 0, 0),
        genus2CutWaypoint('G2_-1_1_0_PZ', n, n),
        genus2CutWaypoint('G2_-1_1_0_PZ', 0, n),
        genus2CutWaypoint('G2_-2_0_0_PZ', n, 0),
        genus2CutWaypoint('G2_-2_0_0_PZ', n, n),
        genus2CutWaypoint('G2_-1_-1_0_PZ', 0, 0),
        genus2CutWaypoint('G2_-1_-1_0_PZ', n, 0),
        genus2CutWaypoint(base, 0, n),
        genus2CutWaypoint(base, 0, h),
        genus2CutWaypoint(base, h, h),
      ],
    },
    {
      label: 'b',
      vertices: [
        genus2CutWaypoint(base, h, h),
        genus2CutWaypoint(base, n, h),
        genus2CutWaypoint(base, n, 0),
        genus2CutWaypoint('G2_1_1_0_PZ', 0, n),
        genus2CutWaypoint('G2_1_1_0_PZ', n, n),
        genus2CutWaypoint('G2_2_0_0_PZ', 0, 0),
        genus2CutWaypoint('G2_2_0_0_PZ', 0, n),
        genus2CutWaypoint('G2_1_-1_0_PZ', n, 0),
        genus2CutWaypoint('G2_1_-1_0_PZ', 0, 0),
        genus2CutWaypoint(base, n, n),
        genus2CutWaypoint(base, n, h),
        genus2CutWaypoint(base, h, h),
      ],
    },
    {
      label: 'c',
      vertices: [
        genus2CutWaypoint(base, h, h),
        genus2CutWaypoint(base, 0, h),
        genus2CutWaypoint('G2_0_0_0_NX', h, 0),
        genus2CutWaypoint('G2_0_0_0_NX', h, n),
        genus2CutWaypoint('G2_0_0_0_NZ', 0, h),
        genus2CutWaypoint('G2_0_0_0_NZ', 0, 0),
        genus2CutWaypoint('G2_-1_-1_0_NZ', n, n),
        genus2CutWaypoint('G2_-1_-1_0_NZ', 0, n),
        genus2CutWaypoint('G2_-2_0_0_NZ', n, 0),
        genus2CutWaypoint('G2_-2_0_0_NZ', n, h),
        genus2CutWaypoint('G2_-2_0_0_NZ', 0, h),
        genus2CutWaypoint('G2_-2_0_0_NX', h, n),
        genus2CutWaypoint('G2_-2_0_0_NX', h, 0),
        genus2CutWaypoint('G2_-2_0_0_PZ', 0, h),

      ],
    },
  ];
}

function genus2WaypointWithKey(vertex) {
  return {
    ...vertex,
    key: genus2GridVertexKey(vertex.face, vertex.ix, vertex.iy),
  };
}

function pushGenus2CutPoint(points, point) {
  const last = points[points.length - 1];
  if (!last || last.key !== point.key || (point.face && last.face !== point.face)) {
    points.push(point);
  }
}

function appendGenus2CutLine(points, face, from, to) {
  let ix = from.ix;
  let iy = from.iy;
  const sx = Math.sign(to.ix - from.ix);
  const sy = Math.sign(to.iy - from.iy);
  while (ix !== to.ix) {
    ix += sx;
    pushGenus2CutPoint(points, genus2WaypointWithKey({ face, ix, iy }));
  }
  while (iy !== to.iy) {
    iy += sy;
    pushGenus2CutPoint(points, genus2WaypointWithKey({ face, ix, iy }));
  }
}

function genus2ShortestVertexPath(graph, startKey, endKey) {
  const parent = new Map([[startKey, null]]);
  const queue = [startKey];
  while (queue.length > 0 && !parent.has(endKey)) {
    const current = queue.shift();
    for (const edgeKey of graph.vertices.get(current)?.edges || []) {
      const edge = graph.edges.get(edgeKey);
      const next = edge.a === current ? edge.b : edge.a;
      if (parent.has(next)) continue;
      parent.set(next, current);
      queue.push(next);
    }
  }
  if (!parent.has(endKey)) return [startKey, endKey];

  const path = [];
  let current = endKey;
  while (current !== null) {
    path.push(current);
    current = parent.get(current);
  }
  return path.reverse();
}

function appendGenus2CutSegment(points, graph, fromVertex, toVertex) {
  const from = genus2WaypointWithKey(fromVertex);
  const to = genus2WaypointWithKey(toVertex);
  pushGenus2CutPoint(points, from);
  if (from.key === to.key) return;

  if (from.face === to.face) {
    appendGenus2CutLine(points, from.face, from, to);
    return;
  }

  const path = genus2ShortestVertexPath(graph, from.key, to.key);
  for (let i = 1; i < path.length; i++) {
    pushGenus2CutPoint(points, { face: null, ix: null, iy: null, key: path[i] });
  }
}

function buildGenus2CutPoints(def, graph) {
  const points = [];
  for (let i = 0; i < def.vertices.length - 1; i++) {
    appendGenus2CutSegment(points, graph, def.vertices[i], def.vertices[i + 1]);
  }
  return points;
}

function buildGenus2CutEdges(def, points) {
  const cuts = [];
  for (let i = 1; i < points.length; i++) {
    const a = points[i - 1];
    const b = points[i];
    if (a.key === b.key) continue;
    cuts.push({
      label: def.label,
      color: CUT_COLORS[def.label],
      edgeKey: gridEdgeKey(a.key, b.key),
      face: a.face === b.face ? a.face : null,
      tx: a.face === b.face ? b.ix - a.ix : 0,
      ty: a.face === b.face ? b.iy - a.iy : 0,
    });
  }
  return cuts;
}

function getGenus2CutSchema() {
  if (!genus2CutSchemaCache) {
    const graph = buildGenus2GridGraph();
    const cuts = [];
    const loops = genus2CutPathDefs().map(def => {
      const points = buildGenus2CutPoints(def, graph);
      cuts.push(...buildGenus2CutEdges(def, points));
      return {
        label: def.label,
        color: CUT_COLORS[def.label],
        points: points
          .filter((point, i) => i === 0 || point.key !== points[i - 1].key)
          .map(point => graph.vertices.get(point.key).point),
      };
    });
    const byEdgeKey = new Map();
    for (const cut of cuts) {
      if (!byEdgeKey.has(cut.edgeKey)) byEdgeKey.set(cut.edgeKey, []);
      byEdgeKey.get(cut.edgeKey).push(cut);
    }
    genus2CutSchemaCache = {
      cuts,
      graph,
      loops,
      byEdgeKey,
    };
  }
  return genus2CutSchemaCache;
}

function createGenus2Geometry() {
  const positions = [];
  const uvs = [];
  const topology = getGenus2Topology();
  const segments = GENUS2_PATCH_RENDER_SEGMENTS;

  function addVertex(p, u, v) {
    positions.push(p.x, p.y, p.z);
    uvs.push(u, v);
  }

  function addTriangle(a, b, c, auv, buv, cuv) {
    const center = new THREE.Vector3().add(a).add(b).add(c).multiplyScalar(1 / 3);
    const outward = estimateGenus2Normal(center.x, center.y, center.z);
    const winding = new THREE.Vector3().subVectors(b, a).cross(new THREE.Vector3().subVectors(c, a));
    if (winding.dot(outward) < 0) {
      addVertex(a, auv.u, auv.v);
      addVertex(c, cuv.u, cuv.v);
      addVertex(b, buv.u, buv.v);
    } else {
      addVertex(a, auv.u, auv.v);
      addVertex(b, buv.u, buv.v);
      addVertex(c, cuv.u, cuv.v);
    }
  }

  for (const face of topology.faces) {
    for (let y = 0; y < segments; y++) {
      const v0 = y / segments;
      const v1 = (y + 1) / segments;
      for (let x = 0; x < segments; x++) {
        const u0 = x / segments;
        const u1 = (x + 1) / segments;
        const p00 = genus2SurfacePoint(face.key, u0, v0);
        const p10 = genus2SurfacePoint(face.key, u1, v0);
        const p01 = genus2SurfacePoint(face.key, u0, v1);
        const p11 = genus2SurfacePoint(face.key, u1, v1);
        addTriangle(p00, p10, p01, { u: u0, v: v0 }, { u: u1, v: v0 }, { u: u0, v: v1 });
        addTriangle(p10, p11, p01, { u: u1, v: v0 }, { u: u1, v: v1 }, { u: u0, v: v1 });
      }
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  let groupStart = 0;
  const verticesPerFace = GENUS2_PATCH_RENDER_SEGMENTS * GENUS2_PATCH_RENDER_SEGMENTS * 6;
  for (let i = 0; i < topology.faces.length; i++) {
    geo.addGroup(groupStart, verticesPerFace, i);
    groupStart += verticesPerFace;
  }
  geo.computeVertexNormals();
  geo.computeBoundingSphere();
  return geo;
}

function createParametricGridGeometry(uSegments, vSegments, pointFn) {
  const positions = [];
  const uvs = [];
  const indices = [];
  const row = vSegments + 1;

  for (let i = 0; i <= uSegments; i++) {
    const u = i / uSegments;
    for (let j = 0; j <= vSegments; j++) {
      const v = j / vSegments;
      const p = pointFn(u, v);
      positions.push(p.x, p.y, p.z);
      uvs.push(u, v);
    }
  }

  for (let i = 0; i < uSegments; i++) {
    for (let j = 0; j < vSegments; j++) {
      const a = i * row + j;
      const b = (i + 1) * row + j;
      const c = i * row + j + 1;
      const d = (i + 1) * row + j + 1;
      indices.push(a, b, c, b, d, c);
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
  geo.setIndex(indices);
  geo.computeVertexNormals();
  geo.computeBoundingSphere();
  return geo;
}

function mobiusPointUV(u01, v01) {
  const u = u01 * Math.PI * 2;
  const width = 0.48 * fieldScale;
  const R = 1.22 * fieldScale;
  const t = (v01 - 0.5) * 2 * width;
  const twist = u / 2;
  const radial = R + t * Math.cos(twist);
  return new THREE.Vector3(
    radial * Math.cos(u),
    t * Math.sin(twist),
    radial * Math.sin(u),
  );
}

function createMobiusGeometry() {
  return createParametricGridGeometry(128, 20, mobiusPointUV);
}

function projectiveSquareToDisk(a, b) {
  return {
    x: a * Math.sqrt(Math.max(0, 1 - (b * b) / 2)),
    y: b * Math.sqrt(Math.max(0, 1 - (a * a) / 2)),
  };
}

function projectivePointUV(u01, v01) {
  const a = u01 * 2 - 1;
  const b = v01 * 2 - 1;
  const disk = projectiveSquareToDisk(a, b);
  const radius = Math.min(1, Math.hypot(disk.x, disk.y));
  const theta = Math.atan2(disk.y, disk.x);
  const v = radius * Math.PI / 2;
  const x = Math.cos(theta) * Math.sin(2 * v);
  const y = Math.sin(theta) * Math.sin(2 * v);
  const z = Math.cos(v) ** 2 - Math.cos(theta) ** 2 * Math.sin(v) ** 2;
  const s = 1.35 * fieldScale;
  return new THREE.Vector3(
    x * s,
    z * s * 0.78,
    y * s,
  );
}

function createProjectiveGeometry() {
  return createParametricGridGeometry(128, 128, projectivePointUV);
}

function kleinPointUV(u01, v01) {
  const u = u01 * Math.PI * 2;
  const v = v01 * Math.PI * 2;
  const tube = 2 * (1 - Math.cos(u) / 2);
  let x;
  let z;
  if (u < Math.PI) {
    x = 3 * Math.cos(u) * (1 + Math.sin(u)) + tube * Math.cos(u) * Math.cos(v);
    z = -8 * Math.sin(u) - tube * Math.sin(u) * Math.cos(v);
  } else {
    x = 3 * Math.cos(u) * (1 + Math.sin(u)) + tube * Math.cos(v + Math.PI);
    z = -8 * Math.sin(u);
  }
  const y = -tube * Math.sin(v);
  const s = 0.17 * fieldScale;
  return new THREE.Vector3(
    x * s,
    -z * s * 0.78,
    y * s,
  );
}

function createKleinGeometry() {
  return createParametricGridGeometry(128, 32, kleinPointUV);
}

const VIEW_MIN_DISTANCE = 2.5;
const VIEW_MAX_DISTANCE = 8;
let isSurfaceDragging = false;
let lastPointer = { x: 0, y: 0 };
const surfacePointers = new Map();
let pinchStartDistance = 0;
let pinchStartCameraDistance = 0;
renderer.domElement.style.touchAction = 'none';

window.addEventListener('resize', () => {
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
});

function pointerDistance(points) {
  if (points.length < 2) return 0;
  return Math.hypot(points[0].x - points[1].x, points[0].y - points[1].y);
}

function clampViewDistance(distance) {
  return Math.max(VIEW_MIN_DISTANCE, Math.min(VIEW_MAX_DISTANCE, distance));
}

function setCameraDistance(distance) {
  camera.position.setLength(clampViewDistance(distance));
  camera.lookAt(0, 0, 0);
}

function beginSurfacePinch() {
  const points = [...surfacePointers.values()];
  pinchStartDistance = pointerDistance(points);
  pinchStartCameraDistance = camera.position.length();
}

renderer.domElement.addEventListener('pointerdown', e => {
  if (e.pointerType === 'mouse' && e.button !== 0) return;
  e.preventDefault();
  surfacePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  isSurfaceDragging = true;
  lastPointer = { x: e.clientX, y: e.clientY };
  renderer.domElement.setPointerCapture(e.pointerId);
  if (surfacePointers.size >= 2) {
    isSurfaceDragging = false;
    beginSurfacePinch();
  }
}, { passive: false });

renderer.domElement.addEventListener('pointermove', e => {
  if (!surfacePointers.has(e.pointerId)) return;
  e.preventDefault();
  surfacePointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  if (surfacePointers.size >= 2) {
    const distance = pointerDistance([...surfacePointers.values()]);
    if (pinchStartDistance > 0 && distance > 0) {
      setCameraDistance(pinchStartCameraDistance * (pinchStartDistance / distance));
    }
    return;
  }
  if (!isSurfaceDragging) return;
  const dx = e.clientX - lastPointer.x;
  const dy = e.clientY - lastPointer.y;
  lastPointer = { x: e.clientX, y: e.clientY };
  surfaceGroup.rotation.y += dx * 0.008;
  surfaceGroup.rotation.x += dy * 0.008;
}, { passive: false });

function stopSurfaceDrag(e) {
  if (e?.pointerId !== undefined) {
    surfacePointers.delete(e.pointerId);
  }
  if (e?.pointerId !== undefined && renderer.domElement.hasPointerCapture(e.pointerId)) {
    renderer.domElement.releasePointerCapture(e.pointerId);
  }
  if (surfacePointers.size === 0) {
    isSurfaceDragging = false;
    pinchStartDistance = 0;
    pinchStartCameraDistance = 0;
    return;
  }
  if (surfacePointers.size === 1) {
    const remaining = [...surfacePointers.values()][0];
    lastPointer = { ...remaining };
    isSurfaceDragging = true;
    pinchStartDistance = 0;
    pinchStartCameraDistance = 0;
    return;
  }
  beginSurfacePinch();
}

renderer.domElement.addEventListener('pointerup', stopSurfaceDrag);
renderer.domElement.addEventListener('pointercancel', stopSurfaceDrag);
renderer.domElement.addEventListener('wheel', e => {
  e.preventDefault();
  const distance = camera.position.length();
  setCameraDistance(distance * Math.exp(e.deltaY * 0.001));
}, { passive: false });

    if (dir.dx === 1)      { ex1 = cx + px*0.18; ey1 = cy - px*0.18; ex2 = cx + px*0.18; ey2 = cy + px*0.18; }
    else if (dir.dx === -1) { ex1 = cx - px*0.18; ey1 = cy - px*0.18; ex2 = cx - px*0.18; ey2 = cy + px*0.18; }
    else if (dir.dy === -1) { ex1 = cx - px*0.18; ey1 = cy - px*0.18; ex2 = cx + px*0.18; ey2 = cy - px*0.18; }
    else                   { ex1 = cx - px*0.18; ey1 = cy + px*0.18; ex2 = cx + px*0.18; ey2 = cy + px*0.18; }
    ctx.beginPath(); ctx.arc(ex1, ey1, er, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ex2, ey2, er, 0, Math.PI*2); ctx.fill();
  } else {
    const alpha = 0.55 + 0.45 * (1 - i / Math.max(snake.length, 1));
    ctx.fillStyle = `rgba(255,140,66,${alpha.toFixed(2)})`;
    ctx.fillRect(sx + pad, sy + pad, px - pad * 2, px - pad * 2);
  }
}

function drawSurfaceGrid(ctx, size) {
  if (MAP_TYPE === 'projective') {
    ctx.strokeStyle = 'rgba(168,228,210,0.11)';
    ctx.lineWidth = 1;
    const px = size / GRID_SIZE;
    for (let i = 1; i < GRID_SIZE; i++) {
      const pos = i * px;
      ctx.beginPath(); ctx.moveTo(pos, 0); ctx.lineTo(pos, size); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, pos); ctx.lineTo(size, pos); ctx.stroke();
    }
    return;
  }
  ctx.strokeStyle = 'rgba(168,228,210,0.26)';
  ctx.lineWidth = 1;
  const gridSize = MAP_TYPE === 'genus2' ? GENUS2_PATCH_CELLS : GRID_SIZE;
  const px = size / gridSize;
  for (let i = 0; i <= gridSize; i++) {
    const pos = i * px;
    ctx.beginPath(); ctx.moveTo(pos, 0); ctx.lineTo(pos, size); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, pos); ctx.lineTo(size, pos); ctx.stroke();
  }
}

function drawCutLabel(ctx, label, x, y, color, radius) {
  ctx.save();
  ctx.fillStyle = color;
  ctx.strokeStyle = 'rgba(6,16,24,0.9)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.fillStyle = '#061018';
  ctx.font = `${Math.max(9, Math.floor(radius * 1.25))}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, x, y + 0.5);
  ctx.restore();
}

function drawTorusCutMarks(ctx) {
  if (MAP_TYPE !== 'torus') return;
  const size = TEX_SIZE;
  const x = TORUS_CUT_X * cellPx;
  const y = TORUS_CUT_Y * cellPx;

  ctx.save();
  ctx.globalAlpha = 0.95;
  ctx.lineCap = 'round';
  ctx.lineWidth = 5;

  ctx.strokeStyle = CUT_COLORS.a;
  ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, size); ctx.stroke();
  drawCutLabel(ctx, 'a', x, cellPx * 0.75, CUT_COLORS.a, cellPx * 0.38);

  ctx.strokeStyle = CUT_COLORS.b;
  ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(size, y); ctx.stroke();
  drawCutLabel(ctx, 'b', cellPx * 0.75, y, CUT_COLORS.b, cellPx * 0.38);
  ctx.restore();
}

function drawProjectiveCutMarks(ctx) {
  if (MAP_TYPE !== 'projective') return;
  const size = TEX_SIZE;
  const px = TEX_SIZE / GRID_SIZE;
  ctx.save();
  ctx.globalAlpha = 0.96;
  ctx.lineCap = 'round';
  ctx.strokeStyle = CUT_COLORS.a;
  ctx.lineWidth = 6;
  ctx.strokeRect(3, 3, size - 6, size - 6);
  drawCutLabel(ctx, 'a', size / 2, px * 0.55, CUT_COLORS.a, px * 0.34);
  drawCutLabel(ctx, 'a', size / 2, size - px * 0.55, CUT_COLORS.a, px * 0.34);
  drawCutLabel(ctx, 'a', px * 0.55, size / 2, CUT_COLORS.a, px * 0.34);
  drawCutLabel(ctx, 'a', size - px * 0.55, size / 2, CUT_COLORS.a, px * 0.34);
  ctx.restore();
}

function drawKleinCutMarks(ctx) {
  if (MAP_TYPE !== 'klein') return;
  const size = TEX_SIZE;
  const px = TEX_SIZE / GRID_SIZE;
  const x = KLEIN_CUT_A_X * px;
  const y = KLEIN_CUT_B_Y * px;
  ctx.save();
  ctx.globalAlpha = 0.96;
  ctx.lineCap = 'round';
  ctx.lineWidth = 6;

  ctx.strokeStyle = CUT_COLORS.a;
  ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, size); ctx.stroke();
  drawCutLabel(ctx, 'a', x, px * 0.75, CUT_COLORS.a, px * 0.34);

  ctx.strokeStyle = CUT_COLORS.b;
  ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(size, y); ctx.stroke();
  drawCutLabel(ctx, 'b', px * 0.75, y, CUT_COLORS.b, px * 0.34);
  ctx.restore();
}

function drawGenus2CutMark(ctx, cut) {
  const px = GENUS2_FACE_TEX_SIZE / GENUS2_PATCH_CELLS;
  let x1, y1, x2, y2;
  if (cut.edge === 'L') {
    x1 = x2 = cut.gx * px;
    y1 = cut.gy * px;
    y2 = (cut.gy + 1) * px;
  } else if (cut.edge === 'R') {
    x1 = x2 = (cut.gx + 1) * px;
    y1 = cut.gy * px;
    y2 = (cut.gy + 1) * px;
  } else if (cut.edge === 'U') {
    x1 = cut.gx * px;
    x2 = (cut.gx + 1) * px;
    y1 = y2 = cut.gy * px;
  } else {
    x1 = cut.gx * px;
    x2 = (cut.gx + 1) * px;
    y1 = y2 = (cut.gy + 1) * px;
  }

  ctx.save();
  ctx.globalAlpha = 0.98;
  ctx.lineCap = 'round';
  ctx.strokeStyle = cut.color;
  ctx.lineWidth = 18;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  if (cut.showLabel) {
    drawCutLabel(ctx, cut.label, (x1 + x2) / 2, (y1 + y2) / 2, cut.color, px * 0.24);
  }
  ctx.restore();
}

function drawTopologyCutMarks() {
  if (!topologyHintsVisible) return;
  drawTorusCutMarks(markCtxFront);
  drawProjectiveCutMarks(markCtxFront);
  drawKleinCutMarks(markCtxFront);
  drawKleinCutMarks(markCtxBack);
}

function redrawTexture() {
  const ctx = texCtx;
  const size = TEX_SIZE;

  // Background
  ctx.fillStyle = '#5f7f92';
  ctx.fillRect(0, 0, size, size);

    sphereMarkCtxBack[faceKey].clearRect(0, 0, SPHERE_FACE_TEX_SIZE, SPHERE_FACE_TEX_SIZE);
  }

  }

  drawTopologyCutMarks();

  for (const f of foods) {
