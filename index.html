<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake on Surfaces — Choose a Surface</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #111118;
    font-family: 'Courier New', monospace;
    color: #eee;
  }
  .container { text-align: center; }
  .lang-toggle {
    position: fixed;
    top: 16px;
    right: 16px;
    padding: 7px 14px;
    font-size: 0.82rem;
    font-family: inherit;
    background: #4ecca3;
    color: #10131c;
    border: 0;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
  }
  .lang-toggle:hover { background: #3db88f; }
  h1 {
    font-size: 2rem;
    margin-bottom: 6px;
    color: #4ecca3;
    letter-spacing: 4px;
  }
  .subtitle {
    color: #888;
    font-size: 0.85rem;
    margin-bottom: 32px;
  }
  .maps {
    display: grid;
    grid-template-columns: repeat(3, 260px);
    gap: 24px;
    justify-content: center;
  }
  .map-card {
    width: 260px;
    padding: 30px 20px 28px;
    background: rgba(255,255,255,0.04);
    border: 2px solid rgba(78,204,163,0.3);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.25s;
    text-decoration: none;
    color: inherit;
  }
  .map-card:hover {
    border-color: #4ecca3;
    background: rgba(78,204,163,0.08);
    transform: translateY(-2px);
  }
  .map-icon {
    font-size: 3rem;
    margin-bottom: 12px;
  }
  .map-name {
    font-size: 1.2rem;
    color: #4ecca3;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  @media (max-width: 880px) {
    .maps { grid-template-columns: repeat(2, 260px); }
  }
  @media (max-width: 590px) {
    body { align-items: flex-start; padding: 72px 0 28px; }
    .maps { grid-template-columns: 260px; }
  }
</style>
</head>
<body>
<button class="lang-toggle" id="langToggle">中文</button>
<div class="container">
  <h1 data-i18n="appName">Snake on Surfaces</h1>
  <div class="subtitle" data-i18n="subtitle">Choose a surface to start</div>
  <div class="maps">
    <a class="map-card" data-map="sphere" href="snake3d.html?map=sphere&lang=en">
      <div class="map-icon">🌐</div>
      <div class="map-name" data-i18n="sphere">Sphere</div>
    </a>
    <a class="map-card" data-map="torus" href="snake3d.html?map=torus&lang=en">
      <div class="map-icon">🔘</div>
      <div class="map-name" data-i18n="torus">Torus</div>
    </a>
    <a class="map-card" data-map="genus2" href="snake3d.html?map=genus2&lang=en">
      <div class="map-icon">∞</div>
      <div class="map-name" data-i18n="genus2">Genus 2</div>
    </a>
    <a class="map-card" data-map="mobius" href="snake3d.html?map=mobius&lang=en">
      <div class="map-icon">↻</div>
      <div class="map-name" data-i18n="mobius">Mobius Strip</div>
    </a>
    <a class="map-card" data-map="projective" href="snake3d.html?map=projective&lang=en">
      <div class="map-icon">⊙</div>
      <div class="map-name" data-i18n="projective">Projective Plane</div>
    </a>
    <a class="map-card" data-map="klein" href="snake3d.html?map=klein&lang=en">
      <div class="map-icon">♾</div>
      <div class="map-name" data-i18n="klein">Klein Bottle</div>
    </a>
  </div>
</div>
<script>
const I18N = {
  en: {
    title: 'Snake on Surfaces — Choose a Surface',
    appName: 'Snake on Surfaces',
    toggle: '中文',
    subtitle: 'Choose a surface to start',
    sphere: 'Sphere',
    torus: 'Torus',
    genus2: 'Genus 2',
    projective: 'Projective Plane',
    mobius: 'Mobius Strip',
    klein: 'Klein Bottle',
  },
  zh: {
    title: '蛇蛇教你学拓扑 — 选择地图',
    appName: '蛇蛇教你学拓扑',
    toggle: 'English',
    subtitle: '选择地图开始游戏',
    sphere: '球 面',
    torus: '环 面',
    genus2: '双孔曲面',
    projective: '射影平面',
    mobius: '莫比乌斯带',
    klein: '克莱因瓶',
  },
};
let lang = localStorage.getItem('snake3dLang') || 'en';
if (!I18N[lang]) lang = 'en';

function applyLanguage() {
  const dict = I18N[lang];
  document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
  document.title = dict.title;
  document.getElementById('langToggle').textContent = dict.toggle;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = dict[el.dataset.i18n];
  });
  document.querySelectorAll('.map-card').forEach(link => {
    const map = link.dataset.map;
    link.href = `snake3d.html?map=${map}&lang=${lang}`;
  });
}

document.getElementById('langToggle').addEventListener('click', () => {
  lang = lang === 'en' ? 'zh' : 'en';
  localStorage.setItem('snake3dLang', lang);
  applyLanguage();
});

applyLanguage();
</script>
</body>
</html>
