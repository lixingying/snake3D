<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #1a1a2e;
    font-family: 'Courier New', monospace;
    color: #eee;
  }
  .container { text-align: center; }
  h1 {
    font-size: 2rem;
    margin-bottom: 6px;
    color: #4ecca3;
    letter-spacing: 4px;
  }
  .info {
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0 auto 8px;
    font-size: 0.95rem;
    gap: 16px;
    flex-wrap: wrap;
  }
  .info span { font-weight: bold; }
  .life { color: #ff6b9d; }
  canvas {
    border: 2px solid #4ecca3;
    background: #16213e;
    display: block;
    margin: 0 auto;
  }
  .msg {
    margin-top: 8px;
    font-size: 1rem;
    height: 28px;
    line-height: 28px;
    overflow: hidden;
  }
  .msg.warn { color: #f0a500; }
  .msg.dead { color: #e84545; }
  .msg.good { color: #4ecca3; }
  button {
    margin-top: 8px;
    padding: 8px 28px;
    font-size: 1rem;
    font-family: inherit;
    background: #4ecca3;
    color: #1a1a2e;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 2px;
    font-weight: bold;
  }
  button:hover { background: #3db88f; }
  .legend {
    margin-top: 10px;
    display: flex;
    gap: 12px;
    font-size: 0.78rem;
    color: #aaa;
    justify-content: center;
    flex-wrap: wrap;
    line-height: 1.6;
  }
  .legend .dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    margin-right: 3px;
    vertical-align: middle;
  }
  .legend .sep { color: #444; margin: 0 2px; }
  .tip {
    margin-top: 6px;
    color: #666;
    font-size: 0.8rem;
  }
</style>
</head>
<body>

<div class="container">
  <h1>贪 吃 蛇</h1>
  <div class="info">
    <div>分数: <span id="score" style="color:#f0a500">0</span></div>
    <div>最高分: <span id="best" style="color:#f0a500">0</span></div>
    <div>生命: <span class="life" id="lives">❤ ❤ ❤</span></div>
    <div>速度: <span id="speedLabel" style="color:#aaa">正常</span></div>
  </div>
  <canvas id="canvas" width="400" height="400"></canvas>
  <div class="msg" id="msg"></div>
  <button id="restart">重新开始</button>
  <div class="legend">
    <span style="color:#5e5">增益:</span>
    <span><span class="dot" style="background:#e84545"></span>变长</span>
    <span><span class="dot" style="background:#5dade2"></span>扩大</span>
    <span><span class="dot" style="background:#f4d03f"></span>减速</span>
    <span><span class="dot" style="background:#ff6b9d"></span>+命</span>
    <span class="sep">|</span>
    <span style="color:#e55">减益:</span>
    <span><span class="dot" style="background:#8b0000"></span>缩短</span>
    <span><span class="dot" style="background:#2c3e50"></span>缩小</span>
    <span><span class="dot" style="background:#e67e22"></span>加速</span>
    <span><span class="dot" style="background:#6c3483"></span>-命</span>
  </div>
  <div class="tip">方向键 / WASD · 空格暂停 · 食物定时生成，会过期消失</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const GRID = 20;
const SPAWN_INTERVAL = 35;   // ticks between food spawns
const FOOD_LIFETIME = 160;    // ticks before food disappears (≈16s at 100ms)
const MAX_FOODS = 7;
const MIN_CANVAS = 300;
const MAX_CANVAS = 800;

const FOOD_DEF = {
  // ---- 增益 ----
  grow:       { color: '#e84545', label: '变长', weight: 28, good: true },
  expand:     { color: '#5dade2', label: '扩大', weight: 7,  good: true },
  slow:       { color: '#f4d03f', label: '减速', weight: 7,  good: true },
  extraLife:  { color: '#ff6b9d', label: '+命',  weight: 3,  good: true },
  // ---- 减益 ----
  shrink:     { color: '#8b0000', label: '缩短', weight: 28, good: false },
  shrinkField:{ color: '#2c3e50', label: '缩小', weight: 7,  good: false },
  speedUp:    { color: '#e67e22', label: '加速', weight: 7,  good: false },
  loseLife:   { color: '#6c3483', label: '-命',  weight: 3,  good: false },
};

let COLS, ROWS;
let snake, foods, direction, nextDir;
let score, best, lives, loop, running, paused;
let speed;
let spawnTimer;
let msgs = []; // [{text, cls, ticks}]

function recalcGrid() {
  COLS = Math.floor(canvas.width / GRID);
  ROWS = Math.floor(canvas.height / GRID);
}

function speedLabel() {
  if (speed <= 55)  return '极快';
  if (speed <= 75)  return '快';
  if (speed <= 115) return '正常';
  if (speed <= 170) return '慢';
  return '很慢';
}

function updateSpeedDisplay() {
  document.getElementById('speedLabel').textContent = speedLabel();
}

function updateLivesDisplay() {
  const hearts = [];
  for (let i = 0; i < lives; i++) hearts.push('❤');
  document.getElementById('lives').textContent = hearts.join(' ') || '💀';
}

function pickFoodType() {
  const total = Object.values(FOOD_DEF).reduce((s, t) => s + t.weight, 0);
  let r = Math.random() * total;
  for (const [key, val] of Object.entries(FOOD_DEF)) {
    r -= val.weight;
    if (r <= 0) return key;
  }
  return 'grow';
}

function isOccupied(x, y) {
  if (snake.some(s => s.x === x && s.y === y)) return true;
  if (foods.some(f => f.x === x && f.y === y)) return true;
  return false;
}

function trySpawnFood() {
  if (foods.length >= MAX_FOODS) return;
  const type = pickFoodType();
  // Try up to 50 random positions
  for (let attempt = 0; attempt < 50; attempt++) {
    const x = Math.floor(Math.random() * COLS);
    const y = Math.floor(Math.random() * ROWS);
    if (!isOccupied(x, y)) {
      foods.push({ x, y, type, age: 0 });
      return;
    }
  }
}

function init() {
  canvas.width = 400;
  canvas.height = 400;
  recalcGrid();
  snake = [
    { x: 10, y: 10 },
    { x: 9, y: 10 },
    { x: 8, y: 10 },
  ];
  direction = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  lives = 3;
  speed = 100;
  running = true;
  paused = false;
  foods = [];
  spawnTimer = 0;
  msgs = [];
  best = parseInt(localStorage.getItem('snakeBest_v2') || '0');
  document.getElementById('score').textContent = '0';
  document.getElementById('best').textContent = best;
  setMsg('');
  updateLivesDisplay();
  updateSpeedDisplay();
  // Seed 2 initial foods
  trySpawnFood();
  trySpawnFood();
}

/* ---- drawing ---- */

function drawFood(f) {
  const def = FOOD_DEF[f.type];
  const fx = f.x * GRID, fy = f.y * GRID;
  const lifeRatio = f.age / FOOD_LIFETIME;

  // Pulsing glow — brighter for good, dimmer for bad
  const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 200 + f.x * 3 + f.y * 7);
  ctx.shadowColor = def.color;
  ctx.shadowBlur = 4 + pulse * 6;
  ctx.fillStyle = def.color;
  ctx.fillRect(fx + 2, fy + 2, GRID - 4, GRID - 4);
  ctx.shadowBlur = 0;

  // Label
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(def.label, fx + GRID / 2, fy + GRID / 2 - 1);

  // Lifetime bar at bottom of food cell
  const barW = (GRID - 6) * (1 - lifeRatio);
  ctx.fillStyle = lifeRatio > 0.7 ? '#e84545' : lifeRatio > 0.4 ? '#f0a500' : '#4ecca3';
  ctx.fillRect(fx + 3, fy + GRID - 5, barW, 2);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Foods
  foods.forEach(f => drawFood(f));

  // Snake
  snake.forEach((s, i) => {
    const alpha = 1 - i / (snake.length + 10) * 0.5;
    ctx.fillStyle = i === 0
      ? '#4ecca3'
      : `rgba(61,184,143,${alpha.toFixed(2)})`;
    ctx.fillRect(s.x * GRID + 1, s.y * GRID + 1, GRID - 2, GRID - 2);
  });

  // Message queue at bottom of canvas
  if (msgs.length > 0) {
    const recent = msgs.slice(-3);
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    const boxH = recent.length * 20 + 10;
    ctx.fillRect(0, canvas.height - boxH, canvas.width, boxH);
    recent.forEach((m, i) => {
      const alpha = Math.min(1, m.ticks / 15);
      ctx.fillStyle = m.cls === 'good' ? `rgba(78,204,163,${alpha})`
                    : m.cls === 'warn' ? `rgba(240,165,0,${alpha})`
                    : `rgba(232,69,69,${alpha})`;
      ctx.font = '13px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(m.text, canvas.width / 2, canvas.height - boxH + 16 + i * 20);
    });
  }

  // Paused overlay
  if (paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = '20px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('暂停中', canvas.width / 2, canvas.height / 2);
  }
}

/* ---- effects ---- */

function addMsg(text, cls) {
  msgs.push({ text, cls, ticks: 80 });
  if (msgs.length > 8) msgs.shift();
  setMsg(text, cls);
}

function setMsg(text, cls) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg' + (cls ? ' ' + cls : '');
}

function resizeCanvas(delta) {
  const newW = canvas.width + delta;
  const newH = canvas.height + delta;
  if (newW < MIN_CANVAS || newH < MIN_CANVAS) return false;
  if (newW > MAX_CANVAS || newH > MAX_CANVAS) return false;

  // Check snake won't go out of bounds
  const newCols = Math.floor(newW / GRID);
  const newRows = Math.floor(newH / GRID);
  if (delta < 0) {
    if (snake.some(s => s.x >= newCols || s.y >= newRows)) return false;
  }

  canvas.width = newW;
  canvas.height = newH;
  recalcGrid();
  // Remove foods now out of bounds
  foods = foods.filter(f => f.x < COLS && f.y < ROWS);
  return true;
}

function applyEffect(type) {
  switch (type) {
    // ---- 增益 ----
    case 'grow':
      score++;
      document.getElementById('score').textContent = score;
      if (score > best) {
        best = score;
        localStorage.setItem('snakeBest_v2', best);
        document.getElementById('best').textContent = best;
      }
      addMsg('变长 +1', 'good');
      break;

    case 'expand':
      if (resizeCanvas(GRID * 2)) {
        addMsg('场地扩大！', 'good');
      } else {
        addMsg('场地已达极限', 'warn');
      }
      break;

    case 'slow':
      speed = Math.min(speed + 30, 250);
      restartLoop();
      updateSpeedDisplay();
      addMsg('减速！', 'good');
      break;

    case 'extraLife':
      lives++;
      updateLivesDisplay();
      addMsg('+1 生命', 'good');
      break;

    // ---- 减益 ----
    case 'shrink':
      if (snake.length > 1) {
        snake.pop();
        snake.pop(); // remove 2 segments
        if (snake.length < 1) snake.push({ x: snake[0].x, y: snake[0].y });
      }
      addMsg('身体缩短！', 'warn');
      break;

    case 'shrinkField':
      if (resizeCanvas(-GRID * 2)) {
        addMsg('场地缩小！', 'warn');
      } else {
        addMsg('场地已到最小', 'warn');
      }
      break;

    case 'speedUp':
      speed = Math.max(speed - 30, 40);
      restartLoop();
      updateSpeedDisplay();
      addMsg('加速！', 'warn');
      break;

    case 'loseLife':
      loseLife();
      break;
  }
}

function loseLife() {
  lives--;
  updateLivesDisplay();
  if (lives <= 0) {
    running = false;
    setMsg('游戏结束！', 'dead');
    addMsg('失去生命，游戏结束！', 'dead');
  } else {
    addMsg('-1 生命！剩余 ' + lives + ' 条', 'warn');
  }
}

/* ---- game loop ---- */

function update() {
  if (!running || paused) return;

  // Age foods, remove expired
  foods = foods.filter(f => {
    f.age++;
    return f.age < FOOD_LIFETIME;
  });

  // Spawn food on timer
  spawnTimer--;
  if (spawnTimer <= 0) {
    spawnTimer = SPAWN_INTERVAL;
    trySpawnFood();
  }

  // Age message queue
  msgs = msgs.filter(m => { m.ticks--; return m.ticks > 0; });

  // Move snake
  direction = { ...nextDir };
  const head = {
    x: snake[0].x + direction.x,
    y: snake[0].y + direction.y,
  };

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    die();
    return;
  }

  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    die();
    return;
  }

  snake.unshift(head);

  // Check if head hit any food
  const eatenIdx = foods.findIndex(f => f.x === head.x && f.y === head.y);
  if (eatenIdx !== -1) {
    const eaten = foods[eatenIdx];
    foods.splice(eatenIdx, 1);
    applyEffect(eaten.type);
  } else {
    snake.pop();
  }
}

function die() {
  lives--;
  updateLivesDisplay();
  if (lives <= 0) {
    running = false;
    setMsg('游戏结束！', 'dead');
    addMsg('游戏结束！', 'dead');
  } else {
    // Respawn snake
    snake = [
      { x: 10, y: 10 },
      { x: 9, y: 10 },
      { x: 8, y: 10 },
    ];
    direction = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    addMsg('撞了！剩余 ' + lives + ' 条命', 'warn');
  }
}

function tick() {
  update();
  draw();
}

function restartLoop() {
  clearInterval(loop);
  loop = setInterval(tick, speed);
}

/* ---- controls ---- */

document.addEventListener('keydown', e => {
  const key = e.key.toLowerCase();

  if (key === ' ' || key === 'spacebar') {
    e.preventDefault();
    if (running) paused = !paused;
    return;
  }

  if (!running || paused) return;

  const dir = direction;
  switch (key) {
    case 'arrowup':    case 'w': if (dir.y !==  1) nextDir = { x:  0, y: -1 }; break;
    case 'arrowdown':  case 's': if (dir.y !== -1) nextDir = { x:  0, y:  1 }; break;
    case 'arrowleft':  case 'a': if (dir.x !==  1) nextDir = { x: -1, y:  0 }; break;
    case 'arrowright': case 'd': if (dir.x !== -1) nextDir = { x:  1, y:  0 }; break;
  }
});

document.getElementById('restart').addEventListener('click', () => {
  clearInterval(loop);
  init();
  loop = setInterval(tick, speed);
});

init();
loop = setInterval(tick, speed);
</script>
</body>
</html>
